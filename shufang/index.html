<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>书方</title>
<style>
:root { --bg: #fafaf9; --text: #1a1a1a; --text-light: #8a8a86; --divider: #e8e6e3; --max-width: 640px; --padding-x: 32px; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background-color: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
button { background: none; border: none; color: var(--text); cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
.tag-btn, .daily-btn, .action-btn, .back-btn, .degraded-hint, .all-tags-btn, .delayed-whisper, .list-close { font-family: "PingFang SC", "Noto Sans SC", -apple-system, sans-serif; }
.guide-text, .quote-text, .book-meta, .emotion-word, .poetry-btn { font-family: "Noto Serif SC", "Source Han Serif SC", STSong, serif; }
.hidden { display: none !important; }
.view-container { max-width: var(--max-width); margin: 0 auto; padding: 0 var(--padding-x); min-height: 100vh; display: none; opacity: 0; transition: opacity 0.4s ease; }
.view-container.active { display: flex; flex-direction: column; opacity: 1; }

/* ========== 首页 Z-Index 层级体系 ========== */
.mirror-container { position: relative; width: 100vw; height: 100vh; max-width: none; padding: 0; margin: 0; display: flex; justify-content: center; align-items: center; transition: background-color 0.3s ease; }

/* Z:5 边缘括号 */
.edge-hint { position: absolute; top: 50%; transform: translateY(-50%); font-size: 32px; color: var(--text); opacity: 0.15; z-index: 5; pointer-events: none; user-select: none; }
.edge-left { left: 16px; } .edge-right { right: 16px; }

/* Z:10 触控区——左右各半屏 */
.touch-zone { position: absolute; top: 0; height: 100%; z-index: 10; }
.touch-left { left: 0; width: 50%; } .touch-right { right: 0; width: 50%; }

/* Z:20 文字缩放容器 */
.word-scaler { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 100%; z-index: 20; pointer-events: none; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
.word-scaler.clicked { transform: translate(-50%, -50%) scale(0.96); }

.emotion-word { letter-spacing: 0.2em; color: var(--text); text-align: center; position: absolute; left: 0; right: 0; margin: auto; top: -30px; opacity: 0; will-change: transform, opacity; pointer-events: auto; cursor: pointer; }
.word-short { font-size: 48px; } .word-long { font-size: 32px; letter-spacing: 0.1em; }
.emotion-word.breathing { animation: breatheAnim 5.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
@keyframes breatheAnim { 0% { opacity: 0; transform: scale(0.95) translateY(10px); } 20% { opacity: 1; transform: scale(1) translateY(0); } 70% { opacity: 1; transform: scale(1.02) translateY(0); } 100% { opacity: 0; transform: scale(1.05) translateY(-5px); } }

/* Z:30 顶层交互 */
.all-tags-btn { position: absolute; top: 32px; right: var(--padding-x); font-size: 13px; color: #8a8a86; z-index: 30; cursor: pointer; letter-spacing: 0.15em; padding: 14px; text-decoration: underline; text-underline-offset: 4px; }
.daily-dose-btn-mirror { position: absolute; bottom: 12%; font-size: 14px; color: var(--text-light); letter-spacing: 0.1em; z-index: 30; padding: 10px 20px; opacity: 0.4; transition: opacity 1s ease, color 1s ease; cursor: pointer; }
.daily-dose-btn-mirror.idle-breathe { animation: pulseText 4s infinite alternate; }
.daily-dose-btn-mirror.flash-highlight { opacity: 0.9 !important; color: var(--text) !important; animation: none; }
@keyframes pulseText { 0% { opacity: 0.4; } 100% { opacity: 0.8; } }
.delayed-whisper { position: absolute; bottom: 20%; font-size: 10px; color: #ccc; letter-spacing: 0.1em; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 1.5s ease; }
.delayed-whisper.show { opacity: 1; }

/* Z:40 诗集目录 */
.list-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 40; display: flex; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.list-overlay.visible { opacity: 1; pointer-events: auto; }
.list-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 41; }
.list-close { position: absolute; top: 24px; left: var(--padding-x); font-size: 28px; color: #ccc; cursor: pointer; padding: 10px; z-index: 43; font-weight: 300; }
.poetry-container { position: relative; z-index: 42; width: 100%; height: 100%; overflow-y: auto; padding: 120px 0; scrollbar-width: none; -ms-overflow-style: none; }
.poetry-container::-webkit-scrollbar { display: none; }
.poetry-list { display: flex; flex-direction: column; align-items: center; gap: 80px; opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
.list-overlay.visible .poetry-list { opacity: 1; transform: translateY(0); }
.poetry-btn { color: var(--text-light); letter-spacing: 0.2em; transition: color 0.3s ease, transform 0.2s ease; cursor: pointer; }
.poetry-btn:active { color: var(--text); transform: scale(0.96); }
.poetry-btn.short-word { font-size: 32px; }
.poetry-btn.long-word { font-size: 26px; letter-spacing: 0.1em; }

/* ========== 处方页 ========== */
#dose-view { position: relative; padding-top: 40px; padding-bottom: 80px; }
.back-btn { position: absolute; top: 24px; left: var(--padding-x); font-size: 18px; color: rgba(0,0,0,0.2); padding: 10px 10px 10px 0; }
.degraded-hint { font-size: 12px; color: #b0aea8; text-align: center; margin-top: 20px; margin-bottom: 20px; }
.guide-section { margin-top: 60px; min-height: 60vh; }
.book-id { font-size: 12px; color: var(--text-light); margin-bottom: 24px; }
.guide-text p { font-size: 16px; line-height: 2.0; margin-bottom: 1.5em; text-align: justify; }
.scroll-hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); font-size: 24px; color: var(--text); opacity: 0.15; animation: breathe 2s ease-in-out infinite; pointer-events: none; z-index: 10; }
@keyframes breathe { 0%, 100% { opacity: 0.1; } 50% { opacity: 0.3; } }
.quotes-section { margin-top: 100px; }
.book-meta { margin-bottom: 60px; }
.book-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
.book-author { font-size: 14px; color: var(--text-light); }
.quote-item { margin-bottom: 60px; opacity: 0; }
.quote-text { font-size: 18px; line-height: 2.2; text-align: justify; white-space: pre-wrap; }
.quote-divider { width: 100%; height: 1px; background-color: var(--divider); margin: 30px 0 60px 0; }
.extras-box { margin-top: 80px; font-size: 12px; color: var(--text-light); line-height: 1.8; }
.end-marker { font-size: 10px; color: #ccc; text-align: center; margin-top: 60px; margin-bottom: 80px; }
.footer-actions { display: flex; flex-direction: column; align-items: center; gap: 30px; }
.action-btn { font-size: 14px; color: var(--text-light); }
.next-dose { color: var(--text); }
@media (min-width: 640px) { :root { --padding-x: 48px; } }
</style>
</head>
<body>
    <div id="home-view" class="view-container mirror-container active">
        <div class="all-tags-btn" id="btn-show-all">全部</div>
        <div class="daily-dose-btn-mirror" id="daily-btn-mirror">今日一剂</div>
        <div class="delayed-whisper" id="delayed-whisper">轻触左右边缘或空白处切换</div>
        <div class="edge-hint edge-left">〈</div>
        <div class="edge-hint edge-right">〉</div>
        <div class="touch-zone touch-left" id="zone-prev"></div>
        <div class="touch-zone touch-right" id="zone-next"></div>
        <div class="word-scaler" id="zone-enter"></div>

        <div class="list-overlay" id="list-overlay">
            <div class="list-backdrop" id="list-backdrop"></div>
            <div class="list-close" id="btn-close-all">&times;</div>
            <div class="poetry-container">
                <div class="poetry-list">
                    <button class="poetry-btn short-word" data-tag="无聊">无聊</button>
                    <button class="poetry-btn short-word" data-tag="迷茫">迷茫</button>
                    <button class="poetry-btn short-word" data-tag="厌倦">厌倦</button>
                    <button class="poetry-btn short-word" data-tag="浮躁">浮躁</button>
                    <button class="poetry-btn short-word" data-tag="疲惫">疲惫</button>
                    <button class="poetry-btn long-word" data-tag="空游无所依">空游无所依</button>
                    <button class="poetry-btn short-word" data-tag="烦闷">烦闷</button>
                    <button class="poetry-btn short-word" data-tag="平淡">平淡</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dose-view" class="view-container hidden">
        <button class="back-btn" id="nav-back">&larr;</button>
        <div id="degraded-hint" class="degraded-hint hidden"></div>
        <div class="guide-section">
            <div class="book-id" id="render-id"></div>
            <div class="guide-text" id="render-guide"></div>
        </div>
        <div class="scroll-hint" id="scroll-arrow">&darr;</div>
        <div class="quotes-section" id="render-quotes"></div>
        <div class="footer-actions hidden" id="footer-actions">
            <button class="action-btn next-dose" id="nav-next">换一剂 &rarr;</button>
            <button class="action-btn back-home" id="nav-home">回到首页</button>
        </div>
    </div>

<script>
var BOOKS = [{"id":"001","title":"棋王","author":"阿城","summary":"一个痴迷下棋的知青，在最匮乏的年代里活出了最富足的样子","tags":{"primary":"迷茫","secondary":["浮躁","空游无所依"]},"guide":"你并不是不知道自己要什么。你知道得太多了。\n\n大学像一张摆满菜单的桌子，所有人都在告诉你\"这个有前途\"\"那个最保值\"，你每样都尝了一口，却没有一样真正饿了你的胃。迷茫不是选项不够多的病，恰好相反——是你脑子里塞了太多别人的菜单，反而听不见自己胃在叫。王一生面对这个问题的时候，他的解法近乎粗暴：别想了，下棋。别人串联、刷题、走关系，他就坐在那儿，跟一盘棋较劲。他把命放在棋里，棋就还他一个不被时代冲走的位置。\n\n这个叫\"棋呆子\"的人身上有一种你不太能在校园里看到的品质：他不急于解释自己。别人觉得他呆、觉得他怪，他就笑一笑，继续摆棋。不争辩、不剖白、不写小作文自我辩护。这种近乎沉默的笃定，在一个人人都在经营人设的环境里，是一种很稀缺的定力。迷茫的时候，你最需要的不是更清晰的规划，而是先找到一件不需要向任何人解释理由的事情，然后先把它做完。\n\n读完《棋王》大约需要一个下午。不长，刚好够你从宿舍床铺滑到书桌前。不用做笔记，不用画思维导图，你就看王一生怎么在火车上吃饭——米饭粒儿沾了一脸，一粒一粒捡起来吃掉——然后你会知道，\"活着\"这事儿，有时候就藏在把一件小事做到底的执拗里。","quotes":["我因为不喜欢象棋，也就不去关心什么象棋冠军，但王一生的大名，却常被班上几个棋篓子供在嘴上，我也就对其事迹略闻一二，知道王一生外号棋呆子，棋下得很神不用说，而且在他们学校那一年级里数理成绩总是前数名。我想棋下得好而有个数学脑子，这很合情理，可我又不信人们说的那些王一生的呆事，觉得不过是大家寻佚闻鄙事以快言论罢了。","棋开始了。上千人不再出声儿。只有自愿服务的人一会儿紧一会儿慢地用话传出棋步，外边儿自愿服务的人就变动着棋子儿。风吹得八张大纸哗哗地响，棋子儿荡来荡去。太阳斜斜地照在一切上，烧得耀眼。前几十排的人都坐下了，仰起来看，后面的人也挤得紧紧的，一个个土眉土眼，头发长长短短吹得飘，再没人动一下，似乎都要把命放在棋里搏。\n\n我心里忽然有一种很古的东西涌上来，喉咙紧紧地往上走。读过的书，有的近了，有的远了，模糊了。平时十分佩服的项羽、刘邦都在目瞪口呆，倒是尸横遍野的那些黑脸士兵，从地下爬起来，哑了喉咙，慢慢移动。一个樵夫，提了斧在野唱。忽然又仿佛见了呆子的母亲，用一双弱手一张一张地折书页。","不久，脚卵抬起头，看着王一生说：\"天下是你的。\"抽出一支烟给王一生，又说：\"你的棋是跟谁学的？\"王一生也看着脚卵，说：\"跟天下人。\""],"extras":{"availability":"微信读书免费可读；纸书收录于阿城文集《棋王·树王·孩子王》","ifYouLike":"《树王》《孩子王》（阿城同系列）；《活着》（余华）——同样是在匮乏中活出尊严的故事"}},{"id":"002","title":"给青年的十二封信","author":"朱光潜","summary":"一位美学大师用十二封信，和年轻人聊读书、动与静、升学、人生——不教你怎么赢，但教你怎么活","tags":{"primary":"迷茫","secondary":["浮躁","烦闷"]},"guide":"你说你迷茫。但这可能不是一个\"问题\"，而是一个\"阶段\"——区别在于，前者需要被解决，后者只需要被穿越。\n\n\"迷茫\"这个词本身就暴露了你的姿势：你在用眼睛找路，而不是用脚。你站在十字路口，希望有人告诉你哪条路是对的，但朱光潜在第一封信里就把这条路堵死了——他不给答案。不是因为他吝啬，而是因为他知道，别人给的答案在你身上待不了三天。所以他只做一件事：给你一套自己找答案的方法。谈读书，说你与其碎片化地刷帖子，不如拿一整块时间啃一本\"不紧急\"的书，因为\"在读书中寻出一种趣味，你将来抵抗引诱的能力比别人定要大些\"。谈动与静，说人之所以烦闷，大半是因为身体和心灵有一个闲着——解决烦闷的方法不是想通，而是动起来。谈升学选课，说别把兴趣和社会需求对立起来，你感兴趣的东西做到极致，社会自然会为它定价。\n\n十二封信，写于将近一百年前。一百年前的年轻人也在迷茫，迷茫的内容换了一茬又一茬，但迷茫的结构一模一样。这至少说明一件事：迷茫不是你的错，它是二十岁的出厂设置。\n\n每封信只需十分钟。一天读一封，读完就合上。这十二天里你可能不会\"想通\"任何东西——但你可能会开始做一些事。而这恰好就是朱光潜想说的全部：路是在走的过程中被踩出来的，不是在站的过程中被看出来的。","quotes":["你如果在读书中寻出一种趣味，你将来抵抗引诱的能力比别人定要大些。这种兴趣你现在不能寻出，将来永不会寻出的。凡人都越老越麻木，你现在已比不上三五岁的小孩子们那样好奇、那样兴味淋漓了。你长大一岁，你感觉兴味的锐敏力便须迟钝一分。","愁生于郁，解愁的方法在泄；郁由于静止，求泄的方法在动。从前儒家讲心性的话，从近代心理学眼光看，都很粗疏，只有孟子的\"养气\"说、宋儒的\"变化气质\"说，是颠扑不破的。我把这两说综合起来，下一个注脚：便是\"在动中求泄\"。","做学问，做事业，在人生中都只能算是第二桩事。人生第一桩事是生活。我所谓\"生活\"是\"享受\"，是\"领略\"，是\"培养生机\"。假若为学问为事业而忘却生活，那种学问事业在人生中便失其真正意义与价值。","所谓真正立志，不仅要接受现在的事实，尤其要抓住现在的机会。如果立志要做一件事，那件事的成功尽管在很远的将来，而那件事的发动必须就在目前一顷刻。"],"extras":{"availability":"微信读书免费可读（多个版本）；纸书各出版社均有","ifYouLike":"《谈美》（朱光潜）——同一支笔写美学，更轻盈；《沉思录》（马可·奥勒留）——如果朱光潜是朋友，奥勒留是那个沉默的长辈"}},{"id":"003","title":"心流：最优体验心理学","author":"米哈里·契克森米哈赖（Mihaly Csikszentmihalyi）","summary":"用几十年的实证研究回答一个古老问题：人什么时候最快乐？答案是——完全沉浸在一件事里，忘记时间存在的时候","tags":{"primary":"浮躁","secondary":["无聊","平淡"]},"guide":"你不是浮躁。你是被设计成这样的。\n\n每一个 app 背后都站着一群全世界最聪明、收入最高的工程师，他们的工作不是服务你，而是让你的注意力停不下来。你滑走一个视频，下一个自动补上；你关掉一个通知，三个新的弹出来。你觉得自己\"缺乏专注力\"？不对。你的专注力没有被削弱——它只是被一群比你更懂你大脑弱点的人精确地收割了，然后卖给了广告商。这不是你的错。但这确实是你的问题——因为你已经太久没有体验过一种叫做\"心流\"的感觉：完全沉浸在一件事里，忘记自己、忘记时间、忘记手机还存在。\n\n契克森米哈赖用几十年的实证研究把这个词钉在了心理学地图上。他发现了一个反直觉的事实：人类最快乐的时刻，不是放松的时候，不是享乐的时候，而是\"用全部技能去应对一个刚好超出能力边界的挑战\"的时候。打游戏时的忘我、打球时的手感、解题时的沉浸——这些都是心流的廉价版本。昂贵版本的心流需要四个条件：清晰的目标、即时的反馈、挑战与技能的平衡、对当下的完全投入。好消息是，这四个条件不需要你删除所有 app 去深山修行，你只需要把它们种进你已有的日常生活里。\n\n这本书不用从头读到尾。先读第三章和第四章，大概两小时。读完后，挑一件你今天非做不可的事——洗碗、跑步、背单词都行——在开始之前给自己定一个微小的目标（比如\"洗完所有碗之前不摸手机\"），然后只关注这一个目标。你会想起很久以前，那时候你还不靠滑手机来杀死时间，那时候二十分钟像一辈子那么长，并且一点都不无聊。","quotes":["心流即一个人完全沉浸在某种活动当中，无视其他事物存在的状态。这种体验本身带来莫大的喜悦，使人愿意付出巨大的代价。","控制意识才能控制体验，而控制意识最直接的方法，就是控制注意力。注意力是一种稀缺资源，它决定哪些信息进入意识，哪些被排除在外。","大多数人一生都在两种状态之间来回摆动：工作时感到焦虑，闲暇时感到无聊。而心流体验恰好处于焦虑与无聊之间的那个窄道——当挑战刚好超出技能，两者同时被拉高时，心流就会出现。","幸福并非瞬间发生，也不受外在事件操纵，而是取决于我们对外在事物的阐释。只有学会控制意识的人，才能决定自己的生活体验，进而接近幸福。"],"extras":{"availability":"微信读书可读（中信出版社译本）；英文原版 Flow: The Psychology of Optimal Experience","ifYouLike":"《刻意练习》（安德斯·艾利克森）——心流的操作方法；《贪婪的多巴胺》（丹尼尔·利伯曼）——从神经科学解释为什么短视频比心流更容易上瘾"}},{"id":"004","title":"德米安：彷徨少年时","author":"赫尔曼·黑塞（Hermann Hesse）","summary":"一个少年在光明与黑暗之间找到真正的自我——每个大学生的内心传记","tags":{"primary":"迷茫","secondary":["烦闷"]},"guide":"你总觉得你应该活成一个\"更好的人\"。这是你最累的地方，也是你最迷茫的根源。\n\n黑塞管这个叫\"光明世界\"——父母教给你的规矩、老师表扬的品质、朋友圈里被点赞的人设。你在这个世界里活了二十年，熟练、安全、但总觉得哪里不对劲。因为还有一个\"黑暗世界\"——那些你不能跟人说的嫉妒、不甘、生理冲动、对某些人的莫名厌恶——被你压在意识底下，假装不存在。辛克莱在书里用的词是\"该隐的印记\"。他花了整本书的时间去理解一件事：你不是要消灭你的黑暗面，你是要把光明和黑暗合在一起，变成你真正的名字。德米安帮他做了这件事，而你身边可能还没有德米安——这本书可以临时顶替一下。\n\n这不是一本\"读完就豁然开朗\"的书。你读的时候大部分时间会跟辛克莱一样困惑。但你会记住一个意象：一只鸟要从蛋壳里出来。蛋壳就是你现在的生活——舒服、透明、但也困住你。啄破壳的过程疼，而且你不知道外面是什么。黑塞说，没有人能替你把壳啄破，但有人可以告诉你：壳外面有空气。\n\n全书很短，但建议你分成三个晚上读完。每次读到你觉得\"这个角色在说我也不懂的话\"的时候，就合上书——第二天你会发现，那些话睡了一觉后变清楚了。这不是魔法，这是黑塞。","quotes":["鸟要挣脱出壳。蛋就是世界。谁要出生，就必须摧毁一个世界。鸟飞向神。神的名字叫阿布拉克萨斯。","每个人的生命都是一条通向自我的路，是一条路的尝试，是一条小径的悄然召唤。从来不曾有人完全成为他自己，但每个人都努力想要成为他自身——有人模糊地，有人清楚地，各尽其力。","我想要的，只是试着活出我内心真正想要活出的东西。为什么这如此困难？","如果你生来就是一只蝙蝠，你就不必像鸵鸟那样看问题。你只需正视自己的深渊，而不是把它推到别人身上。"],"extras":{"availability":"微信读书可读（多个译本，推荐姜乙译本）","ifYouLike":"《悉达多》（黑塞同作者，更短更轻）；《牧羊少年奇幻之旅》（保罗·柯艾略）——如果德米安的象征让你觉得太重，这本是它的轻量版"}},{"id":"005","title":"素履之往","author":"木心","summary":"一本不需要从头读的书——翻到哪页读哪页，每句话都是一个独立的宇宙","tags":{"primary":"无聊","secondary":["厌倦","迷茫"]},"guide":"你觉得无聊。打开手机，滑十分钟，更无聊了。不是因为手机里没有东西——是因为那些东西都不需要你动脑子。你在用不需要咀嚼的内容喂养一个需要咀嚼的大脑，然后这个大脑告诉你：我还是饿。\n\n木心写的是一本\"不需要从头读\"的书。你随便翻到哪一页，一两句话，然后合上。他会说\"生活的最佳状态是冷冷清清的风风火火\"，会说\"玩物丧志，其志小，志大者玩物养志\"，会说\"所谓无底深渊，下去，也是前程万里\"。每一句都像一个精心布置的思维陷阱——你以为你懂了，走两步发现不对，再走两步发现他说的跟你第一反应想的完全相反。这个过程叫做\"咀嚼\"。你刷一百条短视频，大脑在接收；你读一句木心，大脑开始工作。无聊和独处之间，就差这一层认知的窗户纸。\n\n这本书最适合放在手机旁边。每次你想打开一个短视频 app 的时候，先打开这本书，读一句。读完合上。你会开始发现，那句话在你走路、吃饭、发呆的时候自己发酵。你不是无聊——你只是太久没有给大脑喂需要消化的东西了。","quotes":["生活的最佳状态是冷冷清清的风风火火。","玩物丧志，其志小，志大者玩物养志。","所谓无底深渊，下去，也是前程万里。","一个人到世界上来，来做什么？爱最可爱的，最好听的，最好看的，最好吃的。","地图是平的，历史是长的，艺术是尖的。"],"extras":{"availability":"微信读书可读；纸书收录于木心作品系列（广西师范大学出版社）","ifYouLike":"《哥伦比亚的倒影》（木心散文，比素履更绵长）；《惶然录》（费尔南多·佩索阿）——另一个躲在文字后面的灵魂，比木心更不安"}},{"id":"006","title":"活着","author":"余华","summary":"一个人送走了他生命中的每一个人，然后继续活着——这不是惨，是告诉你\"活着\"这个词本身就够了","tags":{"primary":"厌倦","secondary":["疲惫","烦闷"]},"guide":"你说你厌倦了。厌倦上课，厌倦食堂，厌倦每天一模一样的生活。你说你累了。这种累不是身体累——身体累睡一觉就好了——这种累是心里的累：跟人相处要算计，不跟人相处又孤独，想努力不知道往哪使劲，想躺平又觉得自己在浪费生命。\n\n福贵没有时间想这些。\n\n他从一个败光家产的少爷，变成一介佃农。他亲手埋了他爹、他娘、他儿子有庆、他女儿凤霞、他老婆家珍、他女婿二喜、他外孙苦根。七个人，七座坟，他一个一个挖、一个一个埋。然后他买了一头老牛，耕田、吃饭、睡觉。余华没有让福贵崩溃。余华让福贵活着。是因为\"活着\"这件事本身不需要理由——不是\"为了什么而活着\"，就是\"活着\"。你厌倦的那些日常——去食堂的路上阳光很好、室友在打鼾你还没睡、洗了个热水澡——福贵用一辈子告诉你，这些东西就是活着的全部内容。\n\n读完你可能会沉默一段时间。不是难过——是觉得\"哦，原来我已经在活着了\"。这不需要你考到什么成绩、拿到什么 offer、完成什么计划。你已经在了。你在呼吸。这件事本身就够。","quotes":["人是为活着本身而活着的，而不是为活着之外的任何事物所活着。","我看着那条弯曲着通向城里的小路，听不到我儿子赤脚跑来的声音。月光照在路上，像是撒满了盐。","做人还是平常点好，争这个争那个，争来争去赔了自己的命。像我这样，说起来是越混越没出息，可寿命长。我认识的人一个挨着一个死去，我还活着。","最初我们来到这个世界，是因为不得不来；最终我们离开这个世界，是因为不得不走。"],"extras":{"availability":"微信读书可读；纸书极便宜、到处有售","ifYouLike":"《许三观卖血记》（余华同作者，比活着多了一点幽默）；《人生海海》（麦家）——另一个\"活着\"的故事，更曲折"}},{"id":"007","title":"被讨厌的勇气","author":"岸见一郎 / 古贺史健","summary":"一个困惑的年轻人和一位哲人用五个夜晚，把你的\"精神内耗\"逐层拆解，然后告诉你：你所有的痛苦都是你自己选的——你可以不选","tags":{"primary":"疲惫","secondary":["迷茫","烦闷"]},"guide":"你看这页之前，脑子里可能同时跑着三件事：某人前天那句话到底什么意思？辅导员发的那个通知要不要跟？自己好像又在浪费时间了怎么办？三件事织成一张网，你在网里打转，什么都没做，但特别累。\n\n阿德勒心理学管这个状态叫\"对他人的课题的过度介入\"。全书最锋利的概念叫\"课题分离\"——一件事的后果最终由谁承担，这件事就是谁的课题。别人怎么看你，是别人的课题，不是你的。你为之焦虑、害怕冲突、反复自我审查——这些不是别人的控制，是你自己选择把别人的课题扛在了肩上。听起来冷血？哲人用了整本书跟你辩论这件事。年轻人反复质疑、反驳、甚至愤怒——你想得到的反驳他都说了一遍，你想不到的他也说了。然后哲人逐一回应。\n\n这不是一本温情脉脉的书。你读完第一夜可能会不舒服——因为它不共情你，它戳你。读到第三夜你会开始觉得好笑——好笑自己困在那么多\"别人怎么想\"里。\"被讨厌的勇气\"不是说你要做一个讨厌的人，而是说自由就是不再害怕被某些人讨厌。你不必讨好所有室友、所有同学、所有长辈。你只需要对自己诚实。\n\n建议按书的节奏读——五个夜晚，每次读一夜（约 40 页）。哲人每顿辩论的量刚好够消化一个晚上。合上书之后，想想\"今天哪件事其实不是我的课题\"。","quotes":["所谓的自由，就是被别人讨厌。如果你无法承受被人讨厌，那你就只能继续不自由地活着。","基本上一切人际关系的矛盾，都起因于对别人的课题妄加干涉，或自己的课题被别人妄加干涉。只要能够进行课题分离，人际关系就会发生剧烈改变。","人之所以不幸，并不是因为过去或环境，更不是因为能力不足，只是因为缺乏\"获得幸福的勇气\"。","不与任何人竞争，只要自己不断前进即可。健全的自卑感不是来自与他人的比较，而是来自与\"理想的自己\"的比较。"],"extras":{"availability":"微信读书可读","ifYouLike":"《自卑与超越》（阿德勒原著，更学术但更原汁原味）；《非暴力沟通》（马歇尔·卢森堡）——课题分离解决了\"要不要管\"，非暴力沟通解决\"怎么管\""}},{"id":"008","title":"我与地坛","author":"史铁生","summary":"一个人在轮椅上把一座废弃的古园坐了十五年，把它坐成了一个宇宙","tags":{"primary":"空游无所依","secondary":["迷茫","烦闷"]},"guide":"你感到\"空游无所依\"。这个状态很抽象——没有具体的痛处，但也没有具体的锚点。你漂浮在课表、食堂、宿舍之间，像一只没系绳的气球，往哪飘都行，但往哪飘都不重要。\n\n史铁生二十岁那年突然走不了路了。这不是比喻——他真的站不起来了。愤怒、绝望、把自己关在屋子里。然后有一天他被推进了一个废弃的古园——北京地坛。他本以为只是消磨一个下午，结果他把地坛坐了十五年。在这十五年里，他发现了一件事：一个人的锚点可以不是\"事业\"、\"成就\"、\"被人需要\"这些大词，而是一种\"看见\"——看见四季在园子里轮转，看见一个老人每天准时来散步，看见落日把一面旧墙染成琥珀色，看见自己的母亲偷偷跟在轮椅后面不敢让他发现。《我与地坛》最惊人的地方在于，它不是一个\"身残志坚\"的故事。它是一个人用最缓慢的速度、在最窄小的范围内，重新学会\"待在世界上\"的故事。\n\n读这一篇就够了（书里还有其他篇目，但《我与地坛》那一篇是核心）。大概一个小时。读的时候注意看史铁生写景物的方式——他不抒情，他只描述。一棵树、一束光、一片雪。他写这些东西的方式会让你突然意识到：你很久没有真正\"看见\"你身边的东西了。无依不是因为没有东西可以依靠。是因为你还没有坐下来，安静到足够去依靠它们。","quotes":["一个人，出生了，这就不再是一个可以辩论的问题，而只是上帝交给他的一个事实；上帝在交给我们这件事实的时候，已经顺便保证了它的结果。所以死是一件不必急于求成的事，死是一个必然会降临的节日。","多年来我头一次意识到，这园中不单是处处都有过我的车辙，有过我车辙的地方也都有过母亲的脚印。","太阳，他每时每刻都是夕阳也都是旭日。当他熄灭着走下山去收尽苍凉残照之际，正是他在另一面燃烧着爬上山巅布散烈烈朝辉之时。","就命运而言，休论公道。"],"extras":{"availability":"微信读书可读（收录于《我与地坛》同名散文集）","ifYouLike":"《病隙碎笔》（史铁生，更碎更哲学）；《瓦尔登湖》（梭罗）——另一个把一片固定区域活成一个宇宙的人"}},{"id":"009","title":"刀锋","author":"威廉·萨默塞特·毛姆（W. Somerset Maugham）","summary":"一个退伍兵不工作、不社交、不解释，满世界晃荡找\"人生的意义\"——如果你也在找，他不是答案，但他证明了找本身就是一种活法","tags":{"primary":"空游无所依","secondary":["迷茫","厌倦"]},"guide":"你有过一个瞬间——比如周五晚上所有人都出去玩了，你一个人坐在宿舍里，突然不知道自己在干什么。不是难过，不是焦虑，就是\"空\"。像站在候车室的正中间，四面都有出口，但没有一个上面写着你的名字。\n\n拉里·达雷尔在书里花了十年来回答这个问题。他在一战中开过战斗机，亲眼看见战友死在他面前。退伍回来，他有体面的收入、可以迎娶一个漂亮的芝加哥姑娘、随时能进入她父亲的企业。他没有哭天喊地，也没有看破红尘。他只是说：我不想这样活。然后他去了巴黎，窝在图书馆里读哲学，每天八到十个小时。去了印度，学瑜伽、冥想、见各种奇奇怪怪的人。去了一个煤矿做苦力。最后他成了一个\"没有职业的人\"，在纽约开出租，写一本没人会出版的书。所有人都在说他荒废了人生，只有他自己知道——他一生都在做一件事：找出\"我是谁\"的答案。这件事没有 deadline，没有 KPI，而他非常认真地在做。\n\n这本小说最有意思的地方是：毛姆没有让你去崇拜拉里。他让你同时看到拉里的未婚妻伊莎贝尔——结婚、住大房子、过上流社会生活，而且过得不错。你是伊莎贝尔还是拉里？毛姆不替你选。他只是证明了一件事：空游无所依不一定是一种病；也许你只是在漂浮期，而有些人漂浮了一辈子，然后活着抵达了。","quotes":["一把刀的锋刃很不容易越过，因此智者说得救之道是困难的。","我想知道人生到底是为什么，有没有意义。我不在乎犯错误。也许在犯了一个错误之后，我能发现自己到底要什么。","我从来不觉得日子无聊。我有很多事情要想，有很多书要读。","人生如果不想随波逐流，就等于是场豪赌。但大多数人，只是求生，只有少数人才生活。"],"extras":{"availability":"微信读书可读（多个译本，推荐周煦良译本）","ifYouLike":"《月亮与六便士》（毛姆同作者，更极端的选择）；《斯通纳》（约翰·威廉斯）——另一条\"不随波逐流\"的路，比拉里更安静"}},{"id":"010","title":"人间草木","author":"汪曾祺","summary":"一个老头写葡萄怎么长、咸鸭蛋怎么腌、昆明的雨怎么下——你读完之后发现，烦闷的解药是\"把感官重新打开\"","tags":{"primary":"烦闷","secondary":["平淡","无聊"]},"guide":"你烦闷的时候有没有想过：你多久没有闻过东西了？\n\n不是手机屏幕的味道，不是食堂油炸的味道——是雨后的泥土、晒过的被子、走过一棵开花的树突然被香气砸到头。汪曾祺的《人间草木》不是写给你的大脑的，是写给你的鼻子、舌头、手指尖的。他写葡萄：\"葡萄喝起水来是惊人的。它真是在喝哎！\"写昆明的雨：\"昆明的雨季是明亮的、丰满的，使人动情的。\"写咸鸭蛋：\"筷子头一扎下去，吱——红油就冒出来了。\"没有宏大的主题，没有深刻的思想。他就是坐在院子里，看着植物长，然后记下来。\n\n为什么这个能治烦闷？因为烦闷的人有一个特征：你跟此刻绝缘。你在食堂吃饭，脑子里在想下午的事；你在上课，心里在烦昨天的事。你从来没有真正在食堂，吃那顿饭，尝那个味道。汪曾祺的文字在你眼前展开的东西不多——一棵葡萄藤、一颗咸鸭蛋、一场雨——但每一件都让你重新\"看见\"它。\"看见\"之后你发现，原来你身边有这么多东西值得看。烦闷不是因为生活没意思，是因为你把感官的闸门关了。打开它，不需要去远方，只需要低头。\n\n这本书不需要从头读到尾。建议每天读一到两篇（每篇 5-10 分钟），当饭间读物。别在饿了的时候读——他写吃的东西，杀伤力太大。","quotes":["葡萄喝起水来是惊人的。它真是在喝哎！葡萄藤的组织跟别的果树不一样，它里面是一根一根细小的导管。这一点，中国的古人早就发现了。《图经》云：\"根苗中空相通。圃人将货之，欲得厚利，暮溉其根，而晨朝水浸子中矣，故俗呼其苗为木通。暮溉其根，而晨朝水浸子中矣。\"这么说来，葡萄简直是直接在水里吸收水分的。浇了水，不大一会，它就从根直吸到梢，你简直可以听见它喝水的声音。","昆明的雨季是明亮的、丰满的，使人动情的。城春草木深，孟夏草木长。昆明的雨季，是浓绿的。草木的枝叶里的水分都到了饱和状态，显示出过分的、近于夸张的旺盛。","高邮咸蛋的特点是质细而油多。蛋白柔嫩，不似别处的发干、发粉，入口如嚼石灰。油多尤为别处所不及。鸭蛋的吃法，带壳切开，是一种，那是席间待客的办法。平常食用，一般都是敲破\"空头\"用筷子挖着吃。筷子头一扎下去，吱——红油就冒出来了。","如果你来访我，我不在，请和我门外的花坐一会儿。它们很温暖，我注视它们很多很多日子了。"],"extras":{"availability":"微信读书可读；纸书多个版本，推荐江苏文艺出版社","ifYouLike":"《食事》（汪曾祺同作者，只写吃，更专一）；《枕草子》（清少纳言）——平安时代一个宫廷女官记录\"觉得高兴的事\"：春天是破晓的时候，夏天是夜里，秋天是傍晚"}},{"id":"011","title":"陶庵梦忆","author":"张岱","summary":"一个极致繁华的过来人，在失去一切后回忆他见过的每一场雪、每一盏灯、每一出戏","tags":{"primary":"浮躁","secondary":["空游无所依","厌倦"]},"guide":"你有多久没有安静地看一场雪了？\n\n不是手机里刷到的雪景视频——是真的坐在一个地方，不说话，不动，看着白的东西从天上往下掉，看了很久，久到你觉得时间变慢了。张岱的《陶庵梦忆》是这个速度的书。他年轻时是晚明最会玩的人：中秋赏月要租几百条船、元宵观灯要看遍绍兴城里每一处灯火、喝茶要自己养一头专门运惠山泉水的驴。然后明朝亡了。他失去了一切，披发入山，形同乞丐，开始在回忆里活着。他写了湖心亭看雪——夜深了，一个人、一条船、一炉火，去湖心看雪。\"天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。\"这篇 159 个字，是中国文学史上最安静的一页。\n\n浮躁是什么？浮躁是你的时间感被调快了。你觉得一个下午很长但一刷手机就没了，你觉得一个学期很快又什么都没做成。张岱的文字是一种\"慢速播放\"。每一篇都极短——50 到 200 字——但读完之后你会发现自己自动放慢了。不需要努力，不需要冥想。就是被他的文字拖进了他的时间节奏里。\n\n建议一天读一篇，晨起或者睡前。不要多。多了就快了，快了就白读了。","quotes":["崇祯五年十二月，余住西湖。大雪三日，湖中人鸟声俱绝。是日更定矣，余挐一小舟，拥毳衣炉火，独往湖心亭看雪。雾凇沆砀，天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。","林下漏月光，疏疏如残雪。","人无癖不可与交，以其无深情也；人无疵不可与交，以其无真气也。","鸡鸣枕上，夜气方回。因想余生平，繁华靡丽，过眼皆空，五十年来，总成一梦。"],"extras":{"availability":"微信读书可读（多个版本，推荐中华书局或上海古籍版）；英文译本也极佳","ifYouLike":"《浮生六记》（沈复）——另一个在平淡中找到无限的人；《徒然草》（吉田兼好）——日本版陶庵梦忆，更碎更禅"}},{"id":"012","title":"箭术与禅心","author":"奥根·赫立格尔（Eugen Herrigel）","summary":"一个德国哲学教授在日本学了六年弓道，只为了弄明白一件事：靶子不是被射中的，是自己被\"放\"到了箭上的","tags":{"primary":"浮躁","secondary":["疲惫"]},"guide":"你在\"用力\"——这是你大多数问题的共同来源。\n\n学习的时候用力想象结果（考不好怎么办）、社交的时候用力表演（我这样说对吗）、睡前用力反思（今天又浪费了）。你的\"用力\"没有让你更有效率，它只是让你更累。赫立格尔到日本学弓道的时候，遇到了一模一样的问题。作为德国哲学教授，他用德国人的方式对待一切：分析、优化、用力做到最好。但弓道大师告诉他：不是你把弓拉开的，是\"它\"被拉开的；不是你射中了靶心，是靶心自己到了箭上。他花了五年时间才明白这不是比喻——是真的生理上不发力、不放箭，然后在某个完全放松的瞬间，箭自己飞出去了。\n\n全书不到三万字，但每一章的密度都很大。核心洞见非常简单：你一直在\"做\"事情，但你忘了还有另一种方式——让事情\"发生\"。弓道的\"放手\"不是放弃，是把最后那一小段交给弓本身——你只需要把前面的步骤做到极致，释放的那一刻，你不用管了。这在你身上叫什么？叫\"心流\"。叫\"进入状态\"。叫\"忘记自己\"。你觉得浮躁是因为你总在盯着靶子——盯着结果、盯着 deadline、盯着别人有没有在看你。师父说：把靶子忘掉，先学会呼吸。这一步学会了，靶子自己会来。","quotes":["你不应该握住弓，而应该让弓握住你。","正确的射箭之道，不在于用弓和箭去做什么，而在于让某种事情在弓箭上发生。","松开弦的时候，不要想\"我要松开\"，也不要抵抗\"我要松开\"这个念头。让松开自己到来，像一个熟透的果子从枝头坠落。","大师之所以是大师，不是因为他比旁人更努力，而是因为他完全放弃了\"努力\"这个概念。"],"extras":{"availability":"微信读书可读","ifYouLike":"《禅与摩托车维修艺术》（罗伯特·波西格）——另一个西方人用东方哲学解决现代焦虑，但更漫长、更公路；《弓与禅》（同书不同译本，译名差异）"}},{"id":"013","title":"万物有灵且美","author":"吉米·哈利（James Herriot）","summary":"一个乡下兽医的一生——母牛难产、狗儿撒娇、羊在雪地里装死——无聊是因为你没凑近了看","tags":{"primary":"无聊","secondary":["疲惫","平淡"]},"guide":"你有没有注意过，说自己\"无聊\"的人从不说\"我正在看一株草\"或者\"我正在听窗外的雨\"？无聊的人一定在室内，一定面对着屏幕，一定在等什么东西来拯救自己。吉米·哈利没有机会无聊。他每天凌晨被电话叫醒，在约克郡的山谷里开着没有暖风的旧车，把手塞进母牛的子宫里把胎位不正的小牛扳正。他的手冻僵了，身上全是血和羊水，旁边还有一个焦躁的农场主在骂天骂地。然后小牛活着出来了，母牛舔它，天刚好亮了。他站在那儿看了好一会儿，然后去下一家。这就是他的一生。\n\n如果你觉得无聊，你不是缺事情做——你是缺一件让你\"凌晨两点愿意从被窝里爬起来\"的事。吉米·哈利不是圣人，他也会抱怨、也会偷懒、也会在风雪里骂自己为什么要当兽医。但抱怨完之后，他眼睛里只有那头牛和它肚子里的小牛。这种专注不是苦行——它有一种你很久没体验过的快乐：事情本身的有趣，不依赖任何结果的有趣。\n\n建议睡前读一篇，每篇 5-10 分钟。这本书最大的副作用：你可能会开始认真观察窗外的鸟、你养的绿萝、以及食堂那个总是多给你打一勺菜的阿姨。","quotes":["我躺在草地上，闭上眼睛。温暖的阳光照在脸上，空气中充满了新翻的泥土和青草的气味。我想，即使这世界上没有天堂，这个也差不多了。","动物和人之间有一种奇妙的联系——它们不会说话，但它们的眼睛能说出一切。你只需要安静下来，就能听懂。","母牛在生产的时候，你不能急。你一急，它就怕。你一怕，它就紧张。所以你得把手慢慢伸进去，一边摸一边哼歌，什么歌都行。","约克郡的春天来得特别晚，但也特别认真。好像上帝在这个角落花了比全世界加起来更多的心思。"],"extras":{"availability":"微信读书可读（系列共 5 本，先读这一本）","ifYouLike":"吉米·哈利同系列《万物有灵》《万物既伟大又渺小》《万物既聪慧又奇妙》；如果喜欢\"认真对待小事\"的调子，试试《编舟记》（三浦紫苑）"}},{"id":"014","title":"小王子","author":"安托万·德·圣埃克苏佩里（Antoine de Saint-Exupéry）","summary":"一个外星小孩教一个地球大人重新看见\"重要的事\"——用眼睛是看不见的，只有用心才看得见","tags":{"primary":"厌倦","secondary":["空游无所依"]},"guide":"你小时候读《小王子》，可能只觉得是一个奇怪的故事：一个小孩有一朵玫瑰、三座火山、一只狐狸。后来你长大了。你开始说\"我很忙\"、\"这有什么用\"、\"能不能快一点\"。你养了一朵花但没时间浇水，交了一个朋友但都是表情包聊天，路过一片夕阳但没有抬头。恭喜，你成了圣埃克苏佩里笔下那些星球上的人——那个不停点灯熄灯的灯夫、那个忙着算账但从没闻过一朵花的商人、那个活在别人的评价里的酒鬼。\n\n《小王子》在二十岁重读的价值在于：它让你认出来，你在哪个星球上卡住了。你厌倦的那些东西——绩点、刷不完的通知、永远在赶 deadline——书里每一个大人角色都是它们的化身。而小王子问的问题始终只有一个：\"这重要吗？\"不是\"这有用吗\"，是\"这重要吗\"。\"有用\"是数字，\"重要\"是那朵花。你的日常被\"有用\"的事填满了。上一次你做一件\"重要但没用\"的事是什么时候？\n\n一个半小时。请在下午四点开始读，刚好读完之后窗外会有夕阳。然后抬头看一眼——如果你觉得今天的夕阳跟你有关，说明药效还在。","quotes":["只有用心才能看清楚。真正重要的东西，用眼睛是看不见的。","是你为你的玫瑰花所花费的时间，使她变得这么重要。","如果你驯养了我，我们就会彼此需要。对我来说，你将是世界上唯一的。对你来说，我也将是世界上唯一的。","所有的大人都曾经是小孩，虽然只有少数人记得。","你在下午四点钟来，那么从三点钟开始，我就已经开始感到幸福了。时间越临近，我就越感到幸福。"],"extras":{"availability":"微信读书可读（所有译本都有，推荐周克希或张小娴译本）","ifYouLike":"《夜航》（圣埃克苏佩里同作者，写给大人看的飞行笔记）；《夏洛的网》（E.B.怀特）——另一个关于\"建立联系\"的故事，主角是一只蜘蛛和一只猪"}},{"id":"015","title":"冬牧场","author":"李娟","summary":"一个汉族姑娘跟着哈萨克牧民去零下四十度的荒野过冬——然后发现，那些你以为\"艰苦\"的日子，其实比你\"舒适\"的日子更值得活","tags":{"primary":"厌倦","secondary":["无聊","浮躁"]},"guide":"你厌倦了。每天差不多——起床、上课、吃饭、刷手机、睡觉。你在温度的舒适区里，也在情绪的舒适区里。舒适区最大的问题不是太舒服了——而是太安全了，安全到你的身体和心灵都开始打盹了，然后告诉大脑：我无聊。\n\n李娟不是去冬牧场体验生活的。她是去干活的。拿雪当水、睡在地窝子里、一天只吃一顿饭、手冻得碗都端不住。牧民们管这个叫\"冬天\"。他们不算日子，不看时间，日出而作日入而息——这句小学语文课本上的话，你要读完《冬牧场》才知道它真正的意思是：没有闹钟、没有日程表、身体自己知道什么时候该起什么时候该睡。李娟最厉害的地方在于她不自怜，也不歌颂苦难。她只是如实记下来：羊冻死了，好难过。今天有馕吃，很高兴。明天可能要搬家，有点愁。语调平淡如水，但每一句都扎在你那个\"我的生活好无聊\"的念头上。\n\n这本书最适合的状态：期末周刚结束，你觉得整个人被掏空了，但又不知道自己想干什么。不要看手机。打开《冬牧场》的第一页，跟着李娟走进零下四十度的荒野。读完你会想喝一口热水。就是字面意义上的——倒一杯热水，认真地喝下去。你很久没有\"认真地\"喝热水了。","quotes":["天空一整天都是铅灰色的，到了傍晚，反而一点一点亮了起来。于是知道太阳还在，只是被云遮住了。在这荒野里，人是透明的。什么也藏不住，包括对自己的认识。","人的适应能力是无止境的。在零下三十多度的地方待久了，遇到零下十几度的那天，简直觉得春天来了。加一件毛衣都会嫌热。","在荒野里，时间不是用来\"抓紧\"的。时间就是用来过的。像羊吃草一样，一嘴一嘴，一棵一棵。","天空远远的，大地深深的。人走在其中，又寂寞又完整。"],"extras":{"availability":"微信读书可读","ifYouLike":"《我的阿勒泰》《夏牧场》（李娟同系列，不同的季节不同的荒野）；《遥远的向日葵地》（李娟，更个人更碎）"}},{"id":"016","title":"当我谈跑步时我谈些什么","author":"村上春树","summary":"一个小说家用三十年每天十公里的跑步记录告诉你：身体累到极限的时候，脑子反而最安静；持续做一件事不需要意志力，只需要把它变成呼吸一样自然","tags":{"primary":"疲惫","secondary":["平淡","迷茫"]},"guide":"你觉得自己很累，但仔细想想——你身体真的动过吗？你的累是\"精神的累\"：脑子跑了一天马拉松，身体只走了从宿舍到教室到食堂的距离，加起来不到两千步。村上春树管这个区别叫\"坐着的疲惫\"和\"跑着的疲惫\"。前者让你越休息越累；后者让你累完之后洗个澡、吃顿好的，然后睡得像一棵树。\n\n这本书不是教你跑步的。是教你\"持续\"的。村上写他三十年如一日——每天早上四点起床，写作五六个小时，然后跑十公里。刮风跑，下雨跑，宿醉之后跑，在希腊的烈日下跑，在波士顿的寒风中跑。别人问他怎么坚持的，他说：不是\"坚持\"——坚持暗示着你在对抗什么东西。是\"它就是生活的一部分\"。\"痛苦是不可避免的，但受苦是可以选择的\"——这是他在跑了一百公里超级马拉松之后说的。你可能不需要跑一百公里，但你一定需要知道：你烦闷、疲惫、睡不好——你的身体需要用一种物理的方式，把精神的垃圾排出去。\n\n建议在黄昏读。读完第一章，如果你手机里的健康 app 显示今天步数不到三千，把书合上，出门走二十分钟。不用跑。走就行。这是村上会建议你做的事。","quotes":["痛苦是不可避免的，但受苦是可以选择的。","我跑步，只是跑着。原则上是在空白中跑着。反过来说，也许是为了获得空白而跑着。","每天不间断地跑步，跟意志的强弱没有太大关系。能持续做一件事，是因为这件事本身适合你的体质。找到适合自己的节奏，持续下去，跟呼吸一样自然而然地做下去——这就是一切。","在某种意义上，小说家就是用慢速去观察事物的人。跑步也一样——用慢速去感受自己的身体的每一个部分。这需要时间，也需要安静。"],"extras":{"availability":"微信读书可读","ifYouLike":"《挪威的森林》（村上小说，不看故事看他写\"做一件事做到极致\"）；《天生就会跑》（克里斯托弗·麦克杜格尔）——更野的跑步书，探究人类为什么是这个星球上最能跑的生物"}},{"id":"017","title":"一个人生活","author":"谷川俊太郎","summary":"日本国民诗人八十岁以后写的独居笔记——睡觉、做饭、发呆、写诗——疲惫的解药不是更高效的时间管理，是允许自己\"什么也不做\"","tags":{"primary":"疲惫","secondary":["平淡"]},"guide":"你有没有算过，你一天当中有多少小时是真正\"属于自己\"的？不是被课程表推着走的、不是被社交期待裹着去的——就是你想做、你在做、你做完觉得\"嗯，这是我的时间\"。大概很少。而这\"很少\"就是疲惫的真正来源。不是你做的事太多了，是你做的\"自己的事\"太少了。\n\n谷川俊太郎八十多岁，一个人住。房子不大，书很多。早晨起来，不着急——先坐一会儿，等身体完全醒来。然后去厨房，给自己做味噌汤——认真地切豆腐、认真地等水烧开。上午可能写几行诗，也可能不写。下午可能出门散个步，也可能不出门。晚上泡澡、看书、睡觉。你可能会想：一个八十岁老人的日记跟我有什么关系？因为他是你所有长辈里唯一不会对你说\"你要努力\"的那一个。他的每一页都在说同一个意思：\"什么也不做的权利，是你生而为人的基本权利。\"\n\n你累了。这次累不是需要睡一觉的那种——是积累了太多的\"应该\"。这本书是一个八十岁的诗人递给你的一杯温水。喝了它，然后去想一个你今天可以删掉的事。","quotes":["一个人生活，最难的不是孤独，而是跟自己相处的时候，如何不着急。","早晨醒来，不用想今天必须做什么。这是一种能力，我花了大半生才学会。","诗不是写出来的。是等来的。你得先让自己空下来，诗才会进来。","所谓生活，就是跟时间一起慢慢地变老。不急，也不怕。时间是一个温和的伙伴，不是一个需要对抗的敌人。"],"extras":{"availability":"微信读书可读","ifYouLike":"《明天也是小春日和》（津端修一/津端英子）——一对八十多岁夫妻的田园日常，比谷川更甜一点；《做二休五》（大原扁理）——一个年轻人实践\"极简生活\"的日记，更激进"}},{"id":"018","title":"山茶文具店","author":"小川糸","summary":"在镰仓，有一家代笔写信的小店——你告诉她想说什么，她帮你选纸、挑墨、决定用多大力气落笔——读完你会重新理解\"认真做一件小事\"这个词","tags":{"primary":"烦闷","secondary":["疲惫","平淡"]},"guide":"你有多久没有用手写过字了？不是记笔记那种赶着老师的语速的狂草——是认真的、一笔一画的、这个字要多压一下这个字要轻轻提起来的\"写字\"。女主波波在镰仓继承了一家店——不是卖东西，是帮人代笔。\"请帮我写一封绝交信\"、\"请帮一个不识字的人写一封情书\"、\"请替我向死去的人说一句年轻时没说的话\"。她听，然后坐在窗前，想这件事需要用什么纸——厚的还是薄的？用哪种墨——浓的还是淡的？落笔的时候要多大劲——她是出轨的人所以要用歉意的力道，她是被背叛的人所以要用放下的力道。然后写。\n\n你烦闷的时候是不是在\"想\"——越想越闷、越想越绕、最后哪条路都走不通？波波做了另一件事。她把烦闷装进一个具体的动作里：裁纸、磨墨、落笔。每一封信写完，她自己也被放出来了一点。这不是因为信的内容有什么神奇——是因为她用手。你有多久没有让你的手替你的脑子工作了？\n\n建议周末读，一次读完。镰仓的夏天会从书里漫出来——山茶花的叶子、海风的盐味、一种叫\"人生\"的墨香。读完你可能会想给自己写一封信——写的时候注意一下你今天用的笔是什么颜色。","quotes":["写信，不只是为了传达讯息，写信本身就是在传达心意。纸的触感、墨的颜色、笔画之间的空隙——全都是语言。","绝交信不能用愤怒去写。用愤怒写出来的东西，读的人只会听到声音，不会听到意思。要把情绪压下去，用最静的水面，才能映出对方的样子。","每个字都是一口气。写的人吐出来，读的人吸进去。所以代笔这件事，其实就是替别人呼吸。","夏天结束了。镰仓的夏天要用心看才能看到——蝉壳、蚊香、冰镇西瓜、傍晚的火烧云。这些东西不讲大道理，但看完之后你就不烦了。"],"extras":{"availability":"微信读书可读（有续集《闪闪发光的人生》）","ifYouLike":"《闪闪发光的人生》（小川糸，同系列续集）；《编舟记》（三浦紫苑）——另一本\"把一件小事做到极致\"的小说"}},{"id":"019","title":"浮生六记","author":"沈复","summary":"两百年前一个普通人，把娶了喜欢的姑娘、种花、游山玩水写成了一本传世之作——\"有意思\"不来自于大事，来自于一双会看的眼睛","tags":{"primary":"平淡","secondary":["烦闷","空游无所依"]},"guide":"你在追\"更好的生活\"。更好吃的、更好看的、更好玩的。但这本书的作者沈复会告诉你一个完全相反的事实：最好的东西你已经见过了，你只是没有认真看。\n\n两百多年前，沈复娶了一个叫陈芸的姑娘，两个人没什么钱，但是\"会活\"。他们在苏州租了一间小房子，在院子里种花——不是什么名贵品种、就是路边挖来的野花野草。春天把花盆搬出来晒太阳，秋天搬回去，一年一年，乐此不疲。芸娘爱吃腐乳——就是豆腐乳——沈复一开始嫌臭，后来跟着吃、吃出了味。他们俩一起逛庙会、游太湖、在月光下喝茶。沈复用了一整本书来记这些事——不是因为他的人生很精彩，是因为他有一双\"觉得什么都有意思\"的眼睛。\n\n这本书的关键不在\"平淡的生活也能幸福\"——那个太鸡汤了。关键在于：沈复后来什么都失去了——被父母赶出家门、穷得叮当响、芸娘早逝、儿子夭折。他一个人孤零零地写这本书。但他写的时候，不是写苦难——是写芸娘吃腐乳的样子、写沧浪亭那个晚上的月光。他不是在美化记忆，他是真的觉得那些东西是好东西，值一本书。\"平淡\"不是用来凑合着活的，\"平淡\"是等你失去一切之后发现最重要的东西一直在平淡里面。","quotes":["芸曰：\"他年当与君卜筑于此。买绕屋菜园十亩，课仆妪，植瓜蔬，以供薪水。君画我绣，以为诗酒之需。布衣菜饭，可乐终身，不必作远游计也。\"余深然之。","夏月荷花初开时，晚含而晓放。芸用小纱囊撮茶叶少许，置花心。明早取出，烹天泉水泡之，香韵尤绝。","是夜月色颇佳，俯视河中，波光如练。轻罗小扇，并坐水窗，仰见飞云过天，变态万状。","人生坎坷何为乎来哉？往往皆自作孽耳。余则非也。多重情诺，爽直不羁，转因之为累。"],"extras":{"availability":"微信读书可读（推荐张佳玮译本，有白话对照）；纸书多个版本","ifYouLike":"《陶庵梦忆》（张岱，比沈复更奢华也更苍凉）；《秋灯琐忆》（蒋坦）——清代另一对伉俪的自传，比浮生六记更痛"}},{"id":"020","title":"看不见的城市","author":"伊塔洛·卡尔维诺（Italo Calvino）","summary":"马可·波罗给忽必烈汗讲述他见过的五十五座城市——每一座都是一页，每一座都是一种活法","tags":{"primary":"平淡","secondary":["无聊","空游无所依"]},"guide":"如果你觉得\"平淡\"，问自己一个问题：你上一次注意到你所在的城市是什么时候？不是导航上的路名、不是外卖的送达范围——是你走在路上，注意到阳光从一个特定的角度打在某一面墙上，注意到那家你路过一百次但从没进去过的店，注意到这个季节的风是从哪个方向吹来的。\n\n马可·波罗是一个威尼斯人，被派去跟忽必烈讲他旅行中见过的城市。但他讲的每一座城都是他编的——一座悬在深渊上的城、一座由水管和水龙头组成的城、一座每个人都在追同一个女人的城。五十五座城市，没有一座是真实的。但每一座都比你住的城市\"更真实\"——因为它能让你在放下书之后，重新看见你正在呼吸的那个地方。忽必烈问他：\"你为什么不讲你的故乡威尼斯？\"马可·波罗说：\"我讲的所有城市，都是威尼斯。\"你的城市在哪？\n\n每篇两到三页，不需要顺序读。建议先翻到\"城市与记忆\"那一组——然后跳着看，看到哪座城的名字打动你就停下来。这五十五座城市里一定有一座是你现在住的——只不过你以前不知道。","quotes":["记忆中的形象，一旦用词语固定下来，就会被抹去。也许我不愿谈论威尼斯，是因为害怕失去它。也许我在谈论其他城市时，我已经在一点点地失去它。","对于一座城市，你所喜欢的不在于七个或七十个奇景，而在于她对你提的问题所给予的答复。或者在于她提出的、迫使你回答的问题。","城市像海绵一样，吸收不断涌流的记忆的潮水，并随之膨胀。对今日扎伊拉的描述，应包含扎伊拉的整个过去。","他乡是一块负面的镜子。旅人认出他所有的是多么少，而他从未拥有和永远不会拥有的是多么多。","在地狱里寻找非地狱的人和物，学会辨别他们，使他们存在下去，赋予他们空间。"],"extras":{"availability":"微信读书可读（推荐张密译本）；英文译本 Invisible Cities 同样极美","ifYouLike":"《如果在冬夜，一个旅人》（卡尔维诺同作者，更结构的游戏）；《城市发展史》（刘易斯·芒福德）——如果看完五十五座虚构的城想了解一下真正的城"}},{"id":"021","title":"山月记","author":"中岛敦","summary":"\"我深怕自己本非美玉，故而不敢加以刻苦琢磨\"——一个日本作家用汉唐故事，写尽了知识分子的自我怀疑","tags":{"primary":"迷茫","secondary":["烦闷","空游无所依"]},"guide":"\"我深怕自己本非美玉，故而不敢加以刻苦琢磨；却又半信自己是块美玉，故又不肯庸庸碌碌，与瓦砾为伍。\"\n\n如果你读完这句话之后沉默了——你可能是李征。李征是唐代陇西一个天才文人，二十岁进士及第。但他不愿做小吏，辞官回乡，想写出传世的诗。写不出来。穷了，只好再回去做官，但回去之后发现当初不如他的人已经爬到了他头上。他疯了——在一个月夜跑进山林，渐渐变成了一只老虎。中岛敦把这个中国老故事改写成了一篇二十分钟就能读完的短篇小说。但读完之后的回音，大概会持续两周。\n\n你的迷茫可能跟李征一模一样：你不是没有能力，你是不敢验证自己的能力。因为一旦验证了，你就必须面对一个结果——你可能只是普通的好，不是天才。而\"不验证\"让你可以永远保有一种可能性。这种可能性像一个保险箱，你从来不打开它，但你知道它在，它让你觉得自己还不错。中岛敦告诉你：这个保险箱就是你的牢笼。变成老虎的不是你的才华没有被看见——是你自己不敢打开看。","quotes":["我深怕自己本非美玉，故而不敢加以刻苦琢磨；却又半信自己是块美玉，故又不肯庸庸碌碌，与瓦砾为伍。于是我渐渐地脱离凡尘，疏远世人，结果便是一任愤懑与羞恨日益助长内心那怯弱的自尊心。","其实，任何人都是驯兽师，而那野兽，无非就是各人的性情而已。于我而言，这种妄自尊大的羞耻心就是野兽，是猛虎。","我常卖弄什么\"无所作为，则人生太长；欲有所为，则人生太短\"的格言，其实我哪有什么远大的志向，无非是害怕暴露自己才华不足的恐惧，和不肯刻苦用功的无耻之怠惰而已。","世上每个人都是驯兽师，而那头野兽，就是每人自己的性情。"],"extras":{"availability":"微信读书可读（推荐代珂译本）；书中另有《名人传》《悟净出世》等篇同样精彩","ifYouLike":"《悟净出世》（同书另一篇，讲沙僧在流沙河里做哲学研究——比山月记更奇诡）；《变形记》（卡夫卡）——另一个变成虫子的故事，中岛敦的老虎某种意义上在致敬它"}},{"id":"022","title":"旅行的艺术","author":"阿兰·德波顿（Alain de Botton）","summary":"一本教你在家门口旅行的书——出发的真谛不是逃离此地，是重新发现此地","tags":{"primary":"无聊","secondary":["平淡","浮躁"]},"guide":"你脑子里可能闪过很多次\"好想出去走走\"。然后打开旅行 app，看了一圈机票，觉得太贵、太远、太麻烦，关了。\n\n阿兰·德波顿这本书不是教你订机票的。是教你重新看——你没有去过你家楼下那个拐角。不是字面意义上的没去过——你每天路过，但从来没有站在那里看过。没有注意过阳光在某个特定时刻打在那面墙上是什么颜色，没有注意过那条街的尽头在天黑前最后五分钟是什么样子。德波顿把这叫做\"旅行的艺术\"——不是因为你要去很远，而是因为你学会了用旅行者的眼睛看身边。他写梵高教他看普罗旺斯的麦田、写华兹华斯教他看湖区的黄昏，然后反过来——等你放下书，你的眼睛会自动带上这种\"旅行模式\"。学校门口的奶茶店、宿舍楼下那棵树、食堂那条永远在漏水的空调管——突然都值得看了。\n\n无聊的时候，你最不需要的就是更大的刺激。你需要的是把感官重新调灵敏，然后你会发现刺激已经够了——你不需要换地方，你需要换眼睛。","quotes":["我们从旅行中获取的乐趣，或许更多地取决于我们旅行时的心境，而不是我们旅行的目的地本身。","一个人只能看到他已经准备好看的东西。在旅行中如此，在生活中也是如此。","我们出行的主要目的，无非是希望在别处找到我们在家里没能找到的东西。","注视一片风景，就是把自己的身份倾注于那片风景之中。梵高在普罗旺斯找到的，不是普罗旺斯，而是他自己。"],"extras":{"availability":"微信读书可读（上海译文出版社译本）","ifYouLike":"《幸福的建筑》（阿兰·德波顿，同作者，写建筑和幸福的关系）；《观看之道》（约翰·伯格）——更专业地教你\"怎么看\""}},{"id":"023","title":"查令十字街 84 号","author":"海莲·汉芙（Helene Hanff）","summary":"一个纽约穷作家和一个伦敦旧书店之间通了二十年信——两个从未见面的人，靠对书的共同热爱，把平淡通信活成了一种比见面更亲密的关系","tags":{"primary":"无聊","secondary":["平淡","烦闷"]},"guide":"你有没有一个人——你不知道 ta 长什么样，没见过 ta 的脸，但你知道 ta 吃鸡蛋的时候会想到你，因为有一次你说过\"我寄的鸡蛋你们收到了吗\"。\n\n1949 年，海莲·汉芙在纽约，是个穷编剧，住在一间\"连书架都是自己用木板钉的\"公寓里。她发现伦敦有一家旧书店——马克斯与科恩书店，在查令十字街 84 号——专门卖她买得起的旧书。她写了一封信去订书，店员弗兰克·德尔回了一封正经的、签了名的商业回执。然后他们就通了二十年的信。海莲寄火腿和鸡蛋给战后物资配给的英国店员们，弗兰克找遍了英国给她淘她想读的每一本冷门旧书。她的信里全是感叹号和括号和括号里的感叹号——她说\"你们这些英国人怎么连鸡蛋都买不到？！\"弗兰克的信里永远是温和的、正式的——\"亲爱的汉芙小姐，您的书已于昨日寄出。\"他们一辈子没有见过面。信停了，弗兰克死了。\n\n这本书是一个反证——无聊不是因为你没有社交生活，是因为你的社交里没有\"真正在意\"。海莲和弗兰克之间没有表情包、没有\"在吗\"、没有朋友圈点赞。但那些信，每一封都是一个人在另一个人的生命里留下的一个笔画。","quotes":["如果你们恰好路过查令十字街 84 号，请代我献上一吻，我亏欠它良多。","我喜欢扉页上有题签、页边写满注记的旧书；我爱极了那种与心有灵犀的前人冥冥共读，时而戚戚于胸、时而被耳提面命的感觉。","你们若恰好路经查令十字街 84 号，就代我献上一吻吧，我亏欠它太多。"],"extras":{"availability":"微信读书可读（译林出版社陈建铭译本，推荐理由：译者笔调贴近海莲的烟火气）","ifYouLike":"《根西岛文学与土豆皮馅饼俱乐部》（玛丽·安·谢弗）——另一本书信体，讲二战时一群岛民用读书熬过黑暗"}},{"id":"024","title":"局外人","author":"阿尔贝·加缪（Albert Camus）","summary":"默尔索对一切说\"都行\"——妈妈死了，都行；女朋友要结婚，都行；杀了人，好像也不是很在乎——但加缪不是让你学他，是让你看清：厌倦到极致的样子，并不自由","tags":{"primary":"厌倦","secondary":["平淡","空游无所依"]},"guide":"你说\"都行\"的时候，是自由吗？\n\n默尔索是二十世纪文学史上最著名的\"都行\"的人。妈妈死了——他记不清是昨天还是今天。老板要提拔他去巴黎——都行，去不去没区别。女朋友玛丽问他要不要结婚——\"如果你想，我们就结。\"他在海滩上杀了人——不是愤怒，不是仇恨，是因为太阳太大了，剌眼睛。审判他的时候，检察官关心的是\"他在母亲葬礼上没有哭\"而不是\"他杀了人\"。他全程旁观自己的审判，像一个局外人。\n\n这不是一个\"要活出真我\"的鸡汤故事。加缪的厉害在于，他不评判默尔索——他让默尔索做他自己，然后把整个社会的虚伪放在默尔索旁边对比。结果你发现：默尔索是唯一诚实的人——他不假装悲伤、不假装热情、不假装在乎。但社会的审判也是真实的——一个\"不对任何事有感情\"的人，会被视为异类、会面临惩罚。问题于是变成：你愿意为自己的\"无所谓\"付出多少代价？如果你连这也不在乎，那你到底是自由的，还是只是麻木了？\n\n全书很短。建议周日早上读，然后一整天别安排事。脑子会自己转。","quotes":["今天，妈妈死了。也许是昨天，我不知道。","我体验到这个世界如此像我，如此友爱融洽，觉得自己过去曾经是幸福的，现在仍然是幸福的。为了把一切都做得完善，为了使我不感到自己是那么孤单，我只期望处决我的那天有很多人来观看，并对我报以仇恨的喊叫。","人生在世，永远也不该演戏作假。","在我所度过的整个那段荒诞生活期间，一股阴暗的气息，从未来前途的深处向我扑面而来，它穿越了尚未来临的岁月，所到之处，使人们曾经向我建议的所有一切都变得无足轻重。"],"extras":{"availability":"微信读书可读（推荐柳鸣九译本）；另有郭宏安译本同样经典","ifYouLike":"《西西弗神话》（加缪，同作者的哲学论文，解释\"荒谬\"）；《异乡人》（同书另一译名，内容一样）"}},{"id":"025","title":"沉思录","author":"马可·奥勒留（Marcus Aurelius）","summary":"一个罗马皇帝在军营帐篷里写给自己的私人笔记——你白天的焦虑，他在一千八百年前都消化过了","tags":{"primary":"疲惫","secondary":["迷茫","烦闷"]},"guide":"你每天脑子里那些东西——别人的一句话让你烦躁了半天、不知道自己做的事有什么意义、对未来感到不确定——一个叫马可·奥勒留的罗马皇帝在一千八百年前也想过了。区别在于，他把这些想法写下来不是为了出版，是为了每天早上提醒自己：你今天可能会遇到很多让你失控的东西，但你可以不失控。\n\n《沉思录》不是一本哲学书——是一本私人的精神操练笔记。奥勒留在里面反复写的不是理论，是\"你今天该怎么做\"——早上起来，对自己说：不要把时间浪费在那些不在乎你的人的评论上。遇到让你生气的人，停下来，想——他的行为是他的事，你的反应是你的事。一件事让你痛苦，不是因为它本身痛苦，是因为你对它的判断让你痛苦。如果你说\"这就是老了\"\"谁不知道这个\"\"这有什么新鲜的\"——你说得对。这些道理你都听过。但你有没有在哪一天真正遵守过其中的一条？\n\n每天读两三页。它不适合一口气读完——太稠了。建议睡前看，看完之后关灯，把当天发生的一件让你烦的事重新想一遍——用奥勒留的方式。","quotes":["清晨起来，对自己说：今天我将遇到好管闲事的人、忘恩负义的人、傲慢的人、欺诈的人、嫉妒的人和孤僻的人。他们之所以如此，是因为他们分辨不清善与恶。但我已见到善与恶的本性，知道作恶的人与我血脉相连——不仅同属一类族裔，而且享有同样的理智与神性。所以我不会让任何人伤害我，因为我知道愤怒与对抗只能伤害我自己。","你有能力控制自己的思想——而不被外界事物所控制。明白了这一点，你将找到力量。","你做的每一件事，最后都要问自己：这件事是否必要？不仅是不必要的事，连不必要的念头也要抛弃。因为多余的念头会带来多余的行为。","宇宙是变化，人生是看法。","不要像是对此生的时间还有一千年的把握那样去生活。死亡悬挂在头顶。当你能做善事时，当你可以的时候，就去做；说话时，不要犹豫。"],"extras":{"availability":"微信读书可读（推荐何怀宏译本，最通顺；梁实秋译本偏古雅）","ifYouLike":"《人生的智慧》（叔本华）——比奥勒留更刻薄，但同样每句都是匕首；《论幸福生活》（塞涅卡）——另一个斯多葛派的罗马人，比奥勒留更接地气"}},{"id":"026","title":"撒哈拉的故事","author":"三毛","summary":"一个女人跑到撒哈拉沙漠去生活，不是因为那里好，是因为她想去——一个人最自由的时刻，就是发现\"想去\"这个词不需要任何理由","tags":{"primary":"空游无所依","secondary":["无聊","平淡"]},"guide":"你有没有一个瞬间，觉得\"现在的生活不属于我\"？不是难过，也不是愤怒——就是一种陌生的感觉：我为什么会在这里，做这些事，认识这些人。\n\n三毛在《国家地理》杂志上看了一张撒哈拉沙漠的照片，然后她就去了。不是去旅游，是去住。她的先生荷西先过去找了工作，她随后到的，两个人租了一间沙漠边缘的小破房子，没有水，没有电，床上掉沙子，邻居借东西从来不还。她穿着白裙子在沙漠里走路，学会了说阿拉伯语，给邻居看病——半本生理卫生书+一盒消炎药就当了医生。她用棺材板做沙发，用沙漠里捡来的骆驼骨头做装饰品，在家门口的水泥台阶上看夕阳。她管撒哈拉叫\"我前世的故乡\"。\n\n你不需要搬到撒哈拉。你只需要找到你的撒哈拉——一件让你眼睛发亮的事情，小到你可以明天就开始做。三毛不是勇敢的人——她只是不肯等。她不肯等到\"一切都准备好了\"才去活。","quotes":["每想你一次，天上飘落一粒沙，从此形成了撒哈拉。","生命，在这样偏僻落后而贫苦的地方，一样欣欣向荣地滋长着。它，并不是挣扎着在生存，对于沙漠的居民而言，他们在此地的生老病死都好似是如此自然的事。","自由自在的生活，在我的解释里，就是精神的文明。","我只看了一遍，我不能解释的，在那个时候，就莫名其妙地把自己的一辈子，交给了那片陌生的大地。"],"extras":{"availability":"微信读书可读（三毛全集均有）","ifYouLike":"《哭泣的骆驼》（三毛同系列）；《万水千山走遍》（三毛，写南美，比撒哈拉更漂泊）"}},{"id":"027","title":"草枕","author":"夏目漱石","summary":"一个画家逃离东京，住进山间温泉旅馆——\"非人情\"的视角看世界，烦闷就变成了一幅画","tags":{"primary":"烦闷","secondary":["浮躁","空游无所依"]},"guide":"你有没有过一种冲动：把手机关了，坐上一趟不知道去哪的公交车，然后看着窗外，什么都不想？\n\n夏目漱石写了一本小说来实现这个冲动。一个画家，从东京出发，往山里去。没有目的地，没有任务，就是走。到了山里的温泉旅馆，泡一泡温泉，看看山岚，听听雨打在房檐上。跟老板娘聊两句，跟一个剃头的老头聊两句。有人请他画画，他不画——不是不想画，是他还没看够。夏目漱石说，艺术家要有一双\"旁观者\"的眼睛——\"非人情\"的眼睛。不是冷漠，是抽掉\"功利\"\"关系\"\"是非\"，只看颜色、线条、光影。用这种眼睛看世界，一场雨不在好不好——它就是水从天空往下掉的那种\"透明的东西\"，一种空气变湿了的感觉。把\"好不好\"\"应该不应该\"\"别人怎么想\"全部拿掉，你剩下的就是你看见的东西。\n\n你烦闷，不是因为你看见的东西太多了——正好相反。你看见的东西太少了。你看见的全是被你的焦虑\"染色\"后的东西。这本书是一剂褪色剂。","quotes":["山路を登りながら、こう考えた。智に働けば角が立つ。情に棹させば流される。意地を通せば窮屈だ。とかくに人の世は住みにくい。\n（登着山路，我想。依理行事，就会棱角伤人；任情而动，就会被浪潮冲走；一味固执己见，就会处处碰壁。总而言之，人世间不好住。）","いくたびも見飽かずに思うのは、ただこの自然の風景ばかりである。\n（百看不厌的，只有这自然的风景而已。）","人の世の住みにくさが高じると、安らかな所へ引き越したくなる。どこへ越しても住みにくい、と悟った時、詩が生まれて、画ができる。\n（忍受不了人世间的不便，就想搬到更清净的地方去。等明白了搬到哪里都一样住着不舒服时，诗就诞生了，画就成了。）"],"extras":{"availability":"微信读书可读（推荐陈德文译本）","ifYouLike":"《雪国》（川端康成）——同样是山间旅馆、同样是没什么情节，但比草枕更冷更美；《门外汉的京都》（舒国治）——一个现代人在京都的小巷子里漫无目的地走"}},{"id":"028","title":"地下室手记","author":"陀思妥耶夫斯基（Fyodor Dostoevsky）","summary":"一个自认比所有人都聪明的人，在地下室里跟自己吵了整本书——陀思妥耶夫斯基用它来警告你：过度的自我意识会把你活埋","tags":{"primary":"烦闷","secondary":["空游无所依","厌倦"]},"guide":"你如果曾经在深夜想过这些东西：\"我其实不差，但为什么每次到关键时刻就退回来了？\"\"我在脑子里模拟了一百遍怎么跟 ta 说话，但真的见了面还是说不出那句话。\"\"我好像比别人都清醒，但清醒没有让我过得更好——让我更累了。\"恭喜，你体内住着一个\"地下室人\"。\n\n陀思妥耶夫斯基在 1864 年写了一个没有名字的人，他四十二岁，公务员退休，住在地下室里，写了一本自己跟自己吵架的自白。这个人是世界上最清醒的人——他能比任何人都精准地分析出\"为什么我今天不去赴那个约\"的所有深层原因，能比心理医生更快地诊断出\"我其实是在为了不被拒绝而先拒绝对方\"。他会用两百页来跟你辩论一个你从来没想过的问题：\"一个人有没有权利按自己的意志去行动——即使这个行动会伤害他自己？\"然后他会说：有。因为如果你剥夺了我做一件毫无好处、纯粹因为\"我想做\"的事的权利，你等于把\"我\"从世界上拿掉了。\n\n这不是一本温和的书。它不治愈。它是一面黑镜子，让你看见自己的\"过度自我意识\"长什么样。如果你读完觉得痛——痛就对了。","quotes":["我是一个有病的人……我是一个心怀恶意的人。我是一个不讨人喜欢的人。我想我的肝脏有病。但我对自己的病一窍不通，甚至不能确定我到底哪里疼。","人之所以如此喜欢体系与抽象推论，是为了在面对事实时可以逃避责任。","我向你们发誓，先生们，过多的意识就是一种病——一种真正的、十足的病。","一个人可能会故意地、有意识地希望自己受害，甚至希望自己被毁灭。","人的最好定义就是一个两条腿的、忘恩负义的动物。"],"extras":{"availability":"微信读书可读（推荐臧仲伦译本，语气最接近地下室人的神经质；刘文飞译本稍温和）","ifYouLike":"《罪与罚》（陀思妥耶夫斯基，同样的问题但更有故事性）；《局外人》（加缪）——地下室人的反面：一个\"想得太少\"的人"}},{"id":"029","title":"瓦尔登湖","author":"亨利·戴维·梭罗（Henry David Thoreau）","summary":"一个人在湖边住了两年两个月两天——不是为了隐居，是为了\"故意地活\"，把生活压榨到只剩下最必要的东西，然后看看它还剩下什么","tags":{"primary":"平淡","secondary":["浮躁","疲惫"]},"guide":"你有没有算过，维持你目前的生活，一年需要多少钱？梭罗算了。1845 年，他花了三美元在瓦尔登湖边盖了一间木屋。他种豆子、钓鱼、烤面包——不是因为他喜欢种地，是因为他想知道\"一个人活着最少需要多少钱\"。他的答案是：六个星期的工作。一年只需工作六个星期，就可以养活自己。然后他问了一个问题——剩下的四十六个星期，你在干什么？\n\n你在大二，可能被绩点、实习、社团、人际关系塞得满满当当。你有没有哪一天是\"故意地活\"的？不是被推着走的，是\"我选择今天这样过\"——然后你真的那样过了。梭罗做了一件极端的事：他搬到森林里，不是因为讨厌人类，是想把生活里非必要的东西全部砍掉，然后看剩下什么。\"我没有去森林是因为我想去死，我是想蓄意地活着，只面对生活最基本的事实。\"你的日常被太多东西包裹了——通知、热搜、群消息、代取快递。它们合在一起制造了一种\"我很忙\"的幻觉。但实际上你忙完之后回想，什么都没留下来。\n\n这本书不短，但可以跳着读。建议先读\"经济篇\"、\"我生活的地方，我生活的目的\"、\"孤独\"、\"春天\"这四章。剩下的慢慢翻。","quotes":["我到林中去，因为我希望谨慎地生活，只面对生活的基本事实，看看我是否学得到生活要教育我的东西，免得到了临死的时候，才发现我根本就没有生活过。","大多数人都过着静悄悄绝望的生活。所谓的听天由命，正是对绝望的确认。","一个人越是能够放弃一些东西，就越是富有。","时间不过是我钓鱼的那条溪流。我啜饮着它；但在我啜饮的时候，我看到了它的沙底，发现它是多么浅。它的细细的水流流走了，但永恒留下来了。","如果一个人和他的同伴们步调不一致，也许是因为他听见的是不同的鼓点。让他按照自己听到的音乐前进，不管那是什么节奏，或有多远。"],"extras":{"availability":"微信读书可读（推荐徐迟译本，最经典；王家湘译本更现代）","ifYouLike":"《寂静的春天》（蕾切尔·卡森）——如果瓦尔登湖让你爱上了自然；《小即是美》（E.F.舒马赫）——如果\"经济篇\"让你开始思考\"到底需要多少钱\""}},{"id":"030","title":"边城","author":"沈从文","summary":"湘西小镇的一对祖孙、一条渡船、一条黄狗——你读完会发现\"没什么事发生\"也可以是一部杰作，而且\"没什么事发生\"恰好是你现在最需要的东西","tags":{"primary":"平淡","secondary":["烦闷","空游无所依"]},"guide":"你有没有读过一本书，读完之后觉得\"什么都没有发生\"，但合上书的时候眼睛是湿的？\n\n《边城》就是这样的书。湘西边境有一个小镇叫茶峒，有一条河，河边住着一个老船夫和他的孙女翠翠，还有一条黄狗。翠翠长大了，端午节看龙舟，遇见了傩送——当地船总的二儿子。他喜欢她，她也喜欢他。傩送的哥哥天保也喜欢她。后来哥哥出事了，傩送走了。翠翠等。小说的最后一句是：\"这个人也许永远不回来了，也许明天回来。\"全书完。就这些。没有反转、没有高潮、没有坏人。\n\n这才是它最厉害的地方。你每天被喂了太多情节——朋友圈的狗血八卦、热搜的反转、app 上的\"分分合合\"。你的情感阈值被调到了\"没有大事就不值得在意\"的档位。沈从文反着来——他让你花一个下午，看河水怎么流、渡船怎么摆、一个十七岁的女孩怎么在月光下想一个人。你需要重新学会被\"平淡\"打动。翠翠什么都没有说，但你知道她心里有整条河。\n\n建议找一个安静的周末下午。倒一杯茶，找一把硬的椅子。不要躺着看——坐着，像一个认真的读者。读完最后一页，看一眼窗外。","quotes":["这个人也许永远不回来了，也许明天回来。","一切充满了善，然而到处是不凑巧。既然是不凑巧，因之素朴的善终难免产生悲剧。","雨落个不止，溪面一片烟。","到了冬天，那个圮坍了的白塔，又重新修好了。那个在月下唱歌，使翠翠在睡梦里为歌声把灵魂轻轻浮起的年轻人，还不曾回到茶峒来。"],"extras":{"availability":"微信读书可读；纸书极便宜、各出版社均有","ifYouLike":"《湘行散记》（沈从文，同一条河的散文版）；《呼兰河传》（萧红）——另一部\"无事发生\"的杰作，但比边城更冷"}}];

var tags = ["无聊", "迷茫", "厌倦", "浮躁", "疲惫", "空游无所依", "烦闷", "平淡"];
var currentIndex = 0;
var playCount = 0;
var cycleTimer = null;
var whisperTimer = null;
var hideTimer = null;

function markHintAsSeen() {
    var whisperEl = document.getElementById("delayed-whisper");
    if (whisperTimer) clearTimeout(whisperTimer);
    if (hideTimer) clearTimeout(hideTimer);
    if (whisperEl) whisperEl.classList.remove("show");
    try { localStorage.setItem("shufang-hint-seen", "1"); } catch(e) {}
}

function initMirror() {
    var HINT_KEY = "shufang-hint-seen";
    var dailyBtn = document.getElementById("daily-btn-mirror");
    dailyBtn.classList.add("idle-breathe");

    var _hintSeen = false;
    try { _hintSeen = localStorage.getItem(HINT_KEY) === "1"; } catch(e) {}
    if (!_hintSeen) {
        var whisperEl = document.getElementById("delayed-whisper");
        whisperTimer = setTimeout(function() {
            if (whisperEl) whisperEl.classList.add("show");
            hideTimer = setTimeout(function() { markHintAsSeen(); }, 4000);
        }, 11000);
    }
    document.getElementById("zone-prev").addEventListener("click", function() {
        markHintAsSeen(); currentIndex = (currentIndex - 1 + tags.length) % tags.length; playWord(currentIndex);
    });
    document.getElementById("zone-next").addEventListener("click", function() {
        markHintAsSeen(); currentIndex = (currentIndex + 1) % tags.length; playWord(currentIndex);
    });

    var listOverlay = document.getElementById("list-overlay");
    var closeList = function(e) { if(e) e.stopPropagation(); listOverlay.classList.remove("visible"); };
    document.getElementById("btn-show-all").addEventListener("click", function(e) {
        e.stopPropagation(); markHintAsSeen(); listOverlay.classList.remove("hidden"); listOverlay.classList.add("visible");
    });
    document.getElementById("btn-close-all").addEventListener("click", closeList);
    document.getElementById("list-backdrop").addEventListener("click", closeList);
    document.querySelectorAll(".poetry-btn").forEach(function(btn) {
        btn.addEventListener("click", function(e) { e.stopPropagation(); closeList(); navigateToTag(e.target.dataset.tag); });
    });
    document.getElementById("daily-btn-mirror").addEventListener("click", function() { markHintAsSeen(); navigateToTag("daily"); });
}

function playWord(index) {
    var scalerEl = document.getElementById("zone-enter");
    var dailyBtn = document.getElementById("daily-btn-mirror");
    if (!scalerEl) return;
    scalerEl.innerHTML = "";
    var newEl = document.createElement("div");
    newEl.className = "emotion-word breathing";
    newEl.textContent = tags[index];
    newEl.classList.add(tags[index].length > 2 ? "word-long" : "word-short");
    newEl.addEventListener("click", function() {
        markHintAsSeen();
        clearTimeout(cycleTimer);
        scalerEl.classList.add("clicked");
        document.getElementById("home-view").style.backgroundColor = "hsl(40, 20%, 95%)";
        setTimeout(function() {
            scalerEl.classList.remove("clicked");
            document.getElementById("home-view").style.backgroundColor = "";
            navigateToTag(tags[currentIndex]);
        }, 300);
    });
    scalerEl.appendChild(newEl);
    if (playCount > 0 && playCount % tags.length === 2) {
        dailyBtn.classList.remove("idle-breathe");
        dailyBtn.classList.add("flash-highlight");
        setTimeout(function() {
            dailyBtn.classList.remove("flash-highlight");
            dailyBtn.classList.add("idle-breathe");
        }, 2000);
    }
    playCount++;
    clearTimeout(cycleTimer);
    cycleTimer = setTimeout(function() {
        if (playCount <= tags.length) {
            currentIndex = (currentIndex + 1) % tags.length;
        } else {
            var rs = Math.floor(Math.random() * 3) + 1;
            currentIndex = (currentIndex + rs) % tags.length;
        }
        playWord(currentIndex);
    }, 5500);
}

// === 算法 & 缓存 ===
function isStorageAvailable() { try { var t="__t__"; localStorage.setItem(t,t); localStorage.removeItem(t); return true; } catch(e) { return false; } }
function getSeenBooks() { if(!isStorageAvailable()) return []; try { var d=localStorage.getItem("shufang-seen"); return d?JSON.parse(d):[]; } catch(e) { return []; } }
function pushSeenBook(id) { if(!isStorageAvailable()) return; try { var s=getSeenBooks(); if(!s.includes(id)) { s.push(id); if(s.length>5) s.shift(); localStorage.setItem("shufang-seen",JSON.stringify(s)); } } catch(e) {} }
function getDailyDose(ds) { if(!isStorageAvailable()) return null; return localStorage.getItem("shufang-dose-"+ds); }
function setDailyDose(ds,id) { if(!isStorageAvailable()) return; try { localStorage.setItem("shufang-dose-"+ds,id); cleanOldDoses(ds); } catch(e) {} }
function cleanOldDoses(cds) { var today=new Date(cds).getTime(); for(var i=0;i<localStorage.length;i++) { var k=localStorage.key(i); if(k&&k.startsWith("shufang-dose-")) { var kt=new Date(k.replace("shufang-dose-","")).getTime(); if(today-kt>7*24*60*60*1000) localStorage.removeItem(k); } } }

function matchBook(tag,books,seenIds) {
    if(tag==="daily") { var fresh=books.filter(function(b){return !seenIds.includes(b.id);}); var pool=fresh.length?fresh:books; return {book:pool[Math.floor(Math.random()*pool.length)],degraded:false}; }
    var pool=books.filter(function(b){return b.tags && b.tags.primary===tag;});
    var degraded=false;
    if(!pool.length||pool.every(function(b){return seenIds.includes(b.id);})) { var sp=books.filter(function(b){return b.tags&&b.tags.secondary&&b.tags.secondary.includes(tag);}); if(sp.length){pool=sp;degraded=true;} }
    var fresh=pool.filter(function(b){return !seenIds.includes(b.id);}); var candidates=fresh.length?fresh:pool;
    return {book:candidates[Math.floor(Math.random()*candidates.length)],degraded:degraded};
}

var _quoteObserver=null;
function initQuoteObserver() { if(_quoteObserver)_quoteObserver.disconnect(); _quoteObserver=new IntersectionObserver(function(entries,obs){ entries.forEach(function(entry){ if(entry.isIntersecting){ entry.target.style.opacity="1"; entry.target.style.transition="opacity 0.6s ease"; obs.unobserve(entry.target); } }); },{threshold:0.15,rootMargin:"0px 0px -50px 0px"}); document.querySelectorAll(".quote-item").forEach(function(el){_quoteObserver.observe(el);}); }
function escapeHtml(text) { var div=document.createElement("div"); div.textContent=text; return div.innerHTML; }

function renderHome() { var dv=document.getElementById("dose-view"),hv=document.getElementById("home-view"); dv.classList.remove("active"); setTimeout(function(){ dv.classList.add("hidden"); hv.classList.remove("hidden"); void hv.offsetWidth; hv.classList.add("active"); currentIndex=0; playCount=0; if(cycleTimer) clearTimeout(cycleTimer); playWord(currentIndex); },400); }

function renderDose(bookInfo,currentTag) {
    var book=bookInfo.book, degraded=bookInfo.degraded;
    var hintEl=document.getElementById("degraded-hint");
    if(degraded&&currentTag!=="daily") { hintEl.textContent="本日“"+currentTag+"”之药已尽，以下为相近之方"; hintEl.classList.remove("hidden"); }
    else { hintEl.classList.add("hidden"); }
    document.getElementById("render-id").textContent=book.id+" ·";
    document.getElementById("render-guide").innerHTML=book.guide.split("
").filter(function(p){return p.trim();}).map(function(p){return "<p>"+escapeHtml(p)+"</p>";}).join("");
    var qHtml="<div class="book-meta"><div class="book-title">"+escapeHtml(book.title)+"</div><div class="book-author">"+escapeHtml(book.author)+"</div></div><div class="quote-divider"></div>";
    book.quotes.forEach(function(q){ var text=typeof q==='string'?q:q.text; qHtml+="<div class="quote-item"><div class="quote-text">"+escapeHtml(text)+"</div><div class="quote-divider"></div></div>"; });
    qHtml+="<div class="extras-box"><div>"+escapeHtml(book.extras.availability)+"</div><div style="margin-top: 8px;">如果你喜欢："+escapeHtml(book.extras.ifYouLike)+"</div></div><div class="end-marker">□</div>";
    document.getElementById("render-quotes").innerHTML=qHtml;
    var hv=document.getElementById("home-view"),dv=document.getElementById("dose-view"); hv.classList.remove("active"); window.scrollTo(0,0);
    setTimeout(function(){ hv.classList.add("hidden"); dv.classList.remove("hidden"); document.getElementById("scroll-arrow").style.display=(document.querySelector(".guide-section").offsetHeight<window.innerHeight*0.8)?"none":"block"; document.getElementById("footer-actions").classList.remove("hidden"); void dv.offsetWidth; dv.classList.add("active"); initQuoteObserver(); },400);
}

function navigateToTag(tag) { var url=new URL(window.location); url.searchParams.set("tag",tag); window.history.pushState({},"",url); handleUrlChange(); }
function goHome() { var url=new URL(window.location); url.searchParams.delete("tag"); window.history.pushState({},"",url); handleUrlChange(); }

function handleUrlChange() {
    var tag=new URLSearchParams(window.location.search).get("tag");
    if(!tag) { renderHome(); return; }
    var matchResult;
    if(tag==="daily") { var today=new Date().toLocaleDateString("zh-CN"),savedId=getDailyDose(today); if(savedId){var b=BOOKS.find(function(x){return x.id===savedId;});matchResult=b?{book:b,degraded:false}:null;} if(!matchResult){matchResult=matchBook("daily",BOOKS,getSeenBooks());if(matchResult.book)setDailyDose(today,matchResult.book.id);} }
    else { matchResult=matchBook(tag,BOOKS,getSeenBooks()); }
    if(matchResult&&matchResult.book) { pushSeenBook(matchResult.book.id); renderDose(matchResult,tag); }
    else { goHome(); }
}

document.addEventListener("DOMContentLoaded",function(){
    if(!BOOKS||BOOKS.length===0) { document.body.innerHTML="<div style="text-align:center;margin-top:50px;">书籍数据缺失</div>"; return; }
    initMirror();
    document.getElementById("nav-back").addEventListener("click",goHome);
    document.getElementById("nav-home").addEventListener("click",goHome);
    document.getElementById("nav-next").addEventListener("click",function(){var ct=new URLSearchParams(window.location.search).get("tag");navigateToTag(ct||"daily");});
    window.addEventListener("scroll",function(){var arrow=document.getElementById("scroll-arrow");if(window.scrollY>150){arrow.style.opacity="0";arrow.style.transition="opacity 0.3s";}else{arrow.style.opacity="";arrow.style.transition="";}});
    handleUrlChange();
});
</script>
