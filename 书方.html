<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>书方</title>
<style>
:root {
    --bg: #fafaf9;
    --text: #1a1a1a;
    --text-light: #8a8a86;
    --divider: #e8e6e3;
    --max-width: 640px;
    --padding-x: 32px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* 选择模式：无衬线 */
.tag-btn, .daily-btn, .logo, .action-btn, .back-btn, .degraded-hint {
    font-family: "PingFang SC", "Noto Sans SC", -apple-system, sans-serif;
}

/* 阅读模式：衬线 */
.guide-text, .quote-text, .book-meta {
    font-family: "Noto Serif SC", "Source Han Serif SC", STSong, serif;
}

.view-container {
    max-width: var(--max-width);
    margin: 0 auto;
    padding: 0 var(--padding-x);
    min-height: 100vh;
    display: none;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.view-container.active {
    display: flex;
    flex-direction: column;
    opacity: 1;
}

.hidden { display: none !important; }

/* ======== 首页 ======== */
.home-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding-bottom: 20vh;
}

.logo {
    font-size: 24px;
    font-weight: normal;
    letter-spacing: 0.5em;
    margin-bottom: 60px;
}

.tags-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px 40px;
    margin-bottom: 60px;
}

button {
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    outline: none;
    -webkit-tap-highlight-color: transparent;
}

.tag-btn {
    font-size: 14px;
    letter-spacing: 0.05em;
    padding: 10px;
    transition: opacity 0.2s;
}

.tag-btn:active { opacity: 0.5; }

.daily-dose { margin-top: 40px; }
.daily-btn {
    font-size: 12px;
    color: var(--text-light);
    letter-spacing: 0.1em;
}

/* ======== 散落星空 Overlay ======== */
.grid-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: var(--bg); z-index: 60;
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}
.grid-overlay.visible {
    opacity: 1; pointer-events: auto;
}
.grid-close {
    position: absolute; top: 24px; left: var(--padding-x);
    font-size: 24px; color: #ccc; cursor: pointer; padding: 10px; z-index: 70;
}

/* 散落词条：绝对定位 + 有机漂浮动画 */
.star-word {
    position: absolute;
    font-family: "Noto Serif SC", "Source Han Serif SC", STSong, serif;
    font-size: 32px;
    letter-spacing: 0.2em;
    color: var(--text);
    text-align: center;
    cursor: pointer;
    background: none; border: none;
    padding: 12px 8px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.3s;
    animation: float-organic var(--float-dur, 5.5s) ease-in-out infinite;
    animation-delay: var(--float-delay, -2s);
    /* 默认不显示，overlay visible 时渐显 */
    opacity: 0;
    transition: opacity 0.6s 0.15s ease;
}
.grid-overlay.visible .star-word {
    opacity: var(--star-opacity, 1);
}
.star-word:active { opacity: 0.35 !important; }
.star-word.word-long {
    font-size: 26px; letter-spacing: 0.1em;
    left: 50% !important;
    transform: translateX(-50%);
}

/* 为长词单独定义含 translateX(-50%) 的动画 */
.star-word.word-long {
    animation: float-organic-long var(--float-dur, 6s) ease-in-out infinite;
    animation-delay: var(--float-delay, -1s);
}

@keyframes float-organic {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-12px); }
}
@keyframes float-organic-long {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-10px); }
}

/* ====== 8 个词的坐标与个性 ====== */
.star-word:nth-child(1) { top: 12%; left: 8%;  --float-dur: 5.2s; --float-delay: -1.5s; --star-opacity: 1; }
.star-word:nth-child(2) { top: 6%;  left: 56%; --float-dur: 6.4s; --float-delay: -3.2s; --star-opacity: 1; }
.star-word:nth-child(3) { top: 25%; left: 33%; --float-dur: 4.8s; --float-delay: -0.8s; --star-opacity: 0.55; }
.star-word:nth-child(4) { top: 21%; left: 62%; --float-dur: 5.8s; --float-delay: -2.1s; --star-opacity: 1; }
.star-word:nth-child(5) { top: 41%; left: 6%;  --float-dur: 7.0s; --float-delay: -4.5s; --star-opacity: 0.6; }
.star-word:nth-child(6) { top: 51%; left: 50%; --float-dur: 6.0s; --float-delay: -1.0s; --star-opacity: 1; }
.star-word:nth-child(7) { top: 65%; left: 16%; --float-dur: 5.5s; --float-delay: -3.8s; --star-opacity: 0.55; }
.star-word:nth-child(8) { top: 73%; left: 58%; --float-dur: 4.5s; --float-delay: -2.5s; --star-opacity: 1; }

/* 移动端微调：窄屏下左列稍微再靠左一点，避免切边 */
@media (max-width: 639px) {
    .star-word:nth-child(1) { left: 4%; }
    .star-word:nth-child(5) { left: 3%; }
    .star-word:nth-child(7) { left: 10%; }
}

/* ======== 处方页 ======== */
#dose-view { position: relative; padding-top: 40px; padding-bottom: 80px; }

.back-btn {
    position: absolute;
    top: 24px;
    left: var(--padding-x);
    font-size: 18px;
    color: rgba(0,0,0,0.2);
    padding: 10px 10px 10px 0;
}

.degraded-hint {
    font-size: 12px;
    color: #b0aea8;
    text-align: center;
    margin-top: 20px;
    margin-bottom: 20px;
}

.guide-section {
    margin-top: 60px;
    min-height: 60vh;
}

.book-id {
    font-size: 12px;
    color: var(--text-light);
    margin-bottom: 24px;
}

.guide-text p {
    font-size: 16px;
    line-height: 2.0;
    margin-bottom: 1.5em;
    text-align: justify;
}

/* 悬浮呼吸箭头 */
.scroll-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    color: var(--text);
    opacity: 0.15;
    animation: breathe 2s ease-in-out infinite;
    pointer-events: none;
    z-index: 10;
}

@keyframes breathe {
    0%, 100% { opacity: 0.1; }
    50% { opacity: 0.3; }
}

.quotes-section { margin-top: 100px; }

.book-meta { margin-bottom: 60px; }
.book-title { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
.book-author { font-size: 14px; color: var(--text-light); }

.quote-item {
    margin-bottom: 60px;
    opacity: 0;
}

.quote-text {
    font-size: 18px;
    line-height: 2.2;
    text-align: justify;
    white-space: pre-wrap;
}

.quote-divider {
    width: 100%;
    height: 1px;
    background-color: var(--divider);
    margin: 30px 0 60px 0;
}

.extras-box {
    margin-top: 80px;
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.8;
}

.end-marker {
    font-size: 10px;
    color: #ccc;
    text-align: center;
    margin-top: 60px;
    margin-bottom: 80px;
}

.footer-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}

.action-btn {
    font-size: 14px;
    color: var(--text-light);
}

.next-dose { color: var(--text); }

/* ======== 新版首页：呼吸镜面 ======== */
.mirror-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.3s ease;
}

.touch-zone {
    position: absolute; top: 0; height: 100%; z-index: 10;
}
.touch-left { left: 0; width: 25%; }
.touch-right { right: 0; width: 25%; }
.touch-center { left: 25%; width: 50%; cursor: pointer; }

.word-scaler {
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    z-index: 1;
    pointer-events: none;
}
.word-scaler.clicked {
    transform: scale(0.96);
}

.emotion-word {
    font-family: "Noto Serif SC", "Source Han Serif SC", STSong, serif;
    letter-spacing: 0.2em;
    color: var(--text);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    will-change: transform, opacity;
}

.word-short { font-size: 48px; }
.word-long { font-size: 32px; letter-spacing: 0.1em; }

.emotion-word.breathing {
    animation: breatheAnim 5.5s cubic-bezier(0.4, 0.0, 0.2, 1) forwards;
}
@keyframes breatheAnim {
    0%   { opacity: 0; transform: scale(0.95) translateY(10px); }
    20%  { opacity: 1; transform: scale(1) translateY(0); }
    70%  { opacity: 1; transform: scale(1.02) translateY(0); }
    100% { opacity: 0; transform: scale(1.05) translateY(-5px); }
}

.all-tags-btn {
    position: absolute;
    top: 32px;
    right: var(--padding-x);
    font-size: 13px;
    color: #8a8a86;
    z-index: 30;
    cursor: pointer;
    letter-spacing: 0.15em;
    padding: 14px;
    text-decoration: underline;
    text-underline-offset: 4px;
}

.daily-dose-btn-mirror {
    position: absolute;
    bottom: 12%;
    font-size: 14px;
    color: var(--text-light);
    letter-spacing: 0.1em;
    z-index: 20;
    padding: 10px 20px;
    opacity: 0.4;
    transition: opacity 1s ease, color 1s ease;
}
.daily-dose-btn-mirror.idle-breathe {
    animation: pulseText 4s infinite alternate;
}
.daily-dose-btn-mirror.flash-highlight {
    opacity: 0.9 !important;
    color: var(--text) !important;
    animation: none;
}
@keyframes pulseText {
    0% { opacity: 0.4; }
    100% { opacity: 0.8; }
}

.grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 60; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; }
.grid-overlay.visible {
    opacity: 1; pointer-events: auto;
}
.grid-close {
    position: absolute; top: 24px; left: var(--padding-x);
    font-size: 24px; color: #ccc; cursor: pointer; padding: 10px;
}

/* ======== 方案 A'：排版符号暗喻（边缘括号） ======== */
.edge-hint {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-family: "Noto Serif SC", "Source Han Serif SC", STSong, serif;
    font-size: 24px;
    color: var(--text);
    opacity: 0.08;
    pointer-events: none;
    z-index: 5;
    user-select: none;
}
.edge-left { left: 16px; }
.edge-right { right: 16px; }

/* 调整：手机上 opacity 0.08 太弱，提升到 0.12，并加大字号和加粗 */
@media (max-width: 639px) {
    .edge-hint {
        opacity: 0.18;
        font-weight: 400;
    }
}

/* ======== 方案 C：延迟轻语 ======== */
.delayed-whisper {
    position: absolute;
    bottom: 20%;
    font-family: "PingFang SC", "Noto Sans SC", sans-serif;
    font-size: 10px;
    color: #ccc;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    transition: opacity 1.5s ease;
}
.delayed-whisper.show {
    opacity: 1;
}

@media (min-width: 640px) {
    :root { --padding-x: 48px; }
}

</style>
</head>
<body>

    <div id="home-view" class="view-container mirror-container active">
        <div class="all-tags-btn" id="btn-show-all" style="font-family:'PingFang SC','Noto Sans SC',sans-serif">全部</div>

        <div class="edge-hint edge-left">〈</div>
        <div class="edge-hint edge-right">〉</div>

        <div class="touch-zone touch-left" id="zone-prev"></div>
        <div class="touch-zone touch-center" id="zone-enter"></div>
        <div class="touch-zone touch-right" id="zone-next"></div>

        <div class="word-scaler" id="word-scaler">
            <div id="emotion-display"></div>
        </div>

        <div class="delayed-whisper" id="delayed-whisper">轻触左右边缘切换</div>

        <div class="daily-dose-btn-mirror" id="daily-btn-mirror">今日一剂</div>

        <div class="grid-overlay" id="grid-overlay" style="display:none">
            <div class="grid-close" id="btn-close-all">×</div>
            <button class="star-word" data-tag="无聊">无聊</button>
            <button class="star-word" data-tag="迷茫">迷茫</button>
            <button class="star-word" data-tag="厌倦">厌倦</button>
            <button class="star-word" data-tag="浮躁">浮躁</button>
            <button class="star-word" data-tag="疲惫">疲惫</button>
            <button class="star-word word-long" data-tag="空游无所依">空游无所依</button>
            <button class="star-word" data-tag="烦闷">烦闷</button>
            <button class="star-word" data-tag="平淡">平淡</button>
        </div>
    </div>

    <div id="dose-view" class="view-container hidden">
        <button class="back-btn" id="nav-back">←</button>
        <div id="degraded-hint" class="degraded-hint hidden"></div>
        <div class="guide-section">
            <div class="book-id" id="render-id"></div>
            <div class="guide-text" id="render-guide"></div>
        </div>
        <div class="scroll-hint" id="scroll-arrow">↓</div>
        <div class="quotes-section" id="render-quotes"></div>
        <div class="footer-actions hidden" id="footer-actions">
            <button class="action-btn next-dose" id="nav-next">换一剂 →</button>
            <button class="action-btn back-home" id="nav-home">回到首页</button>
        </div>
    </div>

<script>
var BOOKS = [{"id":"001","title":"棋王","author":"阿城","summary":"一个痴迷下棋的知青，在最匮乏的年代里活出了最富足的样子","tags":{"primary":"迷茫","secondary":["浮躁","空游无所依"]},"guide":"你并不是不知道自己要什么。你知道得太多了。\n\n大学像一张摆满菜单的桌子，所有人都在告诉你\"这个有前途\"\"那个最保值\"，你每样都尝了一口，却没有一样真正饿了你的胃。迷茫不是选项不够多的病，恰好相反——是你脑子里塞了太多别人的菜单，反而听不见自己胃在叫。王一生面对这个问题的时候，他的解法近乎粗暴：别想了，下棋。别人串联、刷题、走关系，他就坐在那儿，跟一盘棋较劲。他把命放在棋里，棋就还他一个不被时代冲走的位置。\n\n这个叫\"棋呆子\"的人身上有一种你不太能在校园里看到的品质：他不急于解释自己。别人觉得他呆、觉得他怪，他就笑一笑，继续摆棋。不争辩、不剖白、不写小作文自我辩护。这种近乎沉默的笃定，在一个人人都在经营人设的环境里，是一种很稀缺的定力。迷茫的时候，你最需要的不是更清晰的规划，而是先找到一件不需要向任何人解释理由的事情，然后先把它做完。\n\n读完《棋王》大约需要一个下午。不长，刚好够你从宿舍床铺滑到书桌前。不用做笔记，不用画思维导图，你就看王一生怎么在火车上吃饭——米饭粒儿沾了一脸，一粒一粒捡起来吃掉——然后你会知道，\"活着\"这事儿，有时候就藏在把一件小事做到底的执拗里。","quotes":["我因为不喜欢象棋，也就不去关心什么象棋冠军，但王一生的大名，却常被班上几个棋篓子供在嘴上，我也就对其事迹略闻一二，知道王一生外号棋呆子，棋下得很神不用说，而且在他们学校那一年级里数理成绩总是前数名。我想棋下得好而有个数学脑子，这很合情理，可我又不信人们说的那些王一生的呆事，觉得不过是大家寻佚闻鄙事以快言论罢了。","棋开始了。上千人不再出声儿。只有自愿服务的人一会儿紧一会儿慢地用话传出棋步，外边儿自愿服务的人就变动着棋子儿。风吹得八张大纸哗哗地响，棋子儿荡来荡去。太阳斜斜地照在一切上，烧得耀眼。前几十排的人都坐下了，仰起来看，后面的人也挤得紧紧的，一个个土眉土眼，头发长长短短吹得飘，再没人动一下，似乎都要把命放在棋里搏。\n\n我心里忽然有一种很古的东西涌上来，喉咙紧紧地往上走。读过的书，有的近了，有的远了，模糊了。平时十分佩服的项羽、刘邦都在目瞪口呆，倒是尸横遍野的那些黑脸士兵，从地下爬起来，哑了喉咙，慢慢移动。一个樵夫，提了斧在野唱。忽然又仿佛见了呆子的母亲，用一双弱手一张一张地折书页。","不久，脚卵抬起头，看着王一生说：\"天下是你的。\"抽出一支烟给王一生，又说：\"你的棋是跟谁学的？\"王一生也看着脚卵，说：\"跟天下人。\""],"extras":{"availability":"微信读书免费可读；纸书收录于阿城文集《棋王·树王·孩子王》","ifYouLike":"《树王》《孩子王》（阿城同系列）；《活着》（余华）——同样是在匮乏中活出尊严的故事"}},{"id":"002","title":"给青年的十二封信","author":"朱光潜","summary":"一位美学大师用十二封信，和年轻人聊读书、动与静、升学、人生——不教你怎么赢，但教你怎么活","tags":{"primary":"迷茫","secondary":["浮躁","烦闷"]},"guide":"你说你迷茫。但这可能不是一个\"问题\"，而是一个\"阶段\"——区别在于，前者需要被解决，后者只需要被穿越。\n\n\"迷茫\"这个词本身就暴露了你的姿势：你在用眼睛找路，而不是用脚。你站在十字路口，希望有人告诉你哪条路是对的，但朱光潜在第一封信里就把这条路堵死了——他不给答案。不是因为他吝啬，而是因为他知道，别人给的答案在你身上待不了三天。所以他只做一件事：给你一套自己找答案的方法。谈读书，说你与其碎片化地刷帖子，不如拿一整块时间啃一本\"不紧急\"的书，因为\"在读书中寻出一种趣味，你将来抵抗引诱的能力比别人定要大些\"。谈动与静，说人之所以烦闷，大半是因为身体和心灵有一个闲着——解决烦闷的方法不是想通，而是动起来。谈升学选课，说别把兴趣和社会需求对立起来，你感兴趣的东西做到极致，社会自然会为它定价。\n\n十二封信，写于将近一百年前。一百年前的年轻人也在迷茫，迷茫的内容换了一茬又一茬，但迷茫的结构一模一样。这至少说明一件事：迷茫不是你的错，它是二十岁的出厂设置。\n\n每封信只需十分钟。一天读一封，读完就合上。这十二天里你可能不会\"想通\"任何东西——但你可能会开始做一些事。而这恰好就是朱光潜想说的全部：路是在走的过程中被踩出来的，不是在站的过程中被看出来的。","quotes":["你如果在读书中寻出一种趣味，你将来抵抗引诱的能力比别人定要大些。这种兴趣你现在不能寻出，将来永不会寻出的。凡人都越老越麻木，你现在已比不上三五岁的小孩子们那样好奇、那样兴味淋漓了。你长大一岁，你感觉兴味的锐敏力便须迟钝一分。","愁生于郁，解愁的方法在泄；郁由于静止，求泄的方法在动。从前儒家讲心性的话，从近代心理学眼光看，都很粗疏，只有孟子的\"养气\"说、宋儒的\"变化气质\"说，是颠扑不破的。我把这两说综合起来，下一个注脚：便是\"在动中求泄\"。","做学问，做事业，在人生中都只能算是第二桩事。人生第一桩事是生活。我所谓\"生活\"是\"享受\"，是\"领略\"，是\"培养生机\"。假若为学问为事业而忘却生活，那种学问事业在人生中便失其真正意义与价值。","所谓真正立志，不仅要接受现在的事实，尤其要抓住现在的机会。如果立志要做一件事，那件事的成功尽管在很远的将来，而那件事的发动必须就在目前一顷刻。"],"extras":{"availability":"微信读书免费可读（多个版本）；纸书各出版社均有","ifYouLike":"《谈美》（朱光潜）——同一支笔写美学，更轻盈；《沉思录》（马可·奥勒留）——如果朱光潜是朋友，奥勒留是那个沉默的长辈"}},{"id":"003","title":"心流：最优体验心理学","author":"米哈里·契克森米哈赖（Mihaly Csikszentmihalyi）","summary":"用几十年的实证研究回答一个古老问题：人什么时候最快乐？答案是——完全沉浸在一件事里，忘记时间存在的时候","tags":{"primary":"浮躁","secondary":["无聊","平淡"]},"guide":"你不是浮躁。你是被设计成这样的。\n\n每一个 app 背后都站着一群全世界最聪明、收入最高的工程师，他们的工作不是服务你，而是让你的注意力停不下来。你滑走一个视频，下一个自动补上；你关掉一个通知，三个新的弹出来。你觉得自己\"缺乏专注力\"？不对。你的专注力没有被削弱——它只是被一群比你更懂你大脑弱点的人精确地收割了，然后卖给了广告商。这不是你的错。但这确实是你的问题——因为你已经太久没有体验过一种叫做\"心流\"的感觉：完全沉浸在一件事里，忘记自己、忘记时间、忘记手机还存在。\n\n契克森米哈赖用几十年的实证研究把这个词钉在了心理学地图上。他发现了一个反直觉的事实：人类最快乐的时刻，不是放松的时候，不是享乐的时候，而是\"用全部技能去应对一个刚好超出能力边界的挑战\"的时候。打游戏时的忘我、打球时的手感、解题时的沉浸——这些都是心流的廉价版本。昂贵版本的心流需要四个条件：清晰的目标、即时的反馈、挑战与技能的平衡、对当下的完全投入。好消息是，这四个条件不需要你删除所有 app 去深山修行，你只需要把它们种进你已有的日常生活里。\n\n这本书不用从头读到尾。先读第三章和第四章，大概两小时。读完后，挑一件你今天非做不可的事——洗碗、跑步、背单词都行——在开始之前给自己定一个微小的目标（比如\"洗完所有碗之前不摸手机\"），然后只关注这一个目标。你会想起很久以前，那时候你还不靠滑手机来杀死时间，那时候二十分钟像一辈子那么长，并且一点都不无聊。","quotes":["心流即一个人完全沉浸在某种活动当中，无视其他事物存在的状态。这种体验本身带来莫大的喜悦，使人愿意付出巨大的代价。","控制意识才能控制体验，而控制意识最直接的方法，就是控制注意力。注意力是一种稀缺资源，它决定哪些信息进入意识，哪些被排除在外。","大多数人一生都在两种状态之间来回摆动：工作时感到焦虑，闲暇时感到无聊。而心流体验恰好处于焦虑与无聊之间的那个窄道——当挑战刚好超出技能，两者同时被拉高时，心流就会出现。","幸福并非瞬间发生，也不受外在事件操纵，而是取决于我们对外在事物的阐释。只有学会控制意识的人，才能决定自己的生活体验，进而接近幸福。"],"extras":{"availability":"微信读书可读（中信出版社译本）；英文原版 Flow: The Psychology of Optimal Experience","ifYouLike":"《刻意练习》（安德斯·艾利克森）——心流的操作方法；《贪婪的多巴胺》（丹尼尔·利伯曼）——从神经科学解释为什么短视频比心流更容易上瘾"}},{"id":"004","title":"德米安：彷徨少年时","author":"赫尔曼·黑塞（Hermann Hesse）","summary":"一个少年在光明与黑暗之间找到真正的自我——每个大学生的内心传记","tags":{"primary":"迷茫","secondary":["烦闷"]},"guide":"你总觉得你应该活成一个\"更好的人\"。这是你最累的地方，也是你最迷茫的根源。\n\n黑塞管这个叫\"光明世界\"——父母教给你的规矩、老师表扬的品质、朋友圈里被点赞的人设。你在这个世界里活了二十年，熟练、安全、但总觉得哪里不对劲。因为还有一个\"黑暗世界\"——那些你不能跟人说的嫉妒、不甘、生理冲动、对某些人的莫名厌恶——被你压在意识底下，假装不存在。辛克莱在书里用的词是\"该隐的印记\"。他花了整本书的时间去理解一件事：你不是要消灭你的黑暗面，你是要把光明和黑暗合在一起，变成你真正的名字。德米安帮他做了这件事，而你身边可能还没有德米安——这本书可以临时顶替一下。\n\n这不是一本\"读完就豁然开朗\"的书。你读的时候大部分时间会跟辛克莱一样困惑。但你会记住一个意象：一只鸟要从蛋壳里出来。蛋壳就是你现在的生活——舒服、透明、但也困住你。啄破壳的过程疼，而且你不知道外面是什么。黑塞说，没有人能替你把壳啄破，但有人可以告诉你：壳外面有空气。\n\n全书很短，但建议你分成三个晚上读完。每次读到你觉得\"这个角色在说我也不懂的话\"的时候，就合上书——第二天你会发现，那些话睡了一觉后变清楚了。这不是魔法，这是黑塞。","quotes":["鸟要挣脱出壳。蛋就是世界。谁要出生，就必须摧毁一个世界。鸟飞向神。神的名字叫阿布拉克萨斯。","每个人的生命都是一条通向自我的路，是一条路的尝试，是一条小径的悄然召唤。从来不曾有人完全成为他自己，但每个人都努力想要成为他自身——有人模糊地，有人清楚地，各尽其力。","我想要的，只是试着活出我内心真正想要活出的东西。为什么这如此困难？","如果你生来就是一只蝙蝠，你就不必像鸵鸟那样看问题。你只需正视自己的深渊，而不是把它推到别人身上。"],"extras":{"availability":"微信读书可读（多个译本，推荐姜乙译本）","ifYouLike":"《悉达多》（黑塞同作者，更短更轻）；《牧羊少年奇幻之旅》（保罗·柯艾略）——如果德米安的象征让你觉得太重，这本是它的轻量版"}},{"id":"005","title":"素履之往","author":"木心","summary":"一本不需要从头读的书——翻到哪页读哪页，每句话都是一个独立的宇宙","tags":{"primary":"无聊","secondary":["厌倦","迷茫"]},"guide":"你觉得无聊。打开手机，滑十分钟，更无聊了。不是因为手机里没有东西——是因为那些东西都不需要你动脑子。你在用不需要咀嚼的内容喂养一个需要咀嚼的大脑，然后这个大脑告诉你：我还是饿。\n\n木心写的是一本\"不需要从头读\"的书。你随便翻到哪一页，一两句话，然后合上。他会说\"生活的最佳状态是冷冷清清的风风火火\"，会说\"玩物丧志，其志小，志大者玩物养志\"，会说\"所谓无底深渊，下去，也是前程万里\"。每一句都像一个精心布置的思维陷阱——你以为你懂了，走两步发现不对，再走两步发现他说的跟你第一反应想的完全相反。这个过程叫做\"咀嚼\"。你刷一百条短视频，大脑在接收；你读一句木心，大脑开始工作。无聊和独处之间，就差这一层认知的窗户纸。\n\n这本书最适合放在手机旁边。每次你想打开一个短视频 app 的时候，先打开这本书，读一句。读完合上。你会开始发现，那句话在你走路、吃饭、发呆的时候自己发酵。你不是无聊——你只是太久没有给大脑喂需要消化的东西了。","quotes":["生活的最佳状态是冷冷清清的风风火火。","玩物丧志，其志小，志大者玩物养志。","所谓无底深渊，下去，也是前程万里。","一个人到世界上来，来做什么？爱最可爱的，最好听的，最好看的，最好吃的。","地图是平的，历史是长的，艺术是尖的。"],"extras":{"availability":"微信读书可读；纸书收录于木心作品系列（广西师范大学出版社）","ifYouLike":"《哥伦比亚的倒影》（木心散文，比素履更绵长）；《惶然录》（费尔南多·佩索阿）——另一个躲在文字后面的灵魂，比木心更不安"}},{"id":"006","title":"活着","author":"余华","summary":"一个人送走了他生命中的每一个人，然后继续活着——这不是惨，是告诉你\"活着\"这个词本身就够了","tags":{"primary":"厌倦","secondary":["疲惫","烦闷"]},"guide":"你说你厌倦了。厌倦上课，厌倦食堂，厌倦每天一模一样的生活。你说你累了。这种累不是身体累——身体累睡一觉就好了——这种累是心里的累：跟人相处要算计，不跟人相处又孤独，想努力不知道往哪使劲，想躺平又觉得自己在浪费生命。\n\n福贵没有时间想这些。\n\n他从一个败光家产的少爷，变成一介佃农。他亲手埋了他爹、他娘、他儿子有庆、他女儿凤霞、他老婆家珍、他女婿二喜、他外孙苦根。七个人，七座坟，他一个一个挖、一个一个埋。然后他买了一头老牛，耕田、吃饭、睡觉。余华没有让福贵崩溃。余华让福贵活着。是因为\"活着\"这件事本身不需要理由——不是\"为了什么而活着\"，就是\"活着\"。你厌倦的那些日常——去食堂的路上阳光很好、室友在打鼾你还没睡、洗了个热水澡——福贵用一辈子告诉你，这些东西就是活着的全部内容。\n\n读完你可能会沉默一段时间。不是难过——是觉得\"哦，原来我已经在活着了\"。这不需要你考到什么成绩、拿到什么 offer、完成什么计划。你已经在了。你在呼吸。这件事本身就够。","quotes":["人是为活着本身而活着的，而不是为活着之外的任何事物所活着。","我看着那条弯曲着通向城里的小路，听不到我儿子赤脚跑来的声音。月光照在路上，像是撒满了盐。","做人还是平常点好，争这个争那个，争来争去赔了自己的命。像我这样，说起来是越混越没出息，可寿命长。我认识的人一个挨着一个死去，我还活着。","最初我们来到这个世界，是因为不得不来；最终我们离开这个世界，是因为不得不走。"],"extras":{"availability":"微信读书可读；纸书极便宜、到处有售","ifYouLike":"《许三观卖血记》（余华同作者，比活着多了一点幽默）；《人生海海》（麦家）——另一个\"活着\"的故事，更曲折"}},{"id":"007","title":"被讨厌的勇气","author":"岸见一郎 / 古贺史健","summary":"一个困惑的年轻人和一位哲人用五个夜晚，把你的\"精神内耗\"逐层拆解，然后告诉你：你所有的痛苦都是你自己选的——你可以不选","tags":{"primary":"疲惫","secondary":["迷茫","烦闷"]},"guide":"你看这页之前，脑子里可能同时跑着三件事：某人前天那句话到底什么意思？辅导员发的那个通知要不要跟？自己好像又在浪费时间了怎么办？三件事织成一张网，你在网里打转，什么都没做，但特别累。\n\n阿德勒心理学管这个状态叫\"对他人的课题的过度介入\"。全书最锋利的概念叫\"课题分离\"——一件事的后果最终由谁承担，这件事就是谁的课题。别人怎么看你，是别人的课题，不是你的。你为之焦虑、害怕冲突、反复自我审查——这些不是别人的控制，是你自己选择把别人的课题扛在了肩上。听起来冷血？哲人用了整本书跟你辩论这件事。年轻人反复质疑、反驳、甚至愤怒——你想得到的反驳他都说了一遍，你想不到的他也说了。然后哲人逐一回应。\n\n这不是一本温情脉脉的书。你读完第一夜可能会不舒服——因为它不共情你，它戳你。读到第三夜你会开始觉得好笑——好笑自己困在那么多\"别人怎么想\"里。\"被讨厌的勇气\"不是说你要做一个讨厌的人，而是说自由就是不再害怕被某些人讨厌。你不必讨好所有室友、所有同学、所有长辈。你只需要对自己诚实。\n\n建议按书的节奏读——五个夜晚，每次读一夜（约 40 页）。哲人每顿辩论的量刚好够消化一个晚上。合上书之后，想想\"今天哪件事其实不是我的课题\"。","quotes":["所谓的自由，就是被别人讨厌。如果你无法承受被人讨厌，那你就只能继续不自由地活着。","基本上一切人际关系的矛盾，都起因于对别人的课题妄加干涉，或自己的课题被别人妄加干涉。只要能够进行课题分离，人际关系就会发生剧烈改变。","人之所以不幸，并不是因为过去或环境，更不是因为能力不足，只是因为缺乏\"获得幸福的勇气\"。","不与任何人竞争，只要自己不断前进即可。健全的自卑感不是来自与他人的比较，而是来自与\"理想的自己\"的比较。"],"extras":{"availability":"微信读书可读","ifYouLike":"《自卑与超越》（阿德勒原著，更学术但更原汁原味）；《非暴力沟通》（马歇尔·卢森堡）——课题分离解决了\"要不要管\"，非暴力沟通解决\"怎么管\""}},{"id":"008","title":"我与地坛","author":"史铁生","summary":"一个人在轮椅上把一座废弃的古园坐了十五年，把它坐成了一个宇宙","tags":{"primary":"空游无所依","secondary":["迷茫","烦闷"]},"guide":"你感到\"空游无所依\"。这个状态很抽象——没有具体的痛处，但也没有具体的锚点。你漂浮在课表、食堂、宿舍之间，像一只没系绳的气球，往哪飘都行，但往哪飘都不重要。\n\n史铁生二十岁那年突然走不了路了。这不是比喻——他真的站不起来了。愤怒、绝望、把自己关在屋子里。然后有一天他被推进了一个废弃的古园——北京地坛。他本以为只是消磨一个下午，结果他把地坛坐了十五年。在这十五年里，他发现了一件事：一个人的锚点可以不是\"事业\"、\"成就\"、\"被人需要\"这些大词，而是一种\"看见\"——看见四季在园子里轮转，看见一个老人每天准时来散步，看见落日把一面旧墙染成琥珀色，看见自己的母亲偷偷跟在轮椅后面不敢让他发现。《我与地坛》最惊人的地方在于，它不是一个\"身残志坚\"的故事。它是一个人用最缓慢的速度、在最窄小的范围内，重新学会\"待在世界上\"的故事。\n\n读这一篇就够了（书里还有其他篇目，但《我与地坛》那一篇是核心）。大概一个小时。读的时候注意看史铁生写景物的方式——他不抒情，他只描述。一棵树、一束光、一片雪。他写这些东西的方式会让你突然意识到：你很久没有真正\"看见\"你身边的东西了。无依不是因为没有东西可以依靠。是因为你还没有坐下来，安静到足够去依靠它们。","quotes":["一个人，出生了，这就不再是一个可以辩论的问题，而只是上帝交给他的一个事实；上帝在交给我们这件事实的时候，已经顺便保证了它的结果。所以死是一件不必急于求成的事，死是一个必然会降临的节日。","多年来我头一次意识到，这园中不单是处处都有过我的车辙，有过我车辙的地方也都有过母亲的脚印。","太阳，他每时每刻都是夕阳也都是旭日。当他熄灭着走下山去收尽苍凉残照之际，正是他在另一面燃烧着爬上山巅布散烈烈朝辉之时。","就命运而言，休论公道。"],"extras":{"availability":"微信读书可读（收录于《我与地坛》同名散文集）","ifYouLike":"《病隙碎笔》（史铁生，更碎更哲学）；《瓦尔登湖》（梭罗）——另一个把一片固定区域活成一个宇宙的人"}},{"id":"009","title":"刀锋","author":"威廉·萨默塞特·毛姆（W. Somerset Maugham）","summary":"一个退伍兵不工作、不社交、不解释，满世界晃荡找\"人生的意义\"——如果你也在找，他不是答案，但他证明了找本身就是一种活法","tags":{"primary":"空游无所依","secondary":["迷茫","厌倦"]},"guide":"你有过一个瞬间——比如周五晚上所有人都出去玩了，你一个人坐在宿舍里，突然不知道自己在干什么。不是难过，不是焦虑，就是\"空\"。像站在候车室的正中间，四面都有出口，但没有一个上面写着你的名字。\n\n拉里·达雷尔在书里花了十年来回答这个问题。他在一战中开过战斗机，亲眼看见战友死在他面前。退伍回来，他有体面的收入、可以迎娶一个漂亮的芝加哥姑娘、随时能进入她父亲的企业。他没有哭天喊地，也没有看破红尘。他只是说：我不想这样活。然后他去了巴黎，窝在图书馆里读哲学，每天八到十个小时。去了印度，学瑜伽、冥想、见各种奇奇怪怪的人。去了一个煤矿做苦力。最后他成了一个\"没有职业的人\"，在纽约开出租，写一本没人会出版的书。所有人都在说他荒废了人生，只有他自己知道——他一生都在做一件事：找出\"我是谁\"的答案。这件事没有 deadline，没有 KPI，而他非常认真地在做。\n\n这本小说最有意思的地方是：毛姆没有让你去崇拜拉里。他让你同时看到拉里的未婚妻伊莎贝尔——结婚、住大房子、过上流社会生活，而且过得不错。你是伊莎贝尔还是拉里？毛姆不替你选。他只是证明了一件事：空游无所依不一定是一种病；也许你只是在漂浮期，而有些人漂浮了一辈子，然后活着抵达了。","quotes":["一把刀的锋刃很不容易越过，因此智者说得救之道是困难的。","我想知道人生到底是为什么，有没有意义。我不在乎犯错误。也许在犯了一个错误之后，我能发现自己到底要什么。","我从来不觉得日子无聊。我有很多事情要想，有很多书要读。","人生如果不想随波逐流，就等于是场豪赌。但大多数人，只是求生，只有少数人才生活。"],"extras":{"availability":"微信读书可读（多个译本，推荐周煦良译本）","ifYouLike":"《月亮与六便士》（毛姆同作者，更极端的选择）；《斯通纳》（约翰·威廉斯）——另一条\"不随波逐流\"的路，比拉里更安静"}},{"id":"010","title":"人间草木","author":"汪曾祺","summary":"一个老头写葡萄怎么长、咸鸭蛋怎么腌、昆明的雨怎么下——你读完之后发现，烦闷的解药是\"把感官重新打开\"","tags":{"primary":"烦闷","secondary":["平淡","无聊"]},"guide":"你烦闷的时候有没有想过：你多久没有闻过东西了？\n\n不是手机屏幕的味道，不是食堂油炸的味道——是雨后的泥土、晒过的被子、走过一棵开花的树突然被香气砸到头。汪曾祺的《人间草木》不是写给你的大脑的，是写给你的鼻子、舌头、手指尖的。他写葡萄：\"葡萄喝起水来是惊人的。它真是在喝哎！\"写昆明的雨：\"昆明的雨季是明亮的、丰满的，使人动情的。\"写咸鸭蛋：\"筷子头一扎下去，吱——红油就冒出来了。\"没有宏大的主题，没有深刻的思想。他就是坐在院子里，看着植物长，然后记下来。\n\n为什么这个能治烦闷？因为烦闷的人有一个特征：你跟此刻绝缘。你在食堂吃饭，脑子里在想下午的事；你在上课，心里在烦昨天的事。你从来没有真正在食堂，吃那顿饭，尝那个味道。汪曾祺的文字在你眼前展开的东西不多——一棵葡萄藤、一颗咸鸭蛋、一场雨——但每一件都让你重新\"看见\"它。\"看见\"之后你发现，原来你身边有这么多东西值得看。烦闷不是因为生活没意思，是因为你把感官的闸门关了。打开它，不需要去远方，只需要低头。\n\n这本书不需要从头读到尾。建议每天读一到两篇（每篇 5-10 分钟），当饭间读物。别在饿了的时候读——他写吃的东西，杀伤力太大。","quotes":["葡萄喝起水来是惊人的。它真是在喝哎！葡萄藤的组织跟别的果树不一样，它里面是一根一根细小的导管。这一点，中国的古人早就发现了。《图经》云：\"根苗中空相通。圃人将货之，欲得厚利，暮溉其根，而晨朝水浸子中矣，故俗呼其苗为木通。暮溉其根，而晨朝水浸子中矣。\"这么说来，葡萄简直是直接在水里吸收水分的。浇了水，不大一会，它就从根直吸到梢，你简直可以听见它喝水的声音。","昆明的雨季是明亮的、丰满的，使人动情的。城春草木深，孟夏草木长。昆明的雨季，是浓绿的。草木的枝叶里的水分都到了饱和状态，显示出过分的、近于夸张的旺盛。","高邮咸蛋的特点是质细而油多。蛋白柔嫩，不似别处的发干、发粉，入口如嚼石灰。油多尤为别处所不及。鸭蛋的吃法，带壳切开，是一种，那是席间待客的办法。平常食用，一般都是敲破\"空头\"用筷子挖着吃。筷子头一扎下去，吱——红油就冒出来了。","如果你来访我，我不在，请和我门外的花坐一会儿。它们很温暖，我注视它们很多很多日子了。"],"extras":{"availability":"微信读书可读；纸书多个版本，推荐江苏文艺出版社","ifYouLike":"《食事》（汪曾祺同作者，只写吃，更专一）；《枕草子》（清少纳言）——平安时代一个宫廷女官记录\"觉得高兴的事\"：春天是破晓的时候，夏天是夜里，秋天是傍晚"}},{"id":"011","title":"陶庵梦忆","author":"张岱","summary":"一个极致繁华的过来人，在失去一切后回忆他见过的每一场雪、每一盏灯、每一出戏","tags":{"primary":"浮躁","secondary":["空游无所依","厌倦"]},"guide":"你有多久没有安静地看一场雪了？\n\n不是手机里刷到的雪景视频——是真的坐在一个地方，不说话，不动，看着白的东西从天上往下掉，看了很久，久到你觉得时间变慢了。张岱的《陶庵梦忆》是这个速度的书。他年轻时是晚明最会玩的人：中秋赏月要租几百条船、元宵观灯要看遍绍兴城里每一处灯火、喝茶要自己养一头专门运惠山泉水的驴。然后明朝亡了。他失去了一切，披发入山，形同乞丐，开始在回忆里活着。他写了湖心亭看雪——夜深了，一个人、一条船、一炉火，去湖心看雪。\"天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。\"这篇 159 个字，是中国文学史上最安静的一页。\n\n浮躁是什么？浮躁是你的时间感被调快了。你觉得一个下午很长但一刷手机就没了，你觉得一个学期很快又什么都没做成。张岱的文字是一种\"慢速播放\"。每一篇都极短——50 到 200 字——但读完之后你会发现自己自动放慢了。不需要努力，不需要冥想。就是被他的文字拖进了他的时间节奏里。\n\n建议一天读一篇，晨起或者睡前。不要多。多了就快了，快了就白读了。","quotes":["崇祯五年十二月，余住西湖。大雪三日，湖中人鸟声俱绝。是日更定矣，余挐一小舟，拥毳衣炉火，独往湖心亭看雪。雾凇沆砀，天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。","林下漏月光，疏疏如残雪。","人无癖不可与交，以其无深情也；人无疵不可与交，以其无真气也。","鸡鸣枕上，夜气方回。因想余生平，繁华靡丽，过眼皆空，五十年来，总成一梦。"],"extras":{"availability":"微信读书可读（多个版本，推荐中华书局或上海古籍版）；英文译本也极佳","ifYouLike":"《浮生六记》（沈复）——另一个在平淡中找到无限的人；《徒然草》（吉田兼好）——日本版陶庵梦忆，更碎更禅"}},{"id":"012","title":"箭术与禅心","author":"奥根·赫立格尔（Eugen Herrigel）","summary":"一个德国哲学教授在日本学了六年弓道，只为了弄明白一件事：靶子不是被射中的，是自己被\"放\"到了箭上的","tags":{"primary":"浮躁","secondary":["疲惫"]},"guide":"你在\"用力\"——这是你大多数问题的共同来源。\n\n学习的时候用力想象结果（考不好怎么办）、社交的时候用力表演（我这样说对吗）、睡前用力反思（今天又浪费了）。你的\"用力\"没有让你更有效率，它只是让你更累。赫立格尔到日本学弓道的时候，遇到了一模一样的问题。作为德国哲学教授，他用德国人的方式对待一切：分析、优化、用力做到最好。但弓道大师告诉他：不是你把弓拉开的，是\"它\"被拉开的；不是你射中了靶心，是靶心自己到了箭上。他花了五年时间才明白这不是比喻——是真的生理上不发力、不放箭，然后在某个完全放松的瞬间，箭自己飞出去了。\n\n全书不到三万字，但每一章的密度都很大。核心洞见非常简单：你一直在\"做\"事情，但你忘了还有另一种方式——让事情\"发生\"。弓道的\"放手\"不是放弃，是把最后那一小段交给弓本身——你只需要把前面的步骤做到极致，释放的那一刻，你不用管了。这在你身上叫什么？叫\"心流\"。叫\"进入状态\"。叫\"忘记自己\"。你觉得浮躁是因为你总在盯着靶子——盯着结果、盯着 deadline、盯着别人有没有在看你。师父说：把靶子忘掉，先学会呼吸。这一步学会了，靶子自己会来。","quotes":["你不应该握住弓，而应该让弓握住你。","正确的射箭之道，不在于用弓和箭去做什么，而在于让某种事情在弓箭上发生。","松开弦的时候，不要想\"我要松开\"，也不要抵抗\"我要松开\"这个念头。让松开自己到来，像一个熟透的果子从枝头坠落。","大师之所以是大师，不是因为他比旁人更努力，而是因为他完全放弃了\"努力\"这个概念。"],"extras":{"availability":"微信读书可读","ifYouLike":"《禅与摩托车维修艺术》（罗伯特·波西格）——另一个西方人用东方哲学解决现代焦虑，但更漫长、更公路；《弓与禅》（同书不同译本，译名差异）"}},{"id":"013","title":"万物有灵且美","author":"吉米·哈利（James Herriot）","summary":"一个乡下兽医的一生——母牛难产、狗儿撒娇、羊在雪地里装死——无聊是因为你没凑近了看","tags":{"primary":"无聊","secondary":["疲惫","平淡"]},"guide":"你有没有注意过，说自己\"无聊\"的人从不说\"我正在看一株草\"或者\"我正在听窗外的雨\"？无聊的人一定在室内，一定面对着屏幕，一定在等什么东西来拯救自己。吉米·哈利没有机会无聊。他每天凌晨被电话叫醒，在约克郡的山谷里开着没有暖风的旧车，把手塞进母牛的子宫里把胎位不正的小牛扳正。他的手冻僵了，身上全是血和羊水，旁边还有一个焦躁的农场主在骂天骂地。然后小牛活着出来了，母牛舔它，天刚好亮了。他站在那儿看了好一会儿，然后去下一家。这就是他的一生。\n\n如果你觉得无聊，你不是缺事情做——你是缺一件让你\"凌晨两点愿意从被窝里爬起来\"的事。吉米·哈利不是圣人，他也会抱怨、也会偷懒、也会在风雪里骂自己为什么要当兽医。但抱怨完之后，他眼睛里只有那头牛和它肚子里的小牛。这种专注不是苦行——它有一种你很久没体验过的快乐：事情本身的有趣，不依赖任何结果的有趣。\n\n建议睡前读一篇，每篇 5-10 分钟。这本书最大的副作用：你可能会开始认真观察窗外的鸟、你养的绿萝、以及食堂那个总是多给你打一勺菜的阿姨。","quotes":["我躺在草地上，闭上眼睛。温暖的阳光照在脸上，空气中充满了新翻的泥土和青草的气味。我想，即使这世界上没有天堂，这个也差不多了。","动物和人之间有一种奇妙的联系——它们不会说话，但它们的眼睛能说出一切。你只需要安静下来，就能听懂。","母牛在生产的时候，你不能急。你一急，它就怕。你一怕，它就紧张。所以你得把手慢慢伸进去，一边摸一边哼歌，什么歌都行。","约克郡的春天来得特别晚，但也特别认真。好像上帝在这个角落花了比全世界加起来更多的心思。"],"extras":{"availability":"微信读书可读（系列共 5 本，先读这一本）","ifYouLike":"吉米·哈利同系列《万物有灵》《万物既伟大又渺小》《万物既聪慧又奇妙》；如果喜欢\"认真对待小事\"的调子，试试《编舟记》（三浦紫苑）"}},{"id":"014","title":"小王子","author":"安托万·德·圣埃克苏佩里（Antoine de Saint-Exupéry）","summary":"一个外星小孩教一个地球大人重新看见\"重要的事\"——用眼睛是看不见的，只有用心才看得见","tags":{"primary":"厌倦","secondary":["空游无所依"]},"guide":"你小时候读《小王子》，可能只觉得是一个奇怪的故事：一个小孩有一朵玫瑰、三座火山、一只狐狸。后来你长大了。你开始说\"我很忙\"、\"这有什么用\"、\"能不能快一点\"。你养了一朵花但没时间浇水，交了一个朋友但都是表情包聊天，路过一片夕阳但没有抬头。恭喜，你成了圣埃克苏佩里笔下那些星球上的人——那个不停点灯熄灯的灯夫、那个忙着算账但从没闻过一朵花的商人、那个活在别人的评价里的酒鬼。\n\n《小王子》在二十岁重读的价值在于：它让你认出来，你在哪个星球上卡住了。你厌倦的那些东西——绩点、刷不完的通知、永远在赶 deadline——书里每一个大人角色都是它们的化身。而小王子问的问题始终只有一个：\"这重要吗？\"不是\"这有用吗\"，是\"这重要吗\"。\"有用\"是数字，\"重要\"是那朵花。你的日常被\"有用\"的事填满了。上一次你做一件\"重要但没用\"的事是什么时候？\n\n一个半小时。请在下午四点开始读，刚好读完之后窗外会有夕阳。然后抬头看一眼——如果你觉得今天的夕阳跟你有关，说明药效还在。","quotes":["只有用心才能看清楚。真正重要的东西，用眼睛是看不见的。","是你为你的玫瑰花所花费的时间，使她变得这么重要。","如果你驯养了我，我们就会彼此需要。对我来说，你将是世界上唯一的。对你来说，我也将是世界上唯一的。","所有的大人都曾经是小孩，虽然只有少数人记得。","你在下午四点钟来，那么从三点钟开始，我就已经开始感到幸福了。时间越临近，我就越感到幸福。"],"extras":{"availability":"微信读书可读（所有译本都有，推荐周克希或张小娴译本）","ifYouLike":"《夜航》（圣埃克苏佩里同作者，写给大人看的飞行笔记）；《夏洛的网》（E.B.怀特）——另一个关于\"建立联系\"的故事，主角是一只蜘蛛和一只猪"}},{"id":"015","title":"冬牧场","author":"李娟","summary":"一个汉族姑娘跟着哈萨克牧民去零下四十度的荒野过冬——然后发现，那些你以为\"艰苦\"的日子，其实比你\"舒适\"的日子更值得活","tags":{"primary":"厌倦","secondary":["无聊","浮躁"]},"guide":"你厌倦了。每天差不多——起床、上课、吃饭、刷手机、睡觉。你在温度的舒适区里，也在情绪的舒适区里。舒适区最大的问题不是太舒服了——而是太安全了，安全到你的身体和心灵都开始打盹了，然后告诉大脑：我无聊。\n\n李娟不是去冬牧场体验生活的。她是去干活的。拿雪当水、睡在地窝子里、一天只吃一顿饭、手冻得碗都端不住。牧民们管这个叫\"冬天\"。他们不算日子，不看时间，日出而作日入而息——这句小学语文课本上的话，你要读完《冬牧场》才知道它真正的意思是：没有闹钟、没有日程表、身体自己知道什么时候该起什么时候该睡。李娟最厉害的地方在于她不自怜，也不歌颂苦难。她只是如实记下来：羊冻死了，好难过。今天有馕吃，很高兴。明天可能要搬家，有点愁。语调平淡如水，但每一句都扎在你那个\"我的生活好无聊\"的念头上。\n\n这本书最适合的状态：期末周刚结束，你觉得整个人被掏空了，但又不知道自己想干什么。不要看手机。打开《冬牧场》的第一页，跟着李娟走进零下四十度的荒野。读完你会想喝一口热水。就是字面意义上的——倒一杯热水，认真地喝下去。你很久没有\"认真地\"喝热水了。","quotes":["天空一整天都是铅灰色的，到了傍晚，反而一点一点亮了起来。于是知道太阳还在，只是被云遮住了。在这荒野里，人是透明的。什么也藏不住，包括对自己的认识。","人的适应能力是无止境的。在零下三十多度的地方待久了，遇到零下十几度的那天，简直觉得春天来了。加一件毛衣都会嫌热。","在荒野里，时间不是用来\"抓紧\"的。时间就是用来过的。像羊吃草一样，一嘴一嘴，一棵一棵。","天空远远的，大地深深的。人走在其中，又寂寞又完整。"],"extras":{"availability":"微信读书可读","ifYouLike":"《我的阿勒泰》《夏牧场》（李娟同系列，不同的季节不同的荒野）；《遥远的向日葵地》（李娟，更个人更碎）"}},{"id":"016","title":"当我谈跑步时我谈些什么","author":"村上春树","summary":"一个小说家用三十年每天十公里的跑步记录告诉你：身体累到极限的时候，脑子反而最安静；持续做一件事不需要意志力，只需要把它变成呼吸一样自然","tags":{"primary":"疲惫","secondary":["平淡","迷茫"]},"guide":"你觉得自己很累，但仔细想想——你身体真的动过吗？你的累是\"精神的累\"：脑子跑了一天马拉松，身体只走了从宿舍到教室到食堂的距离，加起来不到两千步。村上春树管这个区别叫\"坐着的疲惫\"和\"跑着的疲惫\"。前者让你越休息越累；后者让你累完之后洗个澡、吃顿好的，然后睡得像一棵树。\n\n这本书不是教你跑步的。是教你\"持续\"的。村上写他三十年如一日——每天早上四点起床，写作五六个小时，然后跑十公里。刮风跑，下雨跑，宿醉之后跑，在希腊的烈日下跑，在波士顿的寒风中跑。别人问他怎么坚持的，他说：不是\"坚持\"——坚持暗示着你在对抗什么东西。是\"它就是生活的一部分\"。\"痛苦是不可避免的，但受苦是可以选择的\"——这是他在跑了一百公里超级马拉松之后说的。你可能不需要跑一百公里，但你一定需要知道：你烦闷、疲惫、睡不好——你的身体需要用一种物理的方式，把精神的垃圾排出去。\n\n建议在黄昏读。读完第一章，如果你手机里的健康 app 显示今天步数不到三千，把书合上，出门走二十分钟。不用跑。走就行。这是村上会建议你做的事。","quotes":["痛苦是不可避免的，但受苦是可以选择的。","我跑步，只是跑着。原则上是在空白中跑着。反过来说，也许是为了获得空白而跑着。","每天不间断地跑步，跟意志的强弱没有太大关系。能持续做一件事，是因为这件事本身适合你的体质。找到适合自己的节奏，持续下去，跟呼吸一样自然而然地做下去——这就是一切。","在某种意义上，小说家就是用慢速去观察事物的人。跑步也一样——用慢速去感受自己的身体的每一个部分。这需要时间，也需要安静。"],"extras":{"availability":"微信读书可读","ifYouLike":"《挪威的森林》（村上小说，不看故事看他写\"做一件事做到极致\"）；《天生就会跑》（克里斯托弗·麦克杜格尔）——更野的跑步书，探究人类为什么是这个星球上最能跑的生物"}},{"id":"017","title":"一个人生活","author":"谷川俊太郎","summary":"日本国民诗人八十岁以后写的独居笔记——睡觉、做饭、发呆、写诗——疲惫的解药不是更高效的时间管理，是允许自己\"什么也不做\"","tags":{"primary":"疲惫","secondary":["平淡"]},"guide":"你有没有算过，你一天当中有多少小时是真正\"属于自己\"的？不是被课程表推着走的、不是被社交期待裹着去的——就是你想做、你在做、你做完觉得\"嗯，这是我的时间\"。大概很少。而这\"很少\"就是疲惫的真正来源。不是你做的事太多了，是你做的\"自己的事\"太少了。\n\n谷川俊太郎八十多岁，一个人住。房子不大，书很多。早晨起来，不着急——先坐一会儿，等身体完全醒来。然后去厨房，给自己做味噌汤——认真地切豆腐、认真地等水烧开。上午可能写几行诗，也可能不写。下午可能出门散个步，也可能不出门。晚上泡澡、看书、睡觉。你可能会想：一个八十岁老人的日记跟我有什么关系？因为他是你所有长辈里唯一不会对你说\"你要努力\"的那一个。他的每一页都在说同一个意思：\"什么也不做的权利，是你生而为人的基本权利。\"\n\n你累了。这次累不是需要睡一觉的那种——是积累了太多的\"应该\"。这本书是一个八十岁的诗人递给你的一杯温水。喝了它，然后去想一个你今天可以删掉的事。","quotes":["一个人生活，最难的不是孤独，而是跟自己相处的时候，如何不着急。","早晨醒来，不用想今天必须做什么。这是一种能力，我花了大半生才学会。","诗不是写出来的。是等来的。你得先让自己空下来，诗才会进来。","所谓生活，就是跟时间一起慢慢地变老。不急，也不怕。时间是一个温和的伙伴，不是一个需要对抗的敌人。"],"extras":{"availability":"微信读书可读","ifYouLike":"《明天也是小春日和》（津端修一/津端英子）——一对八十多岁夫妻的田园日常，比谷川更甜一点；《做二休五》（大原扁理）——一个年轻人实践\"极简生活\"的日记，更激进"}},{"id":"018","title":"山茶文具店","author":"小川糸","summary":"在镰仓，有一家代笔写信的小店——你告诉她想说什么，她帮你选纸、挑墨、决定用多大力气落笔——读完你会重新理解\"认真做一件小事\"这个词","tags":{"primary":"烦闷","secondary":["疲惫","平淡"]},"guide":"你有多久没有用手写过字了？不是记笔记那种赶着老师的语速的狂草——是认真的、一笔一画的、这个字要多压一下这个字要轻轻提起来的\"写字\"。女主波波在镰仓继承了一家店——不是卖东西，是帮人代笔。\"请帮我写一封绝交信\"、\"请帮一个不识字的人写一封情书\"、\"请替我向死去的人说一句年轻时没说的话\"。她听，然后坐在窗前，想这件事需要用什么纸——厚的还是薄的？用哪种墨——浓的还是淡的？落笔的时候要多大劲——她是出轨的人所以要用歉意的力道，她是被背叛的人所以要用放下的力道。然后写。\n\n你烦闷的时候是不是在\"想\"——越想越闷、越想越绕、最后哪条路都走不通？波波做了另一件事。她把烦闷装进一个具体的动作里：裁纸、磨墨、落笔。每一封信写完，她自己也被放出来了一点。这不是因为信的内容有什么神奇——是因为她用手。你有多久没有让你的手替你的脑子工作了？\n\n建议周末读，一次读完。镰仓的夏天会从书里漫出来——山茶花的叶子、海风的盐味、一种叫\"人生\"的墨香。读完你可能会想给自己写一封信——写的时候注意一下你今天用的笔是什么颜色。","quotes":["写信，不只是为了传达讯息，写信本身就是在传达心意。纸的触感、墨的颜色、笔画之间的空隙——全都是语言。","绝交信不能用愤怒去写。用愤怒写出来的东西，读的人只会听到声音，不会听到意思。要把情绪压下去，用最静的水面，才能映出对方的样子。","每个字都是一口气。写的人吐出来，读的人吸进去。所以代笔这件事，其实就是替别人呼吸。","夏天结束了。镰仓的夏天要用心看才能看到——蝉壳、蚊香、冰镇西瓜、傍晚的火烧云。这些东西不讲大道理，但看完之后你就不烦了。"],"extras":{"availability":"微信读书可读（有续集《闪闪发光的人生》）","ifYouLike":"《闪闪发光的人生》（小川糸，同系列续集）；《编舟记》（三浦紫苑）——另一本\"把一件小事做到极致\"的小说"}},{"id":"019","title":"浮生六记","author":"沈复","summary":"两百年前一个普通人，把娶了喜欢的姑娘、种花、游山玩水写成了一本传世之作——\"有意思\"不来自于大事，来自于一双会看的眼睛","tags":{"primary":"平淡","secondary":["烦闷","空游无所依"]},"guide":"你在追\"更好的生活\"。更好吃的、更好看的、更好玩的。但这本书的作者沈复会告诉你一个完全相反的事实：最好的东西你已经见过了，你只是没有认真看。\n\n两百多年前，沈复娶了一个叫陈芸的姑娘，两个人没什么钱，但是\"会活\"。他们在苏州租了一间小房子，在院子里种花——不是什么名贵品种、就是路边挖来的野花野草。春天把花盆搬出来晒太阳，秋天搬回去，一年一年，乐此不疲。芸娘爱吃腐乳——就是豆腐乳——沈复一开始嫌臭，后来跟着吃、吃出了味。他们俩一起逛庙会、游太湖、在月光下喝茶。沈复用了一整本书来记这些事——不是因为他的人生很精彩，是因为他有一双\"觉得什么都有意思\"的眼睛。\n\n这本书的关键不在\"平淡的生活也能幸福\"——那个太鸡汤了。关键在于：沈复后来什么都失去了——被父母赶出家门、穷得叮当响、芸娘早逝、儿子夭折。他一个人孤零零地写这本书。但他写的时候，不是写苦难——是写芸娘吃腐乳的样子、写沧浪亭那个晚上的月光。他不是在美化记忆，他是真的觉得那些东西是好东西，值一本书。\"平淡\"不是用来凑合着活的，\"平淡\"是等你失去一切之后发现最重要的东西一直在平淡里面。","quotes":["芸曰：\"他年当与君卜筑于此。买绕屋菜园十亩，课仆妪，植瓜蔬，以供薪水。君画我绣，以为诗酒之需。布衣菜饭，可乐终身，不必作远游计也。\"余深然之。","夏月荷花初开时，晚含而晓放。芸用小纱囊撮茶叶少许，置花心。明早取出，烹天泉水泡之，香韵尤绝。","是夜月色颇佳，俯视河中，波光如练。轻罗小扇，并坐水窗，仰见飞云过天，变态万状。","人生坎坷何为乎来哉？往往皆自作孽耳。余则非也。多重情诺，爽直不羁，转因之为累。"],"extras":{"availability":"微信读书可读（推荐张佳玮译本，有白话对照）；纸书多个版本","ifYouLike":"《陶庵梦忆》（张岱，比沈复更奢华也更苍凉）；《秋灯琐忆》（蒋坦）——清代另一对伉俪的自传，比浮生六记更痛"}},{"id":"020","title":"看不见的城市","author":"伊塔洛·卡尔维诺（Italo Calvino）","summary":"马可·波罗给忽必烈汗讲述他见过的五十五座城市——每一座都是一页，每一座都是一种活法","tags":{"primary":"平淡","secondary":["无聊","空游无所依"]},"guide":"如果你觉得\"平淡\"，问自己一个问题：你上一次注意到你所在的城市是什么时候？不是导航上的路名、不是外卖的送达范围——是你走在路上，注意到阳光从一个特定的角度打在某一面墙上，注意到那家你路过一百次但从没进去过的店，注意到这个季节的风是从哪个方向吹来的。\n\n马可·波罗是一个威尼斯人，被派去跟忽必烈讲他旅行中见过的城市。但他讲的每一座城都是他编的——一座悬在深渊上的城、一座由水管和水龙头组成的城、一座每个人都在追同一个女人的城。五十五座城市，没有一座是真实的。但每一座都比你住的城市\"更真实\"——因为它能让你在放下书之后，重新看见你正在呼吸的那个地方。忽必烈问他：\"你为什么不讲你的故乡威尼斯？\"马可·波罗说：\"我讲的所有城市，都是威尼斯。\"你的城市在哪？\n\n每篇两到三页，不需要顺序读。建议先翻到\"城市与记忆\"那一组——然后跳着看，看到哪座城的名字打动你就停下来。这五十五座城市里一定有一座是你现在住的——只不过你以前不知道。","quotes":["记忆中的形象，一旦用词语固定下来，就会被抹去。也许我不愿谈论威尼斯，是因为害怕失去它。也许我在谈论其他城市时，我已经在一点点地失去它。","对于一座城市，你所喜欢的不在于七个或七十个奇景，而在于她对你提的问题所给予的答复。或者在于她提出的、迫使你回答的问题。","城市像海绵一样，吸收不断涌流的记忆的潮水，并随之膨胀。对今日扎伊拉的描述，应包含扎伊拉的整个过去。","他乡是一块负面的镜子。旅人认出他所有的是多么少，而他从未拥有和永远不会拥有的是多么多。","在地狱里寻找非地狱的人和物，学会辨别他们，使他们存在下去，赋予他们空间。"],"extras":{"availability":"微信读书可读（推荐张密译本）；英文译本 Invisible Cities 同样极美","ifYouLike":"《如果在冬夜，一个旅人》（卡尔维诺同作者，更结构的游戏）；《城市发展史》（刘易斯·芒福德）——如果看完五十五座虚构的城想了解一下真正的城"}},{"id":"021","title":"山月记","author":"中岛敦","summary":"\"我深怕自己本非美玉，故而不敢加以刻苦琢磨\"——一个日本作家用汉唐故事，写尽了知识分子的自我怀疑","tags":{"primary":"迷茫","secondary":["烦闷","空游无所依"]},"guide":"\"我深怕自己本非美玉，故而不敢加以刻苦琢磨；却又半信自己是块美玉，故又不肯庸庸碌碌，与瓦砾为伍。\"\n\n如果你读完这句话之后沉默了——你可能是李征。李征是唐代陇西一个天才文人，二十岁进士及第。但他不愿做小吏，辞官回乡，想写出传世的诗。写不出来。穷了，只好再回去做官，但回去之后发现当初不如他的人已经爬到了他头上。他疯了——在一个月夜跑进山林，渐渐变成了一只老虎。中岛敦把这个中国老故事改写成了一篇二十分钟就能读完的短篇小说。但读完之后的回音，大概会持续两周。\n\n你的迷茫可能跟李征一模一样：你不是没有能力，你是不敢验证自己的能力。因为一旦验证了，你就必须面对一个结果——你可能只是普通的好，不是天才。而\"不验证\"让你可以永远保有一种可能性。这种可能性像一个保险箱，你从来不打开它，但你知道它在，它让你觉得自己还不错。中岛敦告诉你：这个保险箱就是你的牢笼。变成老虎的不是你的才华没有被看见——是你自己不敢打开看。","quotes":["我深怕自己本非美玉，故而不敢加以刻苦琢磨；却又半信自己是块美玉，故又不肯庸庸碌碌，与瓦砾为伍。于是我渐渐地脱离凡尘，疏远世人，结果便是一任愤懑与羞恨日益助长内心那怯弱的自尊心。","其实，任何人都是驯兽师，而那野兽，无非就是各人的性情而已。于我而言，这种妄自尊大的羞耻心就是野兽，是猛虎。","我常卖弄什么\"无所作为，则人生太长；欲有所为，则人生太短\"的格言，其实我哪有什么远大的志向，无非是害怕暴露自己才华不足的恐惧，和不肯刻苦用功的无耻之怠惰而已。","世上每个人都是驯兽师，而那头野兽，就是每人自己的性情。"],"extras":{"availability":"微信读书可读（推荐代珂译本）；书中另有《名人传》《悟净出世》等篇同样精彩","ifYouLike":"《悟净出世》（同书另一篇，讲沙僧在流沙河里做哲学研究——比山月记更奇诡）；《变形记》（卡夫卡）——另一个变成虫子的故事，中岛敦的老虎某种意义上在致敬它"}},{"id":"022","title":"旅行的艺术","author":"阿兰·德波顿（Alain de Botton）","summary":"一本教你在家门口旅行的书——出发的真谛不是逃离此地，是重新发现此地","tags":{"primary":"无聊","secondary":["平淡","浮躁"]},"guide":"你脑子里可能闪过很多次\"好想出去走走\"。然后打开旅行 app，看了一圈机票，觉得太贵、太远、太麻烦，关了。\n\n阿兰·德波顿这本书不是教你订机票的。是教你重新看——你没有去过你家楼下那个拐角。不是字面意义上的没去过——你每天路过，但从来没有站在那里看过。没有注意过阳光在某个特定时刻打在那面墙上是什么颜色，没有注意过那条街的尽头在天黑前最后五分钟是什么样子。德波顿把这叫做\"旅行的艺术\"——不是因为你要去很远，而是因为你学会了用旅行者的眼睛看身边。他写梵高教他看普罗旺斯的麦田、写华兹华斯教他看湖区的黄昏，然后反过来——等你放下书，你的眼睛会自动带上这种\"旅行模式\"。学校门口的奶茶店、宿舍楼下那棵树、食堂那条永远在漏水的空调管——突然都值得看了。\n\n无聊的时候，你最不需要的就是更大的刺激。你需要的是把感官重新调灵敏，然后你会发现刺激已经够了——你不需要换地方，你需要换眼睛。","quotes":["我们从旅行中获取的乐趣，或许更多地取决于我们旅行时的心境，而不是我们旅行的目的地本身。","一个人只能看到他已经准备好看的东西。在旅行中如此，在生活中也是如此。","我们出行的主要目的，无非是希望在别处找到我们在家里没能找到的东西。","注视一片风景，就是把自己的身份倾注于那片风景之中。梵高在普罗旺斯找到的，不是普罗旺斯，而是他自己。"],"extras":{"availability":"微信读书可读（上海译文出版社译本）","ifYouLike":"《幸福的建筑》（阿兰·德波顿，同作者，写建筑和幸福的关系）；《观看之道》（约翰·伯格）——更专业地教你\"怎么看\""}},{"id":"023","title":"查令十字街 84 号","author":"海莲·汉芙（Helene Hanff）","summary":"一个纽约穷作家和一个伦敦旧书店之间通了二十年信——两个从未见面的人，靠对书的共同热爱，把平淡通信活成了一种比见面更亲密的关系","tags":{"primary":"无聊","secondary":["平淡","烦闷"]},"guide":"你有没有一个人——你不知道 ta 长什么样，没见过 ta 的脸，但你知道 ta 吃鸡蛋的时候会想到你，因为有一次你说过\"我寄的鸡蛋你们收到了吗\"。\n\n1949 年，海莲·汉芙在纽约，是个穷编剧，住在一间\"连书架都是自己用木板钉的\"公寓里。她发现伦敦有一家旧书店——马克斯与科恩书店，在查令十字街 84 号——专门卖她买得起的旧书。她写了一封信去订书，店员弗兰克·德尔回了一封正经的、签了名的商业回执。然后他们就通了二十年的信。海莲寄火腿和鸡蛋给战后物资配给的英国店员们，弗兰克找遍了英国给她淘她想读的每一本冷门旧书。她的信里全是感叹号和括号和括号里的感叹号——她说\"你们这些英国人怎么连鸡蛋都买不到？！\"弗兰克的信里永远是温和的、正式的——\"亲爱的汉芙小姐，您的书已于昨日寄出。\"他们一辈子没有见过面。信停了，弗兰克死了。\n\n这本书是一个反证——无聊不是因为你没有社交生活，是因为你的社交里没有\"真正在意\"。海莲和弗兰克之间没有表情包、没有\"在吗\"、没有朋友圈点赞。但那些信，每一封都是一个人在另一个人的生命里留下的一个笔画。","quotes":["如果你们恰好路过查令十字街 84 号，请代我献上一吻，我亏欠它良多。","我喜欢扉页上有题签、页边写满注记的旧书；我爱极了那种与心有灵犀的前人冥冥共读，时而戚戚于胸、时而被耳提面命的感觉。","你们若恰好路经查令十字街 84 号，就代我献上一吻吧，我亏欠它太多。"],"extras":{"availability":"微信读书可读（译林出版社陈建铭译本，推荐理由：译者笔调贴近海莲的烟火气）","ifYouLike":"《根西岛文学与土豆皮馅饼俱乐部》（玛丽·安·谢弗）——另一本书信体，讲二战时一群岛民用读书熬过黑暗"}},{"id":"024","title":"局外人","author":"阿尔贝·加缪（Albert Camus）","summary":"默尔索对一切说\"都行\"——妈妈死了，都行；女朋友要结婚，都行；杀了人，好像也不是很在乎——但加缪不是让你学他，是让你看清：厌倦到极致的样子，并不自由","tags":{"primary":"厌倦","secondary":["平淡","空游无所依"]},"guide":"你说\"都行\"的时候，是自由吗？\n\n默尔索是二十世纪文学史上最著名的\"都行\"的人。妈妈死了——他记不清是昨天还是今天。老板要提拔他去巴黎——都行，去不去没区别。女朋友玛丽问他要不要结婚——\"如果你想，我们就结。\"他在海滩上杀了人——不是愤怒，不是仇恨，是因为太阳太大了，剌眼睛。审判他的时候，检察官关心的是\"他在母亲葬礼上没有哭\"而不是\"他杀了人\"。他全程旁观自己的审判，像一个局外人。\n\n这不是一个\"要活出真我\"的鸡汤故事。加缪的厉害在于，他不评判默尔索——他让默尔索做他自己，然后把整个社会的虚伪放在默尔索旁边对比。结果你发现：默尔索是唯一诚实的人——他不假装悲伤、不假装热情、不假装在乎。但社会的审判也是真实的——一个\"不对任何事有感情\"的人，会被视为异类、会面临惩罚。问题于是变成：你愿意为自己的\"无所谓\"付出多少代价？如果你连这也不在乎，那你到底是自由的，还是只是麻木了？\n\n全书很短。建议周日早上读，然后一整天别安排事。脑子会自己转。","quotes":["今天，妈妈死了。也许是昨天，我不知道。","我体验到这个世界如此像我，如此友爱融洽，觉得自己过去曾经是幸福的，现在仍然是幸福的。为了把一切都做得完善，为了使我不感到自己是那么孤单，我只期望处决我的那天有很多人来观看，并对我报以仇恨的喊叫。","人生在世，永远也不该演戏作假。","在我所度过的整个那段荒诞生活期间，一股阴暗的气息，从未来前途的深处向我扑面而来，它穿越了尚未来临的岁月，所到之处，使人们曾经向我建议的所有一切都变得无足轻重。"],"extras":{"availability":"微信读书可读（推荐柳鸣九译本）；另有郭宏安译本同样经典","ifYouLike":"《西西弗神话》（加缪，同作者的哲学论文，解释\"荒谬\"）；《异乡人》（同书另一译名，内容一样）"}},{"id":"025","title":"沉思录","author":"马可·奥勒留（Marcus Aurelius）","summary":"一个罗马皇帝在军营帐篷里写给自己的私人笔记——你白天的焦虑，他在一千八百年前都消化过了","tags":{"primary":"疲惫","secondary":["迷茫","烦闷"]},"guide":"你每天脑子里那些东西——别人的一句话让你烦躁了半天、不知道自己做的事有什么意义、对未来感到不确定——一个叫马可·奥勒留的罗马皇帝在一千八百年前也想过了。区别在于，他把这些想法写下来不是为了出版，是为了每天早上提醒自己：你今天可能会遇到很多让你失控的东西，但你可以不失控。\n\n《沉思录》不是一本哲学书——是一本私人的精神操练笔记。奥勒留在里面反复写的不是理论，是\"你今天该怎么做\"——早上起来，对自己说：不要把时间浪费在那些不在乎你的人的评论上。遇到让你生气的人，停下来，想——他的行为是他的事，你的反应是你的事。一件事让你痛苦，不是因为它本身痛苦，是因为你对它的判断让你痛苦。如果你说\"这就是老了\"\"谁不知道这个\"\"这有什么新鲜的\"——你说得对。这些道理你都听过。但你有没有在哪一天真正遵守过其中的一条？\n\n每天读两三页。它不适合一口气读完——太稠了。建议睡前看，看完之后关灯，把当天发生的一件让你烦的事重新想一遍——用奥勒留的方式。","quotes":["清晨起来，对自己说：今天我将遇到好管闲事的人、忘恩负义的人、傲慢的人、欺诈的人、嫉妒的人和孤僻的人。他们之所以如此，是因为他们分辨不清善与恶。但我已见到善与恶的本性，知道作恶的人与我血脉相连——不仅同属一类族裔，而且享有同样的理智与神性。所以我不会让任何人伤害我，因为我知道愤怒与对抗只能伤害我自己。","你有能力控制自己的思想——而不被外界事物所控制。明白了这一点，你将找到力量。","你做的每一件事，最后都要问自己：这件事是否必要？不仅是不必要的事，连不必要的念头也要抛弃。因为多余的念头会带来多余的行为。","宇宙是变化，人生是看法。","不要像是对此生的时间还有一千年的把握那样去生活。死亡悬挂在头顶。当你能做善事时，当你可以的时候，就去做；说话时，不要犹豫。"],"extras":{"availability":"微信读书可读（推荐何怀宏译本，最通顺；梁实秋译本偏古雅）","ifYouLike":"《人生的智慧》（叔本华）——比奥勒留更刻薄，但同样每句都是匕首；《论幸福生活》（塞涅卡）——另一个斯多葛派的罗马人，比奥勒留更接地气"}},{"id":"026","title":"撒哈拉的故事","author":"三毛","summary":"一个女人跑到撒哈拉沙漠去生活，不是因为那里好，是因为她想去——一个人最自由的时刻，就是发现\"想去\"这个词不需要任何理由","tags":{"primary":"空游无所依","secondary":["无聊","平淡"]},"guide":"你有没有一个瞬间，觉得\"现在的生活不属于我\"？不是难过，也不是愤怒——就是一种陌生的感觉：我为什么会在这里，做这些事，认识这些人。\n\n三毛在《国家地理》杂志上看了一张撒哈拉沙漠的照片，然后她就去了。不是去旅游，是去住。她的先生荷西先过去找了工作，她随后到的，两个人租了一间沙漠边缘的小破房子，没有水，没有电，床上掉沙子，邻居借东西从来不还。她穿着白裙子在沙漠里走路，学会了说阿拉伯语，给邻居看病——半本生理卫生书+一盒消炎药就当了医生。她用棺材板做沙发，用沙漠里捡来的骆驼骨头做装饰品，在家门口的水泥台阶上看夕阳。她管撒哈拉叫\"我前世的故乡\"。\n\n你不需要搬到撒哈拉。你只需要找到你的撒哈拉——一件让你眼睛发亮的事情，小到你可以明天就开始做。三毛不是勇敢的人——她只是不肯等。她不肯等到\"一切都准备好了\"才去活。","quotes":["每想你一次，天上飘落一粒沙，从此形成了撒哈拉。","生命，在这样偏僻落后而贫苦的地方，一样欣欣向荣地滋长着。它，并不是挣扎着在生存，对于沙漠的居民而言，他们在此地的生老病死都好似是如此自然的事。","自由自在的生活，在我的解释里，就是精神的文明。","我只看了一遍，我不能解释的，在那个时候，就莫名其妙地把自己的一辈子，交给了那片陌生的大地。"],"extras":{"availability":"微信读书可读（三毛全集均有）","ifYouLike":"《哭泣的骆驼》（三毛同系列）；《万水千山走遍》（三毛，写南美，比撒哈拉更漂泊）"}},{"id":"027","title":"草枕","author":"夏目漱石","summary":"一个画家逃离东京，住进山间温泉旅馆——\"非人情\"的视角看世界，烦闷就变成了一幅画","tags":{"primary":"烦闷","secondary":["浮躁","空游无所依"]},"guide":"你有没有过一种冲动：把手机关了，坐上一趟不知道去哪的公交车，然后看着窗外，什么都不想？\n\n夏目漱石写了一本小说来实现这个冲动。一个画家，从东京出发，往山里去。没有目的地，没有任务，就是走。到了山里的温泉旅馆，泡一泡温泉，看看山岚，听听雨打在房檐上。跟老板娘聊两句，跟一个剃头的老头聊两句。有人请他画画，他不画——不是不想画，是他还没看够。夏目漱石说，艺术家要有一双\"旁观者\"的眼睛——\"非人情\"的眼睛。不是冷漠，是抽掉\"功利\"\"关系\"\"是非\"，只看颜色、线条、光影。用这种眼睛看世界，一场雨不在好不好——它就是水从天空往下掉的那种\"透明的东西\"，一种空气变湿了的感觉。把\"好不好\"\"应该不应该\"\"别人怎么想\"全部拿掉，你剩下的就是你看见的东西。\n\n你烦闷，不是因为你看见的东西太多了——正好相反。你看见的东西太少了。你看见的全是被你的焦虑\"染色\"后的东西。这本书是一剂褪色剂。","quotes":["山路を登りながら、こう考えた。智に働けば角が立つ。情に棹させば流される。意地を通せば窮屈だ。とかくに人の世は住みにくい。\n（登着山路，我想。依理行事，就会棱角伤人；任情而动，就会被浪潮冲走；一味固执己见，就会处处碰壁。总而言之，人世间不好住。）","いくたびも見飽かずに思うのは、ただこの自然の風景ばかりである。\n（百看不厌的，只有这自然的风景而已。）","人の世の住みにくさが高じると、安らかな所へ引き越したくなる。どこへ越しても住みにくい、と悟った時、詩が生まれて、画ができる。\n（忍受不了人世间的不便，就想搬到更清净的地方去。等明白了搬到哪里都一样住着不舒服时，诗就诞生了，画就成了。）"],"extras":{"availability":"微信读书可读（推荐陈德文译本）","ifYouLike":"《雪国》（川端康成）——同样是山间旅馆、同样是没什么情节，但比草枕更冷更美；《门外汉的京都》（舒国治）——一个现代人在京都的小巷子里漫无目的地走"}},{"id":"028","title":"地下室手记","author":"陀思妥耶夫斯基（Fyodor Dostoevsky）","summary":"一个自认比所有人都聪明的人，在地下室里跟自己吵了整本书——陀思妥耶夫斯基用它来警告你：过度的自我意识会把你活埋","tags":{"primary":"烦闷","secondary":["空游无所依","厌倦"]},"guide":"你如果曾经在深夜想过这些东西：\"我其实不差，但为什么每次到关键时刻就退回来了？\"\"我在脑子里模拟了一百遍怎么跟 ta 说话，但真的见了面还是说不出那句话。\"\"我好像比别人都清醒，但清醒没有让我过得更好——让我更累了。\"恭喜，你体内住着一个\"地下室人\"。\n\n陀思妥耶夫斯基在 1864 年写了一个没有名字的人，他四十二岁，公务员退休，住在地下室里，写了一本自己跟自己吵架的自白。这个人是世界上最清醒的人——他能比任何人都精准地分析出\"为什么我今天不去赴那个约\"的所有深层原因，能比心理医生更快地诊断出\"我其实是在为了不被拒绝而先拒绝对方\"。他会用两百页来跟你辩论一个你从来没想过的问题：\"一个人有没有权利按自己的意志去行动——即使这个行动会伤害他自己？\"然后他会说：有。因为如果你剥夺了我做一件毫无好处、纯粹因为\"我想做\"的事的权利，你等于把\"我\"从世界上拿掉了。\n\n这不是一本温和的书。它不治愈。它是一面黑镜子，让你看见自己的\"过度自我意识\"长什么样。如果你读完觉得痛——痛就对了。","quotes":["我是一个有病的人……我是一个心怀恶意的人。我是一个不讨人喜欢的人。我想我的肝脏有病。但我对自己的病一窍不通，甚至不能确定我到底哪里疼。","人之所以如此喜欢体系与抽象推论，是为了在面对事实时可以逃避责任。","我向你们发誓，先生们，过多的意识就是一种病——一种真正的、十足的病。","一个人可能会故意地、有意识地希望自己受害，甚至希望自己被毁灭。","人的最好定义就是一个两条腿的、忘恩负义的动物。"],"extras":{"availability":"微信读书可读（推荐臧仲伦译本，语气最接近地下室人的神经质；刘文飞译本稍温和）","ifYouLike":"《罪与罚》（陀思妥耶夫斯基，同样的问题但更有故事性）；《局外人》（加缪）——地下室人的反面：一个\"想得太少\"的人"}},{"id":"029","title":"瓦尔登湖","author":"亨利·戴维·梭罗（Henry David Thoreau）","summary":"一个人在湖边住了两年两个月两天——不是为了隐居，是为了\"故意地活\"，把生活压榨到只剩下最必要的东西，然后看看它还剩下什么","tags":{"primary":"平淡","secondary":["浮躁","疲惫"]},"guide":"你有没有算过，维持你目前的生活，一年需要多少钱？梭罗算了。1845 年，他花了三美元在瓦尔登湖边盖了一间木屋。他种豆子、钓鱼、烤面包——不是因为他喜欢种地，是因为他想知道\"一个人活着最少需要多少钱\"。他的答案是：六个星期的工作。一年只需工作六个星期，就可以养活自己。然后他问了一个问题——剩下的四十六个星期，你在干什么？\n\n你在大二，可能被绩点、实习、社团、人际关系塞得满满当当。你有没有哪一天是\"故意地活\"的？不是被推着走的，是\"我选择今天这样过\"——然后你真的那样过了。梭罗做了一件极端的事：他搬到森林里，不是因为讨厌人类，是想把生活里非必要的东西全部砍掉，然后看剩下什么。\"我没有去森林是因为我想去死，我是想蓄意地活着，只面对生活最基本的事实。\"你的日常被太多东西包裹了——通知、热搜、群消息、代取快递。它们合在一起制造了一种\"我很忙\"的幻觉。但实际上你忙完之后回想，什么都没留下来。\n\n这本书不短，但可以跳着读。建议先读\"经济篇\"、\"我生活的地方，我生活的目的\"、\"孤独\"、\"春天\"这四章。剩下的慢慢翻。","quotes":["我到林中去，因为我希望谨慎地生活，只面对生活的基本事实，看看我是否学得到生活要教育我的东西，免得到了临死的时候，才发现我根本就没有生活过。","大多数人都过着静悄悄绝望的生活。所谓的听天由命，正是对绝望的确认。","一个人越是能够放弃一些东西，就越是富有。","时间不过是我钓鱼的那条溪流。我啜饮着它；但在我啜饮的时候，我看到了它的沙底，发现它是多么浅。它的细细的水流流走了，但永恒留下来了。","如果一个人和他的同伴们步调不一致，也许是因为他听见的是不同的鼓点。让他按照自己听到的音乐前进，不管那是什么节奏，或有多远。"],"extras":{"availability":"微信读书可读（推荐徐迟译本，最经典；王家湘译本更现代）","ifYouLike":"《寂静的春天》（蕾切尔·卡森）——如果瓦尔登湖让你爱上了自然；《小即是美》（E.F.舒马赫）——如果\"经济篇\"让你开始思考\"到底需要多少钱\""}},{"id":"030","title":"边城","author":"沈从文","summary":"湘西小镇的一对祖孙、一条渡船、一条黄狗——你读完会发现\"没什么事发生\"也可以是一部杰作，而且\"没什么事发生\"恰好是你现在最需要的东西","tags":{"primary":"平淡","secondary":["烦闷","空游无所依"]},"guide":"你有没有读过一本书，读完之后觉得\"什么都没有发生\"，但合上书的时候眼睛是湿的？\n\n《边城》就是这样的书。湘西边境有一个小镇叫茶峒，有一条河，河边住着一个老船夫和他的孙女翠翠，还有一条黄狗。翠翠长大了，端午节看龙舟，遇见了傩送——当地船总的二儿子。他喜欢她，她也喜欢他。傩送的哥哥天保也喜欢她。后来哥哥出事了，傩送走了。翠翠等。小说的最后一句是：\"这个人也许永远不回来了，也许明天回来。\"全书完。就这些。没有反转、没有高潮、没有坏人。\n\n这才是它最厉害的地方。你每天被喂了太多情节——朋友圈的狗血八卦、热搜的反转、app 上的\"分分合合\"。你的情感阈值被调到了\"没有大事就不值得在意\"的档位。沈从文反着来——他让你花一个下午，看河水怎么流、渡船怎么摆、一个十七岁的女孩怎么在月光下想一个人。你需要重新学会被\"平淡\"打动。翠翠什么都没有说，但你知道她心里有整条河。\n\n建议找一个安静的周末下午。倒一杯茶，找一把硬的椅子。不要躺着看——坐着，像一个认真的读者。读完最后一页，看一眼窗外。","quotes":["这个人也许永远不回来了，也许明天回来。","一切充满了善，然而到处是不凑巧。既然是不凑巧，因之素朴的善终难免产生悲剧。","雨落个不止，溪面一片烟。","到了冬天，那个圮坍了的白塔，又重新修好了。那个在月下唱歌，使翠翠在睡梦里为歌声把灵魂轻轻浮起的年轻人，还不曾回到茶峒来。"],"extras":{"availability":"微信读书可读；纸书极便宜、各出版社均有","ifYouLike":"《湘行散记》（沈从文，同一条河的散文版）；《呼兰河传》（萧红）——另一部\"无事发生\"的杰作，但比边城更冷"}},{"id":"031","title":"西西弗神话","author":"阿尔贝·加缪（Albert Camus）","summary":"\"真正严肃的哲学问题只有一个，那就是自杀\"——但加缪不是劝你死，而是告诉你：荒谬这件事，可以活得很好","tags":{"primary":"厌倦","secondary":["空游无所依","烦闷"]},"guide":"你是不是偶尔觉得——所有事情都差不多。吃饭、上课、睡觉、再来一遍。你做的每一件事好像都有人替你赋予了意义（考试重要、绩点重要、offer重要），但有一天你突然问自己：这些重要，是谁说的？然后你就站在了加缪所说的\"荒谬\"面前。这不是一种消极情绪，这是一个哲学发现——你发现世界本身没有意义，但你又是一个需要意义才能活着的生物。这道裂缝，就是荒谬。\n\n加缪用了一整本书回答这个问题，但他的回答方式不像哲学家——他像一个人在你旁边坐下来，递给你一杯酒，然后说：是的，确实没意义。但正因为没意义，你可以自己决定什么叫有意义。你以为他说\"活着很荒谬所以别活了\"？不是。他说的是\"活着很荒谬，所以活着本身就是最大的反抗\"。他把西西弗推石头上山的故事，从悲剧读成了英雄主义——石头会滚下来，但西西弗走下山的那几分钟，是他自己的。\n\n如果你现在正处在\"不想活了\"的念头的边缘——不是真的想死，而是觉得\"我为什么要在这里做这些事\"——读第一部分和第二部分的最后一章。加缪不会安慰你，但他会让你知道，有这种想法的人不奇怪，而且他们往往是最认真地在活的人。","quotes":["真正严肃的哲学问题只有一个，那就是自杀。判断人生值不值得活，等于回答哲学的根本问题。","应该设想，西西弗是幸福的。","人既不是他想要是的，又是他想要是的。","在荒谬的体验中，痛苦是个人的。一旦成为反抗，痛苦就成了集体的。","重要的不是活得最好，而是活得最多。"],"extras":{"availability":"微信读书可读（推荐杜小真译本或沈志明译本）","ifYouLike":"《局外人》（加缪，同一作者的小说版荒谬）；《存在主义是一种人道主义》（萨特）——如果想从哲学上理解\"意义是自己造的\""}},{"id":"032","title":"小城与不确定性的墙","author":"村上春树","summary":"一座被墙围起来的城、一个困在里面的女孩、一个困在外面的男孩——村上74岁写的最新长篇，比他年轻时更慢、更静、更好","tags":{"primary":"空游无所依","secondary":["迷茫","平淡"]},"guide":"你有没有梦见过一个地方——很熟悉，但你确定你从没去过？\n\n村上春树把这个感觉写成了一本书。故事从十七岁讲起：\"我\"爱上了一个女孩，女孩说她不是真的——她的\"真身\"被困在一座围在墙里的城，在城外的是她的\"影子\"。”我\"开始寻找那座城。找到之后发现，进去的人就出不来了。不是被锁住了——是你自己不再想出去。而\"我\"在里面找到了一份工作：在图书馆里\"读旧梦\"。旧的梦被保存在一个个蛋形的球里，摸一下就能看到一个陌生人的某一段过去。\n\n这本书最安静的力量在于——\"空游无所依\"不是一种病态，在村上的叙事里它就是人类的默认状态。我们每个人都在某座墙里面，也在某座墙外面。区别只在于有的人知道自己被困着，有的人不知道。村上不是在写一个需要被拯救的人——他在写一个\"知道了这件事然后继续往前走\"的人。\n\n这是村上74岁出的新长篇。比他年轻时更慢、更静、更碎。如果你觉得《世界尽头与冷酷仙境》太抽象了（那本书里的墙就是这本书墙的祖父），先读这本——它把同样的结构做成了一个更适合一个人的夜晚的故事。","quotes":["影子说：\'你在墙里面可以永远活着，但活着和\"活着\"是不一样的。\'我说：\'我知道。但有时候人就是想永远活着。有时候又不想。\'","读旧梦是一件很费神的事。每个梦都不愿意被读。梦有自己的尊严。","那座墙不是用来关谁的。它是用来让里面的人心甘情愿留在里面的。","十七岁那年我以为爱情是火焰。四十多年后我才知道爱情是水——没有什么形状，但它会自己找到每一个裂缝。"],"extras":{"availability":"微信读书可读（上海译文出版社新译本）；英文版 The City and Its Uncertain Walls 2024年出版","ifYouLike":"《世界尽头与冷酷仙境》（村上春树，同一结构的前身，更先锋更冷）；《1Q84》（村上，同样\"两个世界\"的母题，但更长更暗）"}},{"id":"033","title":"禅与摩托车维修艺术","author":"罗伯特·波西格（Robert M. Pirsig）","summary":"一个父亲带着儿子骑摩托车横穿美国——他一边修车一边跟你聊：什么是\"好\"？为什么我们越追效率越焦虑？","tags":{"primary":"浮躁","secondary":["疲惫","迷茫"]},"guide":"你现在的世界里，所有东西都被分成了两类——\"有用的\"和\"没用的\"。这门课有用，那个社团没用。这个技能值钱，那个爱好浪费时间。你把这种分类当成理所当然，但你有没有想过——这套分类法本身就可能是你的焦虑源？\n\n波西格管这个叫\"古典主义与浪漫主义的冲突\"。古典主义者关心摩托车的工作原理——为什么引擎会转、链条怎么传动、一个零件出了故障你该怎么修。浪漫主义者关心骑摩托车的感觉——风、阳光、路边一闪而过的山、骑到黄昏的时候心里涌起来的那种说不清的东西。波西格的洞察在于：这两种方式不对立。摩托车不是\"功能部件\"和\"审美外壳\"拼起来的——它是一整件事。你修它的时候，你在和它对话；你骑它的时候，你也在和它对话。你之所以觉得生活被切成两半，是因为你被教成了一个只看\"功能\"的人，然后你发现只按功能活，你的身体不答应。\n\n这本书不短，而且每一页的密度都很大。波西格不是写\"禅\"——他是真的在用修摩托车的经验来拆解\"良质\"（Quality）这个概念。建议你带着一个问题读：我上一次做一件事，不是因为有用，而是因为它\"对了\"——是什么时候？","quotes":["骑车和其他的旅行方式完全不同。坐汽车只是把身体从一个地方运到另一个地方。骑摩托车是真正的旅行——你完全置身于景致之中。","你越在乎结果，反而越难得到结果。修车和生活的共同道理——如果你完全沉浸在对车子本身的关怀中，结果自然就是好的。","良质不是一种你可以分析的东西。但当你遇到它的时候，你一定能认出来。就像你听到一首好歌，你不需要音乐系学位就知道它好。","心烦意乱的时候，不要继续拧扳手。停下来，抽一支烟，想一想自己在做什么。大多数故障都是你上一个心情不好的时候修出来的。"],"extras":{"availability":"微信读书可读（推荐张国辰译本）；纸书另有《万里任禅游》同名异译","ifYouLike":"《箭术与禅心》（赫立格尔）——如果你读完摩托车这本，想更极致地体验\"做事即修行\"；《摩托车修理店的未来工作哲学》（马修·克劳福德）——一个哲学博士真的去修摩托车了"}},{"id":"034","title":"布雷特的生命清单","author":"洛里·斯皮尔曼（Lori Nelson Spielman）","summary":"一个女人34岁母亲去世，遗嘱里逼她一年内完成14岁时写的一张人生愿望清单——不然一个亿不给你","tags":{"primary":"平淡","secondary":["厌倦","迷茫"]},"guide":"你有没有在十四岁的时候写过一张\"我这辈子一定要做的事\"？如果让你现在写，你会写什么？\"找到一份年薪X万的工作\"\"买一套房\"\"把绩点拉到X\"——你十四岁的时候，绝对不会写这些东西。十四岁的你会写\"去一次非洲\"\"学会弹吉他\"\"在大雨里跑一次\"\"养一只狗\"。你现在比十四岁\"成熟\"了很多，但你的愿望清单变成了一堆数字和门槛。\n\n布雷特三十四岁那年，母亲去世了，留下一份遗嘱：你必须一年内完成十四岁时写的人生清单（一共二十条），否则遗产不给你。清单上的内容包括\"养一匹马\"\"在课堂上举手发言\"\"和爸爸和解\"\"谈一次真正的恋爱\"。布雷特是一个公关经理，她觉得母亲疯了。但遗嘱是遗嘱——她开始一件一件做。做到一半她发现，这张清单不是在逼她做傻事，是在逼她重新成为十四岁那个觉得\"一切皆有可能\"的人。\n\n读这本书不需要任何哲学知识。它是一本\"周末飞行舱\"——周六早上打开，黄昏之前读完。合上书后，你要做的事情不是写遗愿清单，是去翻你小时候的日记。","quotes":["十四岁的布雷特相信一切都会好的。三十四岁的布雷特相信一切都需要被计划、被验证、被备份。她们之间最远的距离不是二十年——是\"相信\"和\"确认\"的距离。","妈妈在遗嘱里说：\'我要的不是你完成清单上的每一件事。我要的是在这一年里，你重新学会——你想要什么。\'","第一条：养一匹马。我住在芝加哥市中心的公寓里。我妈一定是疯了。然后我在一个马场里站了一下午，闻到了干草和阳光的味道。她没疯。是我忘了这个味道。","有些事情你做不是因为你能做好。你做得一塌糊涂、毫无体面。但做完之后你发现自己一直在笑。你很久没有因为自己的\"糟糕\"而笑了。"],"extras":{"availability":"微信读书可读（中信出版社译本）","ifYouLike":"《一个人的朝圣》（蕾秋·乔伊斯）——另一个\"看似不可能的任务改变了人生\"的故事；《美食、祈祷、恋爱》（伊丽莎白·吉尔伯特）——如果布雷特不是被妈妈逼而是自己辞职去做清单"}},{"id":"035","title":"海边的卡夫卡","author":"村上春树","summary":"一个十五岁少年离家出走、一个能跟猫说话的老人、一个把记忆变成石头的人——田村卡夫卡可能是世界上离家出走最安静的一个","tags":{"primary":"空游无所依","secondary":["烦闷","迷茫"]},"guide":"你十五岁的时候有没有想过离家出走？不是真的走——是在脑子里想象：如果我现在站起来走出这扇门，一直往前走，什么都不带，会发生什么。田村卡夫卡（这不是他的真名，是他给自己取的）把这件事做到了——他十五岁，从东京坐新干线到了四国岛，住进一家小图书馆，白天读书，晚上去健身房。他有一个父亲——他恨他父亲。他有一个母亲和姐姐——他四岁之后没见过她们。他的故事在\"世界上最强的十五岁少年\"和\"一个叫中田的老头能跟猫说话\"两条线之间来回切。你读到一半还觉得这完全合理——这就是村上的本事：把最不可能的事，写成你完全相信会发生的事。\n\n这本书的主题就是\"空游无所依\"。田村卡夫卡没有归属感——不属于他的家庭、他的学校、他的名字。他选择\"漂浮\"，然后在漂浮的过程中，他撞进了别人的命运、撞进了他自己一直逃避的记忆。村上没有替他解决任何问题——到最后他还是一个人。但他不再是那个\"因为害怕所以逃跑\"的人——他是\"因为知道自己是谁了，所以可以一个人待着\"的人。\n\n这不是一本一天能读完的书。但你开始读之后——如果你处在\"不知道我是谁、我属于哪\"的阶段——你会想一直读下去。不是因为情节紧张，是因为你想知道田村卡夫卡会好起来吗。他会的。不是被拯救，是自己走出来的。","quotes":["于是，我闭上眼，侧耳倾听自己体内。我听到的是心脏的搏动、血液的循环、肺部的收缩和扩张。十五岁的身体很忙。但身体里面的那个我，却一动不动，像一块被遗忘在抽屉底部的石子。","命运就像沙尘暴——你变换脚步想要避开它，沙尘暴也变换脚步跟着你。你为什么非要避开它不可呢？因为你不避开它，你就会迷失。但走进沙尘暴之后你就会发现，沙尘暴其实是你的内心。","中田没有上过学。中田不识字。中田不知道这个世界为什么会变成这样。但中田能和猫说话。这就够了。至少对中田来说。","有时候，你必须一个人安静地待在黑暗中——直到你的眼睛开始看见黑暗本身。"],"extras":{"availability":"微信读书可读（上海译文出版社林少华译本）","ifYouLike":"《世界尽头与冷酷仙境》（村上同作者，另一条\"在两个世界之间\"的故事，结构更精妙）；《杀鹌鹑的少女》（玛格丽特·阿特伍德）——如果中田老头的平静打动了你"}},{"id":"036","title":"也许你该找个人聊聊","author":"洛莉·戈特利布（Lori Gottlieb）","summary":"一个心理咨询师自己也需要心理咨询——她在治疗别人的同时也在接受治疗，然后把两边的故事一起写了出来","tags":{"primary":"烦闷","secondary":["疲惫","迷茫"]},"guide":"你说\"烦\"——不是那种\"今天天气不好\"的烦躁，是那种你也不太说得清楚的、闷在胸口里的、跟谁都没法说的事。不是没有朋友——是有了朋友也不知道从哪开口。\"最近有点烦\"——但具体烦什么，你说不上来。你只是在等它自己过去。\n\n洛莉·戈特利布是一个心理治疗师。她治别人：一个把所有人都骂走的制片人、一个刚查出癌症的年轻妈妈、一个七十岁想自杀的老太太。然后有一天她自己被分手了——对方说\"我不想和一个有孩子的人共度余生\"（洛莉是个单亲妈妈）。她崩溃了。她身为一个心理治疗师，居然需要找心理治疗师。这本书就是她把两边的故事同时讲出来——她治别人的时候，房间里发生的事；她自己被治的时候，房间里的另一边。\n\n你\"烦\"的时候读这本书，不是因为里面有答案——洛莉不会告诉你\"烦闷应该这样解决\"。她只是让你坐在她的候诊室里，看五个完全不同的人，每一个都\"有一个说不出口的事\"。然后你发现你不是唯一一个有\"那个事\"的人。这件事你没法跟室友说，但你可以在一个心理治疗师的日记里，看到别人怎么面对他们自己的版本。","quotes":["痛苦没有可比性。你不能说\'我的痛苦比你的轻所以我没有权利难过\'——痛苦就是痛苦。感到痛苦的人都有权利痛苦。","人们以为治疗师的工作是给建议。不是的。治疗师的工作是让你听见你自己在说什么。当你在一个有另一个人认真听的房间里说出那些话时，那些话就不再只是你自己脑子里的噪音了。","她说：\'我不知道自己为什么不开心。我的生活没有任何问题。\'我说：\'没有\'问题\'不等于没有问题。\"","那个七十岁的老太太告诉我：\'年轻人总以为老了之后就不在乎了。不会的。你在乎了一辈子的事会越来越在乎。区别只在于你学会了对在乎的事微笑。\'"],"extras":{"availability":"微信读书可读（上海文化出版社译本）","ifYouLike":"《蛤蟆先生去看心理医生》（罗伯特·戴博德）——用童话体写同样的事，更轻更短；《当生命陷落时》（佩玛·丘卓）——如果不想看别人的故事，想看自己怎么修的"}},{"id":"037","title":"贪婪的多巴胺","author":"丹尼尔·利伯曼（Daniel Z. Lieberman） / 迈克尔·朗（Michael E. Long）","summary":"用神经科学解释：为什么刷完手机更空虚、为什么暗恋比恋爱更上头、为什么你总在追求下一个目标——不是你意志力差，是多巴胺的出厂设定就是\"不够\"","tags":{"primary":"浮躁","secondary":["无聊","厌倦"]},"guide":"你可能在一天之内经历了以下循环超过十次：解锁手机、滑两下、觉得没意思、锁屏。三十秒后，又解锁。这个循环不是因为你\"浮躁\"——是因为你的大脑里有一个叫多巴胺的分子，它的工作不是让你\"快乐\"，而是让你\"想要\"。\"想要\"和\"快乐\"是两个不同的系统。多巴胺负责前者——它在你期待某件事的时候释放最多，而不是在你得到那件事的时候。所以你滑到一个好看的视频——多巴胺在加载那零点几秒达到峰值——看到一半就没了。然后你滑下一个。这就是为什么你刷了三个小时手机，不快乐，但停不下来。\n\n利伯曼和朗把多巴胺的故事从头讲了一遍。它怎么让你爱上还没追到的人（所以暗恋比关系稳定后更上头）、怎么让你在拿到offer的那天比入职后的每一天都开心、怎么让你觉得\"下一个\"永远比\"这个\"好。这不是一本教你\"戒掉手机\"的自助书——它是给你一个神经科学的框架，让你知道：你不是被 app 打败了，你是被一群比你更了解你自己大脑化学的人，用你的多巴胺来套现了。你知道这件事之后，下次解锁手机之前，可能会停一下。\n\n建议读第一、二、四章。读完之后如果你还想滑手机——没事。但你每次滑的时候，脑子里的多巴胺会说：\"这还不够\"——然后你会听见这句话。听见它，它就不太能控制你了。","quotes":["多巴胺不是快乐的分子，它是预期的分子。它的任务不是让你满足，而是让你永远不满足。","爱是一场化学反应，但不是你以为的那种。激情之爱由多巴胺驱动——它让你渴望、追逐、日夜思念。但陪伴之爱由催产素和内啡肽负责——它让你安静地待在一个人身边，什么也不说。","我们生活在一个专门针对多巴胺系统设计的世界里。每一次推送、每一次下拉刷新、每一个'猜你喜欢'——都是对你大脑化学的一个精确打击。","想要某样东西，和喜欢某样东西，是两件完全不同的事。多巴胺让你\'想要\'。但它不在乎你\'喜欢\'还是不喜欢。"],"extras":{"availability":"微信读书可读（中信出版社译本）","ifYouLike":"《心流》（契克森米哈赖）——读完'多巴胺为什么让你停不下来'，读'心流怎么让你停下来'；《注意力经济》（吴修铭）——从媒体史看'他们是怎么把你的注意力变成钱的'"}},{"id":"038","title":"明天也是小春日和","author":"津端修一 / 津端英子","summary":"一对加起来177岁的夫妻，在名古屋郊外种菜、做饭、织布、等风——这本书没有情节，全是生活","tags":{"primary":"疲惫","secondary":["平淡","烦闷"]},"guide":"你有没有觉得过——你活得很\"赶\"。赶着毕业、赶着实习、赶着证明自己。你有时候想象，如果能停下来的话，你想过什么样的日子？不用多好，就是\"今天把院子里那棵树修了一下，下午喝了一杯茶，太阳很好\"。你想到这儿，然后觉得这不可能——至少现在不可能。\n\n津端修八十九岁，英子八十七岁，两个人结婚六十五年。他们住在名古屋郊外，房子是自己盖的，院子里有七十种蔬菜和五十种果树。修一每天早上第一件事是去菜地，看看昨天的萝卜长了多少。英子用自己种的果子做果酱，一瓶一瓶贴上标签——\"英子的草莓酱 / 2023年5月 / 修一觉得太甜了但我觉得刚好\"。他们不赶。不是因为老了——是因为他们很早就决定了：不赶。\n\n你累了。\"明天也是小春日和\"在日语里的意思是——你以为秋天快过去了，突然来了一个太阳很好的、暖和的十月下午——它是不请自来的，是你没期待的。这本书就是你累了的时候的\"小春日和\"。翻几页就合上，不需要一口气读完。它不会教你任何事。但合上之后你会想给自己泡一杯茶。认真地泡。","quotes":["修一说：\'日子就是用来过的。不是用来追的。种了萝卜，过几天就有萝卜吃。没有萝卜的时候有白菜。有白菜的时候等萝卜。\'","院子里有一块木牌，英子亲手写的：\'今天的风从东边来。英子。\'第二天风从西边来了，她擦掉重写。修一在日记里记这件事：\'风每天都会换方向，英子也每天都会擦。\'","有人问他们婚姻六十五年的秘诀。英子说：\'我没有秘诀。我只是每天早上都想知道——修一今天在院子里发现了什么新的东西。\'修一说：\'英子做的果酱太甜了。但我每天都会吃完。\'","小春日和的意思，就是以为冬天要来了，但还有最后一个晴好。不用感激它。不用分析它。你只需要知道——它来了，你在这。就这些。"],"extras":{"availability":"微信读书可读（新星出版社译本）；另有同系列《积存时间的生活》","ifYouLike":"《一个人生活》（谷川俊太郎）——一个八十岁诗人独居的日常；《山茶文具店》（小川糸）——同样是日本\"把日子过得像手艺\"的美学"}},{"id":"039","title":"夜晚的潜水艇","author":"陈春成","summary":"一个90后中国作家的第一本书，九篇小说，每一篇都在做同一件事：把想象力从世俗生活的重力里解放出来","tags":{"primary":"无聊","secondary":["空游无所依","平淡"]},"guide":"你有没有过这种时候——坐在车上看着窗外，脑子里开始编一个完全没用的故事。比如你前面那辆车里坐着的可能是一个在逃的俄罗斯间谍，比如路边那棵歪脖子树其实是几百年前某个武林高手用剑气削出来的。你编了大概三十秒，然后有人发微信给你——\"作业做了吗\"——你的想象力就缩回去了。\n\n陈春成保护了那三十秒。他把它写成了一本书。九个短篇：一个少年幻想力过于旺盛，每天晚上在脑子里开潜水艇（不是比喻，是详细地、带着海底地质学知识地开潜水艇）；一个古人写了一首诗，谁也不知道它刻在哪里的石头上，一千年后的人还在争论它是不是真的存在过；一个图书馆管理员发现了一本书，书里写到的人名全是历史上真实存在的人——但那些事他们没有做过——或者也许他们做过，只是被历史删掉了。\n\n无聊的时候你最不需要的是一本教你\"不要无聊\"的书。你需要的是有人在你的无聊里开了一扇窗，然后你发现窗外有一个海底世界、一座会消失的山、一个在云上吹笛子的人。陈春成做了这件事。而且他用的是中文——是你看过的最好看的中文小说之一。","quotes":["我的潜水艇是在一个夜晚消失的。那时候我十六岁，坐在高中的教室里，窗外是灰色的楼房和灰白色的天空。我的脑子里有一个螺旋桨和氧气舱的完整设计图，但我把它丢了。因为老师说：\'不要发呆。\'","有一种东西叫\'大地的意义\'。你走在一座山里，你觉得这座山在告诉你一些事。不是语言，是比语言更古老的东西。但你听不懂了。因为你太久没有一个人走在山里。","据说宇宙的尽头有一架云上钢琴。没有琴键。你把手放在空中，它会弹你心里正在想的那首歌。但只有你自己听得见。所以谁也不知道那台钢琴到底在不在。","我一直在找一种语言——它不能太准确。太准确会把想象困住。它要刚好够模糊，像一个你还没完全醒的梦的尾巴尖。"],"extras":{"availability":"微信读书可读（理想国出品）；纸书获2021年宝珀理想国文学奖","ifYouLike":"《看不见的城市》（卡尔维诺）——同样是\"每一篇都只造一座城\"；《太古和其他的时间》（奥尔加·托卡尔丘克）——如果陈春成的九篇让你想读更长的\"魔幻日常\""}},{"id":"040","title":"秋园","author":"杨本芬","summary":"一个80岁的老奶奶在厨房里写了她妈妈的一生——没有文学野心，就是用最干净的文字记了一个中国女人怎么在贫穷和失去里活了89年","tags":{"primary":"疲惫","secondary":["烦闷","厌倦"]},"guide":"你说你累——你的累很大一部分可能是\"我做得还不够多\"。你觉得你应该更努力、更高效、更成功。你对自己有期待，然后你觉得期待落空了，然后你累了。\n\n杨本芬写这本书的时候已经八十岁了。她没上过大学，在厨房里、在洗菜和炒菜之间，用一个本子垫在灶台上写。她写的是她妈妈——秋园。秋园生于1914年，裹过脚、读过两年私塾、十二岁被嫁出去、后来丈夫饿死、她自己靠给人补衣服养活了几个孩子。她一生没有\"职业\"、没有\"成就\"。她就是一个普通的中国女人。在秋园的世界里，\"活着\"本身就是一件需要全力以赴的事——不是在健身房出一身汗的那种全力，是今天家里只剩一把米，你不知道明天这把米还有没有的那种全力。\n\n这本书没有用任何技巧。杨本芬的文笔干净得像秋园洗了一辈子的衣服——没有多余的修辞、没有文学野心，就是\"我想记住我妈，趁我还活着赶紧写下来\"。你读完之后会沉默很久。不是因为秋园太惨了——是因为你觉得，你所有的\"累\"跟秋园比起来好像不值一提。但杨本芬不是在让你\"知足\"——她是让你看见：一个人可以承受的比你想象的大得多。你的疲惫，也许是你的身体在告诉你——你背了很多不需要你背的东西。","quotes":["我写这本书的时候，常常写着写着就趴在灶台上哭。不是难过。是想起来我妈那时候，也跟我现在一样，一个人做饭，一个人想事情。","秋园这一生，最富有的东西是她的忍耐力。她没有别的财产了，就把这一件传给了我。","贫穷是一种气味。你闻过的人，一辈子都记得。我的鼻子还记得那个时代的气味——是煤油灯、补了三次的衣服、和在锅里煮了一天的粥的味道。","人老了之后才发现，一生中最重要的决定，都不是在你以为在做决定的时候做的。是在你没想的时候，命运已经帮你选好了。"],"extras":{"availability":"微信读书可读（北京联合出版公司）；杨本芬另有续作《浮木》《我本芬芳》","ifYouLike":"《活着》（余华）——同样是中国普通人被命运碾过然后活着；《巨流河》（齐邦媛）——比秋园更长、更知识分子视角的中国女性史"}},{"id":"041","title":"悉达多","author":"赫尔曼·黑塞（Hermann Hesse）","summary":"一个婆罗门之子离开家，当过苦行僧、见过佛陀、沉溺过金钱和情欲——最后在一条河边，听懂了水在说什么","tags":{"primary":"空游无所依","secondary":["迷茫","烦闷"]},"guide":"你在找\"意义\"。但你可能找错了方向——不是去远处找，而是去近处听。\n\n悉达多是婆罗门之子，什么都学得最快、最好。但他觉得所有的经文和老师都不能给他他真正想要的那个东西——不是知识，是一种\"知道\"。于是他离开家，先去做苦行僧，饿自己、冻自己，发现苦行磨不掉欲望。然后去城里，跟一个名妓学爱、跟一个商人学钱，赚了很多、享受了很多，发现钱和爱也填不满那个洞。最后他来到一条河边，跟一个摆渡的老头学摆渡。老头说：\"你听见河在说什么吗？\"悉达多说：\"没有。\"老头说：\"听。\"他就坐在河边听了很多年。\n\n你不需要去河边。但你需要知道一件事：你一直在\"找\"，而悉达多告诉你——\"找\"和\"找到\"是两回事。找的人眼睛只盯着目标，看不见周围。找到的人不需要找——他已经在里面了。这本书的厚度只有一百多页，但每一页都像是在水里泡过的——光滑、凉、透明。如果你觉得\"空游无所依\"——恭喜，你已经出发了。悉达多从出发到抵达花了一辈子。这本书你可以一个下午读完，但它会在你脑子里待很久。","quotes":["知识可以传递，但智慧不能。智慧只能被体验。","当一个人寻找的时候，他眼睛只看见他在找的东西，他什么也发现不了，什么也吸收不了——因为他只想他要找的东西，因为他有一个目标，因为他被那个目标迷住了。","我通过我的身体和灵魂知道，我需要罪孽、需要肉欲、需要追求财富、需要虚荣、需要最可耻的绝望，才能学会放弃抵抗、学会爱这个世界。","河教会了我倾听——你不需要做任何别的事。倾听，你就会学会一切。"],"extras":{"availability":"微信读书可读（推荐姜乙译本，公认最佳中文译本）","ifYouLike":"《德米安》（黑塞同作者，更少年的版本）；《刀锋》（毛姆）——另一个\"找了一辈子\"的人"}},{"id":"042","title":"蛤蟆先生去看心理医生","author":"罗伯特·戴博德（Robert de Board）","summary":"一只抑郁的蛤蟆，在心理咨询师的沙发上坐了十次——你读的时候会觉得自己就是那只蛤蟆","tags":{"primary":"烦闷","secondary":["疲惫","迷茫"]},"guide":"你有没有过\"说不出来哪不对，但就是不对\"的时候？蛤蟆先生有。他曾经是那个最会玩、最会闹的蛤蟆——开跑车、穿花衬衫、笑声震天响。然后有一天他突然不起来了。不洗脸、不出门、躺在床上看着天花板。他的朋友说\"你得振作\"——这句话你肯定也听过。但蛤蟆振作不起来。\n\n然后他去看了心理医生——苍鹭。苍鹭不说话。蛤蟆问他\"我该怎么办\"——苍鹭说：\"你为什来？\"蛤蟆说\"朋友们让我来的\"——苍鹭说：\"那请你回去吧。等你觉得自己想来的时侯再来。\"这就是第一次咨询。全书一共十次。每一次蛤蟆都学到了一点自己都不知道的、关于自己的事——为什么他总是讨好别人、为什么他一边讨厌强势的人一边又希望被他们控制、为什么他\"觉得自己不好\"这个念头从他爸爸那里开始已经活了五十年。\n\n这本书用童话体，但你不会觉得它在哄小孩。你读的时候可能会停下来、把书合上、想一个人坐在床上一会儿。不是因为蛤蟆的故事有多特别——是因为你就是蛤蟆。至少有一部分是。","quotes":["\'你感觉怎么样？\' \'说不上来。就是——很空。像被掏空了。\'苍鹭点点头，没有接话。沉默持续了很长时间。蛤蟆后来回忆说，那是他人生中第一次有人认真地等他说下一句。","蛤蟆说：\'我总是在道歉。对每一个人道歉。我不知道为什么。\'苍鹭说：\'因为你把自己的\'人生剧本\'写成了\'只要我足够乖，别人就不会生我的气\'。\'","苍鹭说：\'你有一个\'父母自我状态\'——你脑子里的那个声音，永远在批评你做得不够好。那不是你的声音。是你父亲的声音。你把它放在心里太久了，久到你觉得它是你自己。\'","第十次咨询结束的时候，蛤蟆没有说谢谢。他唱了一首歌。不是为苍鹭唱的。是为自己。"],"extras":{"availability":"微信读书可读（果麦文化出品）","ifYouLike":"《也许你该找个人聊聊》（洛莉·戈特利布）——心理咨询师自己也需要咨询，更成人视角；《被讨厌的勇气》（岸见一郎/古贺史健）——如果蛤蟆让你想更系统地了解\"为什么我总是在讨好\""}},{"id":"043","title":"牧羊少年奇幻之旅","author":"保罗·柯艾略（Paulo Coelho）","summary":"一个西班牙牧羊少年做了同一个梦两次，然后卖掉羊群穿越沙漠去找金字塔——这本书告诉你的不是\"追梦\"，是\"梦已经在追你了\"","tags":{"primary":"迷茫","secondary":["空游无所依","平淡"]},"guide":"你有没有一种感觉——有一件你\"应该去做\"的事，一直在你脑子里转，但你每一次都把它推迟了。不是因为太难，是因为你身边的人都说\"你想多了\"\"稳定一点不好吗\"\"别瞎折腾\"。\n\n圣地亚哥是西班牙的一个牧羊少年。他做了同一个梦两次——梦见金字塔底下有宝藏。他去问解梦的人，对方说：去金字塔。他犹豫了。然后他在广场上遇到了一个老人——撒冷王。老人说：我告诉你一个秘密——\"当你真正想要某样东西的时候，整个宇宙都会合力帮你实现它\"。圣地亚哥卖掉了羊群。这一路他被人骗光了钱、在水晶店里打工攒路费、穿越撒哈拉沙漠、遇到了炼金术士、差点死在沙漠里。最后他到了金字塔。我不告诉你他找到了什么——我只能告诉你，当你读到最后一句时，你会把书合上，然后沉默。\n\n"追梦"这个词被用烂了。但圣地亚哥的故事不是追梦——是\"天命\"。天命不是你选的，是它在选你。你只需要决定：我听不听。","quotes":["当你真正想要某样东西的时候，整个宇宙都会合力帮你实现它。","我现在还活着。当我吃东西的时候，我就一心一意地吃。走路的时候，我就只管走路。如果我必须打仗，那么死在这里和死在别的地方，对我来说都一样。","因为我既不生活在过去，也不生活在未来。我只有现在——这才是我感兴趣的。如果你能永远停留在现在，你就会是最幸福的人。","害怕遭受痛苦，比遭受痛苦本身还要糟糕。","每个人年轻时都知道自己的天命。那个时候，一切都清晰可见，一切都充满可能。他们不怕做梦，也不怕去渴望那些他们希望发生在自己生命中的事。但随着时间的流逝，一种神秘的力量开始试图证明，实现天命是不可能的。"],"extras":{"availability":"微信读书可读（推荐丁文林译本）；全球销量超6500万册","ifYouLike":"《小王子》（圣埃克苏佩里）——同样是一个少年在沙漠里发现\"最重要的东西\"；《海鸥乔纳森》（理查德·巴赫）——一只海鸥想飞得比所有海鸥都高"}},{"id":"044","title":"古都","author":"川端康成","summary":"一对被分开的双胞胎姐妹、一座四季流转的京都、一个没有结尾的故事——川端康成写的不叫\"平淡\"，叫\"侘寂\"","tags":{"primary":"平淡","secondary":["烦闷"]},"guide":"你有没有过一种感觉——某一天的傍晚，你走在路上，突然觉得\"现在这个时刻真好啊\"，然后它过去了，你什么都没做，但那一个下午留在了你心里。\n\n川端康成的《古都》就是这种感觉写成的一本书。京都的一对双胞胎姐妹，生下来就被分开——千重子被有钱人家抱走，苗子留在山里。千重子不知道自己是养女，直到有一天她在山上遇见了苗子——对方的脸和自己一模一样。故事从这里开始，但川端不写\"相认\"的狗血，他写千重子在春天看樱花、夏天去参加祇园祭、秋天看枫叶、冬天等一场雪。苗子只在几个夜晚出现——她来看一眼姐姐，然后走回山里。小说结尾，苗子坐末班电车离开，千重子在门口站着。没有拥抱，没有\"我会来接你\"，只有雪在下。全书完。\n\n你追了很多\"有结尾\"的东西——看完一部剧要知道结局、追一个人要知道结果、做一个项目要拿到证书。但川端在告诉你：有些东西没有结尾，它就是发生了——然后留在那里。你回头看它的时候，它还在，比那些有结局的事更持久。","quotes":["千重子看见苗子的脸的时候，没有害怕。她觉得自己在照镜子。只是镜子里的那一个人，比她更瘦、更黑，但眼睛和她一模一样。","京都的春天是从樱花开始的。不是开了多少，是开了第一朵。第一朵开的时候，整座城都在等它。","苗子说：\'我就是来看一眼。看一眼就走。\'千重子没有留她。不是因为不想留，是因为她知道，山里的那个人不属于城里。她自己呢？她也不知道。","\'你觉得京都的哪一个月最好？\' \'十一月。\' \'为什么？\' \'因为枫叶正在落，还没落完。\'"],"extras":{"availability":"微信读书可读（上海译文出版社译本）","ifYouLike":"《雪国》（川端康成同作者，更冷更美）；《边城》（沈从文）——同样是一个\"没有结局\"的故事，但更质朴"}},{"id":"045","title":"挪威的森林","author":"村上春树","summary":"三十七岁的村上在飞机上听到一首老歌，然后想起了十八岁那年——两个女孩、一个死去的朋友、和一段不知道怎么走下去的日子","tags":{"primary":"疲惫","secondary":["烦闷","空游无所依"]},"guide":"你失去过一个人吗？不是\"分手\"那种失去——是一个活生生的人，前一天还跟你说话，第二天就不在了。木月是渡边最好的朋友。十七岁那年，木月在自己家的车库里，用汽车尾气杀死了自己。没有任何预兆，没有遗书。渡边后来去了东京上大学，木月的女朋友直子去了京都的疗养院。渡边每周给直子写信，偶尔去看她。她在疗养院里很好——安静、做饭、跟渡边在雪地里散步。然后她也不在了。\n\n这不是一本\"教你如何走出悲伤\"的书。村上不教。他只是写渡边——这个普通的、有点呆的大学生——在东京的出租屋里听着爵士乐、后来遇到了另一个女孩绿子、绿子很吵、绿子做饭很好吃、绿子说\"渡边君，你到底爱不爱我？\"渡边不知道。他脑子里还住着直子和木月。他一个人在电话亭里，给绿子打电话，电话接通了他不知道该说什么。窗外在下雨。\n\n你累的时候，不是需要一本告诉你\"一切都会好的\"的书。你需要一个人——他比你更惨，但他还在走路。渡边就是这个人。他不是英雄。他没有\"战胜\"悲伤。他学会了带着悲伤起床、吃饭、上课。学会了在雨里给一个人打电话。","quotes":["死不是生的对极，而是潜存在我们的生之中。","哪有人喜欢孤独，只是不喜欢失望罢了。","春天的原野里，你一个人正走着，对面走来一只可爱的小熊，浑身的毛活像天鹅绒，眼睛圆鼓鼓的。它对你说道：\'你好，小姐，和我一块儿打滚玩好吗？\'接着，你就和小熊抱在一起，顺着长满三叶草的山坡咕噜咕噜滚下去，整整玩了一大天。你说棒不棒？","我拿着电话筒，仰起脸，飞快地环视了一下电话亭四周。我现在在哪里？我不知道这里到底是哪里。目力所及，无不是不知走去哪里的男男女女。"],"extras":{"availability":"微信读书可读（上海译文出版社林少华译本）","ifYouLike":"《当我谈跑步时我谈些什么》（村上同作者，同一个人三十年后的背影）；《海边的卡夫卡》（村上同作者，同样是\"失去了什么然后往前走\"）"}},{"id":"046","title":"沉默的大多数","author":"王小波","summary":"一个长得不好看但脑子极其好看的人，用杂文告诉你：思考这件事，不需要任何门槛；无聊的时候，正是最适合胡思乱想的时候","tags":{"primary":"无聊","secondary":["浮躁","厌倦"]},"guide":"你是不是觉得\"无聊\"是一种需要被消灭的状态？手机消灭无聊，短视频消灭无聊，热搜消灭无聊。但王小波会告诉你——无聊是思考的温床。因为只有在你不被任何事牵着走的时候，你的脑子才会开始\"自己走\"。\n\n《沉默的大多数》是王小波的杂文集。他在这里面谈的东西非常散——知识分子为什么沉默、一只特立独行的猪、荷兰是什么颜色的、文化的相对主义、他为什么不喜欢孔子——但你看不出一篇\"论文\"的感觉。他像一个你偶然在食堂里遇到的人，坐下来，跟你说了一个事情，你一开始觉得\"这有什么好聊的\"，五分钟后你发现你的脑子已经跟着他跑了一圈，而且这一圈之后你的脑子比之前清醒了一点。\n\n他的特点是\"认真\"。他把\"想\"这件事看得非常重要，比\"做\"还重要。因为\"想不清楚就做\"是大多数痛苦的来源。你觉得无聊，可能是因为你太久没有认真想一件事了。王小波会帮你开一个头。","quotes":["一个人只拥有此生此世是不够的，他还应该拥有诗意的世界。","我认为低智、偏执、思想贫乏是最大的邪恶。当然我不想把这个标准推荐给别人，但我认为，聪明、达观、多知的人，比之别样的人，更值得信任。","我选择沉默，但并不意味我认同。只是我暂时还不想说。","我自己当然希望变得更善良，但这种善良应该是我变得更加聪明之后造成的，而不是相反。","男人的世界是\'我要\'，女人的世界是\'他要\'。把两样合在一起，这世界就乱了。"],"extras":{"availability":"微信读书可读（北京十月文艺出版社）；王小波全集均可","ifYouLike":"《黄金时代》（王小波小说代表作，如果杂文让你想看他怎么写故事）；《观念的水位》（刘瑜）——当代版的王小波，同样用杂文把无聊变成思考"}},{"id":"047","title":"夏洛的网","author":"E.B.怀特（E.B.White）","summary":"一只蜘蛛用自己的网救了一只猪的命——你读完之后会知道，\"重要\"不是你有多大，是你为谁花了多少时间","tags":{"primary":"平淡","secondary":["无聊","疲惫"]},"guide":"你有没有觉得——你太\"小\"了？在几万人的大学里你是一个人，在几百万人的城市里你更小。你做的事好像也不大——上课、交作业、去食堂——你怀疑自己的存在对任何人来说是不是\"重要\"的。\n\n威尔伯是一只猪。他出生的时候是窝里最瘦的一只，农场主的女儿芬恩把他从斧头下面救了下来。他长大了，搬到了谷仓里，交了很多朋友——一只老鼠、一只鹅、一匹老马。但他听说了一个消息：冬天到了，他就会被杀。威尔伯慌了。他的朋友夏洛——一只灰色的蜘蛛——说：\"我来救你。\"她在网上织出了三个词：\"王牌猪\"\"了不起\"\"光彩照人\"。这些词救了威尔伯的命。夏洛后来死了——所有的蜘蛛都会在秋天死。威尔伯把她的卵囊叼回了谷仓。每年春天，小蜘蛛孵化出来，有一两只留下来，陪着他。\n\n\"重要\"这件事，不是你有多大。是你有没有在另一个人（或另一只猪）的心里，留下了你的网。","quotes":["\'你为什么对我这么好？\'威尔伯问。\'我不喜欢你，但我帮助你，是因为你是我朋友。\'夏洛说。\'可是你为我织那些字……\'\'织字是一件小事。比起你为我做的——让我觉得我的生命有价值，那算不了什么。\'","夏洛说：\'人认为\'了不起\'就是一只猪长得又胖又壮。但我知道你是一只了不起的猪，因为你是我的朋友。\'","威尔伯从来没有忘记过夏洛。虽然他也很爱她的孩子们，但没有一只蜘蛛能替代夏洛在他心里的位置。这不是因为夏洛有多么特别。只是因为——她是那个陪他走过了最难的时候的人。","谷仓是一个很好的地方。有干草的味道，下午的阳光从木板缝里漏进来。如果没有人来打扰，一只猪可以在这里度过一整个夏天。"],"extras":{"availability":"微信读书可读（上海译文出版社任溶溶译本）","ifYouLike":"《小王子》（圣埃克苏佩里）——另一个关于\"建立联系\"的故事；《精灵鼠小弟》（E.B.怀特同作者，如果夏洛的网让你想再被治愈一次）"}},{"id":"048","title":"不能承受的生命之轻","author":"米兰·昆德拉（Milan Kundera）","summary":"一个捷克外科医生在布拉格之春的背景下，跟四个女人纠缠——但昆德拉其实只问了一个问题：人生只有一次，所以你做的每一个选择，是轻还是重？","tags":{"primary":"空游无所依","secondary":["厌倦","迷茫"]},"guide":"你有没有想过——如果人生可以重来一次，你会做不同的选择吗？昆德拉说：不会。不是因为你会做同样的选择，而是因为\"重来一次\"这件事本身就不可能。人生只有一次。你做的每一个选择都是\"第一次\"，也是\"最后一次\"。所以你永远不知道你的选择对不对——因为没有对照实验。这就是\"不能承受的生命之轻\"：不是沉重让你痛苦，是\"轻\"——是没有重量、没有锚点、没有任何东西能告诉你\"你对还是错了\"——这种飘浮感让人发疯。\n\n昆德拉在这本书里写了托马斯和特丽莎。托马斯是一个布拉格的外科医生，他有一个执念：他可以跟一百个女人上床，但绝对不跟任何一个女人过夜。然后他遇到了特丽莎。特丽莎来了，提着一个箱子，敲了他的门。他让她进来了。然后他发现自己没法让她走。他不知道为什么。他用了整本书来想这件事——\"为什么是她？\"不是因为她是\"最好的\"。是因为她来了。她在那个特定的时刻，提着一个箱子，站在他的门口——那一刻决定了后面的一切。\n\n这不是一本容易读的书。昆德拉会在爱情故事里穿插哲学思考、政治隐喻、和尼采的\"永劫回归\"。但如果你现在正处在\"我不知道自己做的选择对不对，而且这个念头让我悬浮在空中\"——昆德拉会告诉你：所有人都在悬浮。区别不在于落没落地，区别在于你接受不接受\"永远不落地\"就是活着的条件。","quotes":["最沉重的负担同时也是最强盛的生命力的影像。负担越重，我们的生命越贴近大地，它就越真切实在。相反，当负担完全消失，人就会变得比空气还轻，就会飘起来，就会远离大地和地上的生命，人也就只是一个半真的存在。","人永远都无法知道自己该要什么，因为人只能活一次，既不能拿它跟前世相比，也不能在来生加以修正。","爱情不是两个人互相注视，而是两个人一起注视着同一个方向。","偶然性才是命运的真正面孔。当你回头看你的人生，你会发现那些最重大的转折，发生时都是最不起眼的一个下午。"],"extras":{"availability":"微信读书可读（上海译文出版社许钧译本）；英文版 The Unbearable Lightness of Being 同样经典","ifYouLike":"《玩笑》（昆德拉同作者，更短更锋利）；《存在与虚无》（萨特）——如果昆德拉的\"轻与重\"让你想更系统地读存在主义"}},{"id":"049","title":"穷查理宝典","author":"查理·芒格（Charlie Munger）","summary":"巴菲特背后的那个老头，用一生的经验告诉你：聪明不是知道很多答案，是知道很多\"错的事\"然后不去做","tags":{"primary":"浮躁","secondary":["迷茫","疲惫"]},"guide":"你说\"浮躁\"——但你知道吗，浮躁的本质不是\"想做的事太多\"。浮躁的本质是\"你没有一套判断什么不值得做的标准\"。所以你什么都想试试、什么都不敢放——然后你的注意力和精力被切成了一百片，每一片都碎得不成形。\n\n查理·芒格——巴菲特的合伙人，九十多岁还每天读五六个小时的书——在这本书里反复强调一个词：\"多元思维模型\"。意思是：你脑子里的工具箱里不能只有一把锤子。如果你是学工科的，不要只用工程思维解释一切；如果你是学文科的，不要只用文字分析世界。经济学告诉你激励如何改变人的行为；心理学告诉你人有多容易自己骗自己；数学告诉你概率比确定性诚实。当你有了三个以上的模型，你就会发现——很多你\"想做的事\"其实不应该做，很多你\"拼命争取的东西\"其实不值得争取。于是你就安静下来了。\n\n这本书不需要从头读到尾。先看第四章——芒格的十一篇演讲。其中\"人类误判心理学\"是他的封笔之作，一个人用一辈子总结了二十五个最常见的认知偏误。你读完可能不会\"变聪明\"，但你会开始问一个问题：\"我现在做的这件事，会不会也是那二十五个偏误之一？\"这个问题能替你去掉一多半"浮躁"。","quotes":["如果一个蠢主意加上一个聪明人得出的还是一个蠢主意，但加上一群人呢？答案是：一群聪明人加在一起可能比一个聪明人更蠢。这就是为什么投资委员会经常做出极其糟糕的决策。","反过来想，总是反过来想。如果我想知道在哪里会死，我永远不会去那里。","我们很多人并不试图通过思考变得更聪明。我们只是努力让自己少做蠢事。","你不需要成为每个领域的专家。你只需要知道每个领域最核心的那个模型——大概二十个就够了。","对于一个手里只有锤子的人来说，每个问题看起来都像钉子。"],"extras":{"availability":"微信读书可读（中信出版社译本）","ifYouLike":"《思考，快与慢》（丹尼尔·卡尼曼）——心理学版的穷查理宝典，更系统地拆解认知偏误；《查理·芒格的智慧：投资的格栅理论》（罗伯特·哈格斯特朗）——专门拆解芒格的\"多元思维模型\""}},{"id":"050","title":"呼兰河传","author":"萧红","summary":"东北一个叫呼兰的小城、一个被遗忘的小女孩和她了不起的祖父、一条街上的邻居各自在各自的不幸里活着——萧红用最柔软的白话文，写了最坚硬的中国底层","tags":{"primary":"平淡","secondary":["烦闷"]},"quote":"你有没有去过一个地方——那里的时间像凝固了一样。几十年过去了，人们还在做同样的事、说同样的话、犯同样的错。\n\n呼兰就是这样一个地方。萧红写的呼兰河不是一条河——是一座城。城里有一条街，街上有卖豆芽的、有跳大神的、有一年四季在院子里的破缸、有一个年轻媳妇被婆家折磨到疯了。萧红写这些事的方式极其冷静——她没有愤怒、没有控诉。她就是一个六岁的小女孩，看着那个疯了的小媳妇洗衣服，然后写到——\"我以为她是正常的。因为她还在洗衣服。\"这句话的冷，比任何控诉都有力量。\n\n这本书最好的部分是萧红写她祖父。一个老头带着一个小女孩，在院子里种花、在后花园里捉蝴蝶、下雨的时候在屋里读书。祖父是她在这个冷漠世界里唯一的火炉。后来祖父死了。萧红说：\"我若死掉祖父，就死掉我一生最重要的一个人。\"然后她离开了呼兰。然后她写了这本书。\n\n你如果觉得自己的生活\"太平淡了\"——你还没有看过萧红怎么描写一个人站在街上看火烧云。\"天空是灰的，一会儿红堂堂的了，一会儿金洞洞的了\"——她用孩子的眼睛看世界，然后世界就变亮了。平淡的最大敌人不是\"精彩\"——是\"你忘了怎么仔细看\"。","quotes":["我家有一个大园子，这园子里蜂子、蝴蝶、蜻蜓、蚂蚱，样样都有。蝴蝶有白蝴蝶、黄蝴蝶。这种蝴蝶极小，不太好看。好看的是大红蝴蝶，满身带着金粉。","天空是灰的，一会儿红堂堂的了，一会儿金洞洞的了。火烧云上来了。霞光照得小孩子的脸红红的。大白狗变成红的了，红公鸡变成金的了，黑母鸡变成紫檀色的了。喂猪的老头儿在墙根靠着，笑盈盈地看着他的两头小白猪变成小金猪了。","我若死掉祖父，就死掉我一生最重要的一个人。","逆来顺受，你说我的生命可惜，我自己却不在乎。你看着很危险，我却自己以为得意。不得意怎么样？人生是苦多乐少。"],"extras":{"availability":"微信读书可读；纸书各出版社均有，推荐人民文学出版社","ifYouLike":"《边城》（沈从文）——同样是一座小城、同样\"没什么事发生\"，但比呼兰河更温暖；《城南旧事》（林海音）——同样是小孩视角写旧时代，比呼兰河更委婉"}},{"id":"051","title":"深夜加油站遇见苏格拉底","author":"丹·米尔曼（Dan Millman）","summary":"一个大学体操冠军在深夜加油站遇到了一个可以跳上屋顶的老头——他不是来教他怎么翻跟头更帅，是来教他\"怎么活\"","tags":{"primary":"迷茫","secondary":["浮躁","疲惫"]},"guide":"你是一个\"目标驱动的人\"。你觉得人生是一系列的任务——考过期末考试、拿到实习offer、健身到体脂X%、谈一个\"合适的\"恋爱。你完成了一项，就得到一块糖，吃完之后发现不够甜，然后去找下一项。丹·米尔曼（这是作者自己的名字，这本是半自传体）在伯克利是体操冠军，身体几乎完美，但他每天晚上失眠，突然惊醒，觉得\"哪里不对\"。\n\n然后他遇到了苏格拉底——不是古代那个，是一个深夜加油站的夜班值班人。苏格拉底穿着皱巴巴的工作服，说话不冷不热，但第一次见到丹的时候，纵身一跃，跳到了加油站的屋顶上。丹瞪大了眼睛。苏格拉底说：\"你的问题不是你的身体训练不够。你的问题是你的脑子从来没有停下来过。你吃饭的时候在想训练，训练的时候在想考试，考试的时候在想睡觉。你从来没有在'你在的地方'。\"\n\n这本书是苏格拉底教丹\"怎么活在当下\"的记录。不搞神秘主义，不搞宗教仪式。就是一老一少在深夜的加油站里，一个问\"我该怎么办\"、另一个反问\"你在干什么\"。你不需要跳上屋顶。你只需要在食堂喝汤的时候，知道你正在喝汤。","quotes":["你的问题不是你的身体训练不够。你的问题是你从来没有停下来。你一直跑、一直跳、一直想'下一个'。你在为一个你永远不会去的地方做准备。","知识是知道一些事情。智慧是做出来。","每一刻都是独一无二的。你错过了这一刻，它就永远不在了。你不可能在后天补上今天应该活的那一分钟。","疯子才相信自己能控制一切。正常人只控制自己能控制的事——自己的态度、自己的行动、自己如何回应那些控制不了的事。"],"extras":{"availability":"微信读书可读（心灵工坊译本）；另有同名电影","ifYouLike":"《箭术与禅心》（赫立格尔）——同样是\"一个东方式的老师教一个西方式的学生的过程\"；《当下的力量》（埃克哈特·托利）——如果苏格拉底让你想系统地学\"临在\""}},{"id":"052","title":"飞鸟集","author":"泰戈尔（Rabindranath Tagore）","summary":"325首"小诗"，每首平均不到三行——泰戈尔用最少的字，说最透的话","tags":{"primary":"烦闷","secondary":["平淡","空游无所依"]},"guide":"你有没有被一句话\"瞄准\"过——不是长文章，不是大道理，就是一句话，你读到的时候觉得\"这是说给我听的\"。泰戈尔写了325首这样的句子，合在一起叫《飞鸟集》——不是因为每首都跟飞鸟有关，是因为每首都轻得像鸟的羽毛，落下来的时候，刚好落到你心里。\n\n\"如果你因为错过太阳而流泪，那你也将错过群星了。\"\"世界对着它的爱人，摘下了它浩大的面具。它变小了，小得像一首歌，像一个永恒的吻。\"\"我们读错世界，然后说世界欺骗了我们。\"\"我不能选择最好的。是那最好的选择了我。\"\n\n你烦的时候，最不需要的是一本让你\"分析烦的原因\"的书。你需要的是一个人在你旁边轻声说了一句什么——不是答案，而是一句让你突然安静下来的话。泰戈尔就是这个人。他是二十世纪亚洲第一个诺贝尔文学奖得主，但他写的不是\"伟大的文学\"——他写的是\"人该怎么在地球上的一个下午里待着\"。\n\n建议放在手机旁边，每次你想打开一个让你更烦的app的时候，先翻一页。翻到哪页读哪页。一页只有三行。读完如果你还想打开那个app——没事。但你会带着那三行字一起打开它。","quotes":["如果你因为错过太阳而流泪，那你也将错过群星了。","世界对着它的爱人，摘下了它浩大的面具。它变小了，小得像一首歌，像一个永恒的吻。","我们读错了世界，然后说世界欺骗了我们。","我不能选择最好的。是那最好的选择了我。","谢谢火焰给你光明，但是不要忘了那个执灯的人，他坚忍地站在黑暗当中。"],"extras":{"availability":"微信读书可读（推荐郑振铎译本，最经典；另有冯唐译本更现代但争议大）","ifYouLike":"《新月集》（泰戈尔同作者，写孩子，比飞鸟更软）；《二十首情诗和一首绝望的歌》（聂鲁达）——另一个诺贝尔奖诗人的\"一句话把人击穿\""}},{"id":"053","title":"一个叫欧维的男人决定去死","author":"弗雷德里克·巴克曼（Fredrik Backman）","summary":"一个59岁的瑞典老头，妻子死了、工作没了、他觉得这个世界不需要他了——然后每次他准备去死的时候，都有人来烦他","tags":{"primary":"厌倦","secondary":["烦闷","疲惫"]},"guide":"你是不是也有过这种感觉——一切都\"还好\"，但你觉得没什么意思。不是难过，就是\"提不起劲\"。表面上你还在上课、吃饭、回复消息——但里面是空的。你不太想活了——不是说你想去死，而是你找不到一个\"为什么要活着\"的理由。\n\n欧维有理由去死。他的妻子索尼娅死了。她是欧维在这个世界上唯一一个\"对的人\"——一个爱笑、爱读书、能让欧维这个死硬的理工男变得柔软的语文老师。她在六个月前因为癌症去世了。欧维每天早上带着花去看她。他对墓碑说：\"你不在，这个世界变得非常无聊。\"然后他决定去死——上吊。但第一次绳子断了。第二次他正要踢凳子，一个年轻的伊朗女人带着两个小孩来敲门——她开着一辆日本小破车，倒车的时候把欧维的信箱撞了。她来跟他借扳手。欧维放下绳子，去给她拿扳手。\n\n这不是一本\"鸡汤\"。欧维从始至终都是一个死硬的、脾气暴躁的、觉得所有人都是废物的老头。但正是这个\"不可爱的\"老头，在他的邻居们一次次闯进他的葬礼计划的过程中，一点一点被生活拉了回来。不是因为有人告诉他要\"热爱生命\"——是因为他的邻居需要他，因为他是个好修理工，因为有人依赖他。这件事比他自认为的\"我已经没用了\"更强大。","quotes":["欧维觉得，人活着就是为了工作。工作是你存在的证明。没有工作，你就只是一个可以被删除的文件。","索尼娅是色彩。欧维是黑白。她来了之后，房子里的每一面墙都变暖了。她走了之后，暖气坏了很久了，他还没有修。","帕尔瓦娜说：\'欧维，你帮我把车修好，我就不告诉别人你今天本来打算干什么。\'欧维看了她一眼。他从来没有被人以这种方式打断过自杀。他说：\'我先把车库门修好。\'","爱不是找一个完美的人。是找一个知道你不完美，但还是每天早上醒来想看见你的人。索尼娅不是完美的。欧维也不是。但他们的不完美刚好合在一起，像两片不对口的拼图——有人拿锉刀把边缘都磨了，然后它们就合上了。"],"extras":{"availability":"微信读书可读（四川文艺出版社译本）；同名瑞典电影获奥斯卡最佳外语片提名","ifYouLike":"《人间失格》（太宰治）——如果欧维让你想看一个\"决定了就不再回头\"的人；《一个叫欧维的男人》同名电影——和书一样好"}},{"id":"054","title":"人生的智慧","author":"叔本华（Arthur Schopenhauer）","summary":"一个脾气很坏的德国哲学家，用最刻薄也最诚实的方式回答了一个问题：人这种动物，怎么才能在活着这件事上少受一点罪？","tags":{"primary":"烦闷","secondary":["疲惫","浮躁"]},"guide":"你是不是经常在两极之间摆动——没得到某样东西的时候焦虑，得到了之后无聊，然后又开始想要下一个东西。叔本华说：这不是你\"心态不好\"。这就是人类的出厂设定。人是一台\"欲望机器\"——欲望不满足就痛苦，满足了就无聊。快乐从来不是正数，快乐只是\"痛苦暂时暂停了的那一小会儿\"。\n\n叔本华花了这本书的后半截来告诉你，既然设定如此，该怎么办。他的药方不甜——他不用\"正能量\"哄你。他说：第一，减少你的欲望（不是消灭它，是减少——少到你能承受的程度）；第二，用\"别人的愚蠢\"来娱乐自己（\"别人\"包括历史上的名人，所以要多读书）；第三，享受独处（\"一个人只有在独处时才能成为自己。谁不喜欢独处，谁就不喜欢自由\"）。\n\n这本书适合在你\"烦\"但又不想被人\"治愈\"的时候读。叔本华不治愈。他嘲讽一切——包括他自己。但他说的每一句话都像一把小刀，扎在你那个\"我一直觉得哪里不对但说不清楚\"的地方。读完之后你不会笑，但你会觉得——嗯，至少有一个人说的是实话。","quotes":["人生就像钟摆，在痛苦和无聊之间来回摆动。","人能做的最大的好事，就是让自己免于痛苦。不是追求快乐——快乐是虚的。是免于痛苦。","一个人只有在独处时才能成为自己。谁不喜欢独处，谁就不喜欢自由。","我们很少去想我们拥有什么，而总是去想我们缺少什么。这是人类所有不幸的根源。","虚荣心使人多嘴，骄傲使人沉默。"],"extras":{"availability":"微信读书可读（上海人民出版社译本，推荐韦启昌译本最流畅）","ifYouLike":"《沉思录》（马可·奥勒留）——比叔本华温和一百倍的斯多葛；《快乐的科学》（尼采）——如果说叔本华是\"少受罪\"的哲学，尼采是\"不怕受罪\"的哲学"}},{"id":"055","title":"月亮与六便士","author":"威廉·萨默塞特·毛姆（W. Somerset Maugham）","summary":"一个伦敦股票经纪人，四十岁那年突然抛妻弃子跑到巴黎画画——不是为了成名，是因为\"不画画我会死\"","tags":{"primary":"空游无所依","secondary":["厌倦","迷茫"]},"guide":"你是不是偶尔觉得——你现在的生活，不是你要的。你说不出来为什么，因为从任何\"理性\"的角度看，它都挺好的。成绩还行、社交还行、未来可期——但你不是\"快乐\"。你是\"过得去\"。然后你开始怀疑：是我的问题吗？是我太贪心、太矫情、太\"作\"了吗？\n\n查尔斯·斯特里克兰是伦敦的一个股票经纪人，四十二岁，有老婆、两个孩子、一份体面收入。有一天他下班回家，桌上留了一封信——他不回来了。他去了巴黎。他老婆以为是女人。她托人去巴黎找他，发现他在一间破烂的阁楼里，身无分文，在画画。她说：\"他疯了。\"所有人都说他疯了。斯特里克兰自己说：\"我必须画画。我不是自己想要画画。就像一个溺水的人，挣扎不挣扎，不是他自己能选的事。\"\n\n毛姆写这本小说的原型是高更——后印象派那个高更。但《月亮与六便士》最厉害的地方不是讲高更，是让你看清一件事：有些人心里有一团火，他们不把它烧出来，就会死在里面。大多数人把火用\"理智\"和\"社会期待\"给闷住了，然后一辈子过得\"还行\"。斯特里克兰没有闷住。他\"空游无所依\"的状态不是漂浮，而是——他在找那团火的出口。\n\n这本书不是在鼓励你退学去学画画。它是在问你：你的火是什么？你知不知道它在哪？","quotes":["我必须画画。就像一个溺水的人，挣扎不挣扎，不是他自己能选的事。","追逐梦想就是追逐自己的厄运——因为在大多数人眼里，你已经背叛了他们认为'正确'的生活方式。","我们用别人的眼睛看世界太久了。久到以为自己看的就是真的。","世界上只有少数人能最终实现自己的理想。我们的生活是简朴的、单纯的。我们被野心和热爱所驱使——也被恐惧所驱赶。但这两者之间有一个巨大的区别：被爱驱使的人，跑起来是安静的。"],"extras":{"availability":"微信读书可读（上海译文出版社傅惟慈译本，最经典）","ifYouLike":"《刀锋》（毛姆同作者，另一个\"不要体面只要答案\"的人，但比斯特里克兰更温和）；《渴望生活：梵高传》（欧文·斯通）——如果说月亮与六便士是虚构的画家故事，梵高传是真的"}},{"id":"056","title":"湘行散记","author":"沈从文","summary":"沈从文坐船回湘西老家，在路上给新婚妻子写了三十四封信——没有讲大道理，就写河水流得慢、太阳落山好看、摇船的人今天不太高兴","tags":{"primary":"平淡","secondary":["烦闷"]},"guide":"你是不是很久没有\"在路上\"了？不是因为没出门——你每天在宿舍和教室之间走——是你走在路上的时候，没有看周围。你在看手机，或者在脑子里过今天要做的事，或者什么都没看，只是走。\n\n一九三四年，沈从文从北京出发，坐火车、换汽车、换船，沿沅水回他的故乡凤凰。走了一个多月。他每天坐在船头，看河水、看山崖、看岸上晒衣服的妇人。他给他新婚的妻子张兆和写信——不是\"我爱你我想你\"那种，是\"今天的河水是绿的\"\"摇船的人今天不太高兴，可能昨天晚上输了钱\"\"山崖上挂着一个棺材，死了很久的人还在那里\"。他写水手的赤脚、船上的炊烟、一个老妇人的咒骂——这些没有任何\"文学价值\"的东西，在沈从文的笔下，每一个都活得有鼻子有眼。\n\n你\"平淡\"的时候，缺的不是\"更精彩的生活\"——是缺一双沈从文的眼睛。他用三十四封信告诉你：最好看的东西不在远方，在你正在经过的这条河上。只是你忘了看。","quotes":["我沅水坐船走了十多天，每天的河水都不一样。不是颜色——是脾气。有时候它很安静，像一个老头子坐在太阳底下打盹；有时候它突然很急，像有人在追它。","这些水手，脚永远不穿袜子，冬天的霜地把脚冻得像红萝卜。但他们不抱怨。他们有他们的世界——抽烟、赌钱、骂娘、想女人。我坐在船头看他们，觉得我自己是个外人。","我行过许多地方的桥，看过许多次数的云，喝过许多种类的酒，却只爱过一个正当最好年龄的人。","到了傍晚，太阳从山那一头掉下去，整条河变成了一匹金缎子。我坐在船头看了很久。张兆和，你要是在这里就好了。不是为了陪我看河。是河这么好看，我只想告诉你一声。"],"extras":{"availability":"微信读书可读（多个版本）；沈从文全集均有收录","ifYouLike":"《边城》（沈从文同作者同水系，小说版的湘行散记）；《沿着塞纳河到翡冷翠》（黄永玉）——另一个画家/作家在路上的日记，更俏皮"}},{"id":"057","title":"反脆弱","author":"纳西姆·尼古拉斯·塔勒布（Nassim Nicholas Taleb）","summary":"塔勒布造了一个英语里从来没有的词：Antifragile——不是\"坚强\"，不是\"有韧性\"，是\"越摔越强\"","tags":{"primary":"浮躁","secondary":["迷茫","疲惫"]},"guide":"你从小到大被教了一件事：\"稳定最好。\"稳定的成绩、稳定的学校、稳定的职业。但塔勒布说：追求稳定的系统最脆弱。因为\"稳定\"意味着你从来没有被打击过，所以你没有任何抗体。一个小小的震动来了——一次挂科、一次被拒、一次分手——你就碎了。不是因为这次打击太大，是因为你从来没被打过。\n\n他造了一个词叫\"反脆弱\"——不是\"坚强\"（坚强是被打击了不变形），不是\"有韧性\"（韧性是被打击了能弹回来）。反脆弱是\"被打击了之后变得更强\"。比如你的肌肉——你把它练到撕裂，它在修复的过程中变粗；比如你的免疫系统——你接触少量病菌，它产生抗体；比如你的人生——一次失控的失败教会你的东西，比十个顺利的计划加起来都多。\n\n这本书不教你\"解除焦虑\"。它教你换一个眼光看焦虑：不是你太脆弱了，是你一直在逃避一种叫做\"波动\"的东西——而波动才是让你成长的营养。你浮躁，不是因为你\"心神不宁\"——是因为你还没有学会把波动当成训练。","quotes":["风会熄灭蜡烛，却会让大火烧得更旺。你要当火，不要当蜡烛。","脆弱的东西不喜欢波动。反脆弱的东西从波动中获益。","信息有毒性。太多的信息会让你觉得自己知道很多，但其实只是在干扰你的判断。","如果你想变成反脆弱的，就把自己暴露在小的、频繁的压力面前。这不是自我折磨——这是训练。"],"extras":{"availability":"微信读书可读（中信出版社译本）","ifYouLike":"《黑天鹅》（塔勒布同作者，讲不可预测事件的影响力）；《思考，快与慢》（卡尼曼）——从心理学角度拆解\"为什么我们总做错决定\""}},{"id":"058","title":"奇迹集","author":"黄灿然","summary":"一个中国当代诗人在香港的街头写诗——写那个卖水果的阿姨、写等车的人、写突然下的一场雨。他证明了：诗歌不在远方，在你家楼下","tags":{"primary":"无聊","secondary":["平淡"]},"guide":"你是不是觉得\"诗歌\"离你很远了？不是讨厌诗歌——是觉得它跟你没关系。它住在课本里、住在考卷上、住在\"请分析诗人此刻的思想感情\"那种你永远分析不出来的地方。\n\n黄灿然把诗从课本里抢了出来，放回你家楼下。他写香港的街头——一个卖水果的阿姨、一个在天桥上抽烟的中年男人、傍晚的时候对面楼里亮起的一盏灯。他的诗不用解释。你看一遍——\"哦，原来这也是诗\"。\"每天我们去公园散步，/我对你说，\"看那些花多美！\"/你则对我说，\"看那些人脸上的幸福！\"/你更多地看人，/我更多地看花。/噢，我多么爱你，/和人。\"\n\n你无聊的时候，不需要一本\"教你变得有趣\"的书。你需要有人把世界的音量调大了一点——大到你能听见楼下小孩的笑声、大到你能注意到今天下午的光线角度变了。黄灿然做了这件事。他不是\"伟大的诗人\"——他是把照相机架在了你每天路过但从来不看的地方，然后按下了快门。","quotes":["每天我们去公园散步，/我对你说，\"看那些花多美！\"/你则对我说，\"看那些人脸上的幸福！\"/你更多地看人，/我更多地看花。/噢，我多么爱你，/和人。","我写诗，/不是因为要当诗人，/是要当一个人。","这个卖水果的阿姨，/她的橙子很甜，/她的苹果也很甜，/她的脸更甜。","等车的时候，/雨突然下起来。/没有伞的人，/站到了有伞的人身边。/雨让陌生人变成了邻居。"],"extras":{"availability":"微信读书可读（新星出版社）","ifYouLike":"《一个人生活》（谷川俊太郎）——一个日本诗人写的日常，比黄灿然更年长、更安静；《惶然录》（费尔南多·佩索阿）——一个葡萄牙诗人在里斯本的街头胡思乱想"}},{"id":"059","title":"斯通纳","author":"约翰·威廉斯（John Williams）","summary":"一个农场男孩去大学读农学，然后被一首莎士比亚的十四行诗改变了人生——此后一辈子在大学教书，没有什么大事发生。但他\"活过了\"","tags":{"primary":"疲惫","secondary":["平淡","迷茫"]},"guide":"你有没有想过——五十年后，没有人会记得你拿过几次奖学金、绩点多少分、哪个学期当过班干部。这些东西写不进传记里，因为没有人会给你写传记。\n\n斯通纳是一个普通人。他出身在密苏里的一个贫瘠农场，父亲送他去大学学农业技术。大二那年他选修了一门英国文学概论——他本来只想凑学分。教授在课堂上念了莎士比亚的第73首十四行诗——\"你在我身上看见的，是那一年中的时节/当一两片黄叶挂在枝头颤抖\"——斯通纳站在教室里，一动不动。他后来转了专业，读了文学博士，留校任教。他娶了一个错的人，女儿被妻子教成了他不认识的样子，他和他爱的女人被迫分手，他在系里和同事斗了一辈子、输了。他死了。你翻开这本书第一页就知道他会死。但五百页之后，你合上书——你觉得自己不是在为一个\"loser\"难过。你是在为一个\"活过了\"的人默哀。\n\n我们都是斯通纳。我们不会上新闻、不会被写进历史书、不会有任何\"传奇\"。但我们每一个人都认真地、笨拙地、用尽全力地活了一个人生。这件事本身——不是什么成就，而是它本身就值得一本书。","quotes":["你不记得那首诗的第一行了？\'你在我身上看见的，是那一年中的时节/当一两片黄叶挂在枝头颤抖\'。斯通纳站在那里，那个教室，那一刻——他从来没有告诉过任何人，他的一生是从那一刻开始的。","他想到自己的一生，想到它的失败和那少数几次微小的胜利。他想到，他的一生，虽然在外人看来微不足道，但对他自己来说，是一个完整的、自足的世界。","爱不是最终的目标。它是一种过程——通过它，一个人试图去认识另一个人。","他曾经想要成为一个好老师。他成过，虽然他的同事们从来不承认。但这不重要。重要的是那些学生——那些因为他的课开始自己读莎士比亚的学生——他们记得。","他安静地去世了。没有人握着他的手。他最后想到的不是他的妻子、不是他的女儿、不是他那个从未出版过的书——是一本书。一本打开的书，放在他面前的桌上。然后它合上了。"],"extras":{"availability":"微信读书可读（世纪文景出品）；英文版 Stoner 在出版50年后突然成为全球畅销书","ifYouLike":"《活着》（余华）——同样是一个人送走了所有人然后自己活着；《平凡的世界》（路遥）——如果斯通纳让你想读一个中国版的\"普通人过完了普通的一生\""}},{"id":"060","title":"惶然录","author":"费尔南多·佩索阿（Fernando Pessoa）","summary":"一个在里斯本小公司打工的葡萄牙人，一辈子没出过书，死后人们在他的箱子里发现了两万五千多页手稿——他用了几十个不同的笔名，写了一本人类灵魂的百科全书","tags":{"primary":"厌倦","secondary":["空游无所依","烦闷"]},"guide":"你是不是偶尔觉得——你不是一个人。不是说你有其他人在旁边，是说你自己的内部好像住了不止一个人。一个你想去社交，另一个你想一个人在屋里待着；一个你告诉自己\"应该努力\"，另一个你觉得\"努力到底图什么\"。佩索阿管这些叫\"异名者\"——不是笔名，不是假名，是各有一个完整人格的人，他们住在同一个身体里，轮流使用同一支笔。\n\n《惶然录》是其中一个\"异名者\"——贝尔纳多·索阿雷斯——写的。索阿雷斯是一个里斯本小公司的簿记员，每天做的事情一模一样：走进办公室、坐下、翻账本、下班、回家、写几行字。他没有\"追梦\"、没有\"旅行\"、没有\"爱过\"（他不敢）。但他用一个普通账簿的副页写了一本书——不是小说，不是日记，是几百段碎片。一段说：\"我把我的灵魂翻了过来，像一个口袋，看看里面还剩什么。\"另一段说：\"我今天没有任何事发生。但我把这件事写了下来，于是它变成了一件事。\"\n\n你\"厌倦\"的时候——读几段佩索阿。你不会觉得\"啊我振作了\"。但你会觉得——至少有人知道\"厌倦\"是什么。他不是在写一种\"需要被治好的情绪\"。他是在给\"厌倦\"做一本病历——不是为了让医生开药，是为了让你知道，你有的这种感觉，有人花了整整一辈子去描述它。","quotes":["我把我的灵魂翻了过来，像一个口袋，看看里面还剩什么。","我们从来没有爱过任何人。我们爱的是我们对一个人的想法——是我们自己脑海里的那个形象。我们爱的，从来都是自己。","我是一本书的碎片。我活着，是因为有人在很久以前把我撕下来，扔在了这个世界的街角。没有人会把这本书重新装订起来。也没有人记得我属于哪一页。","世界属于那些感觉它的人，而不属于那些思考它的人。","今天我没有任何事发生。没有开心，没有悲伤，没有期待，没有回忆。我活着的唯一证据是——我在写这句话。"],"extras":{"availability":"微信读书可读（推荐韩少功译本，从葡语直译）；另有多个选译本","ifYouLike":"《地下室手记》（陀思妥耶夫斯基）——是同一个物种的\"自我意识过剩\"，但佩索阿更柔软、更碎；《看不见的城市》（卡尔维诺）——佩索阿的碎片是\"灵魂的城市\"，卡尔维诺的碎片是\"石头和记忆的城市\""}}];

var tags = ["无聊", "迷茫", "厌倦", "浮躁", "疲惫", "空游无所依", "烦闷", "平淡"];
var currentIndex = Math.floor(Math.random() * tags.length);
var playCount = 0;
var cycleTimer = null;
var _hintSeen = false;
var playWord = null;

function initMirror() {
    var scalerEl = document.getElementById("word-scaler");
    var containerEl = document.getElementById("home-view");
    var dailyBtn = document.getElementById("daily-btn-mirror");

    dailyBtn.classList.add("idle-breathe");

    // ===== 方案 C：延迟轻语 =====
    var HINT_KEY = "shufang-hint-seen";
    var whisperEl = document.getElementById("delayed-whisper");
    var whisperTimer = null;
    var hideTimer = null;

    try { _hintSeen = localStorage.getItem(HINT_KEY) === "1"; } catch(e) { _hintSeen = false; }

    function markHintAsSeen() {
        if (whisperTimer) clearTimeout(whisperTimer);
        if (hideTimer) clearTimeout(hideTimer);
        if (whisperEl) whisperEl.classList.remove("show");
        try { localStorage.setItem(HINT_KEY, "1"); _hintSeen = true; } catch(e) {}
    }

    if (!_hintSeen) {
        whisperTimer = setTimeout(function() {
            if (whisperEl) whisperEl.classList.add("show");
            hideTimer = setTimeout(function() {
                markHintAsSeen();
            }, 4000);
        }, 11000);
    }

    playWord = function(index) {
        scalerEl.innerHTML = "";
        var newEl = document.createElement("div");
        newEl.className = "emotion-word breathing";
        newEl.textContent = tags[index];
        newEl.classList.add(tags[index].length > 2 ? "word-long" : "word-short");
        scalerEl.appendChild(newEl);

        if (playCount % tags.length === 2) {
            dailyBtn.classList.remove("idle-breathe");
            dailyBtn.classList.add("flash-highlight");
            setTimeout(function() {
                dailyBtn.classList.remove("flash-highlight");
                dailyBtn.classList.add("idle-breathe");
            }, 2000);
        }

        playCount++;

        clearTimeout(cycleTimer);
        cycleTimer = setTimeout(function() {
            if (playCount <= tags.length) {
                currentIndex = (currentIndex + 1) % tags.length;
            } else {
                var randomStep = Math.floor(Math.random() * 3) + 1;
                currentIndex = (currentIndex + randomStep) % tags.length;
            }
            playWord(currentIndex);
        }, 5500);
    }

    playWord(currentIndex);

    document.getElementById("zone-prev").addEventListener("click", function() {
        markHintAsSeen();
        currentIndex = (currentIndex - 1 + tags.length) % tags.length;
        playWord(currentIndex);
    });

    document.getElementById("zone-next").addEventListener("click", function() {
        markHintAsSeen();
        currentIndex = (currentIndex + 1) % tags.length;
        playWord(currentIndex);
    });

    document.getElementById("zone-enter").addEventListener("click", function() {
        markHintAsSeen();
        clearTimeout(cycleTimer);
        scalerEl.classList.add("clicked");
        containerEl.style.backgroundColor = "hsl(40, 20%, 95%)";
        setTimeout(function() {
            scalerEl.classList.remove("clicked");
            containerEl.style.backgroundColor = "";
            navigateToTag(tags[currentIndex]);
        }, 300);
    });

    // Overlay: 散落星空
    var gridOverlay = document.getElementById("grid-overlay");

    function shuffleStarWords() {
        var shortWords = ["无聊", "迷茫", "厌倦", "浮躁", "疲惫", "烦闷", "平淡"];
        // Fisher-Yates 洗牌
        for (var i = shortWords.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = shortWords[i];
            shortWords[i] = shortWords[j];
            shortWords[j] = tmp;
        }
        var shortIdx = 0;
        var stars = document.querySelectorAll("#grid-overlay .star-word");
        stars.forEach(function(star) {
            var tag = star.getAttribute("data-tag");
            // 长词"空游无所依"固定在它的槽位不动
            if (tag === "空游无所依") return;
            star.setAttribute("data-tag", shortWords[shortIdx]);
            star.textContent = shortWords[shortIdx];
            shortIdx++;
        });
    }

    document.getElementById("btn-show-all").addEventListener("click", function(e) {
        e.stopPropagation();
        markHintAsSeen();
        shuffleStarWords();
        gridOverlay.classList.add("visible");
        gridOverlay.style.display = "block";
    });

    document.getElementById("btn-close-all").addEventListener("click", function(e) {
        e.stopPropagation();
        closeGridOverlay();
    });

    // 点击 overlay 空白区域关闭（不在任何 star-word 按钮上）
    gridOverlay.addEventListener("click", function(e) {
        if (e.target === gridOverlay) {
            closeGridOverlay();
        }
    });

    // 每个词条点击跳转
    document.querySelectorAll(".star-word").forEach(function(btn) {
        btn.addEventListener("click", function(e) {
            e.stopPropagation();
            closeGridOverlay();
            navigateToTag(e.currentTarget.dataset.tag);
        });
    });

    function closeGridOverlay() {
        gridOverlay.classList.remove("visible");
        setTimeout(function() { gridOverlay.style.display = "none"; }, 500);
    }

    // Daily dose button
    dailyBtn.addEventListener("click", function() { markHintAsSeen(); navigateToTag("daily"); });
}

var SEEN_KEY = "shufang-seen";
var DOSE_PREFIX = "shufang-dose-";
function isStorageAvailable() {
